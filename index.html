<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>代理店営業カルテ</title>
<style>
:root {
  --primary: #2563EB;
  --primary-light: #3B82F6;
  --primary-dark: #1D4ED8;
  --primary-bg: #EFF6FF;
  --success: #16A34A;
  --success-bg: #F0FDF4;
  --warning: #F59E0B;
  --warning-bg: #FFFBEB;
  --danger: #EF4444;
  --danger-bg: #FEF2F2;
  --bg: #F8FAFC;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --text: #1E293B;
  --muted: #64748B;
  --sidebar: 270px;
  --bottom-nav-h: 62px;
  --header-h: 56px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.05);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.12);
  /* Safe area insets (iPhone X+ / Android notch) */
  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);
}
* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  font-size: 15px;
  /* Safe area padding for notch/status bar */
  padding-left:  var(--safe-left);
  padding-right: var(--safe-right);
}

/* ── Active feedback ── */
button:active, a:active { opacity: .8; transform: scale(.97); transition: none; }
[onclick]:active:not(button):not(a) { opacity: .85; }

/* ── Overscroll containment ── */
.sb-list, .main, .sv-grid, .mb-list-wrap, .mobile-detail-inner, .rp-body {
  overscroll-behavior: contain;
}

/* ── Mode bar (desktop only) ── */
.mode-bar {
  display: flex; background: #1E3A5F; flex-shrink: 0;
  padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,.08);
}
.mode-tab-top {
  padding: 10px 20px; font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,.5); cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.mode-tab-top .icon { width: 16px; height: 16px; }
.mode-tab-top.active { color: white; border-bottom-color: #60A5FA; }
.mode-tab-top:hover:not(.active) { color: rgba(255,255,255,.8); }

/* ── Mode-specific visibility ── */
body.mode-agent .salon-only { display: none !important; }
body.mode-salon .agent-only { display: none !important; }

/* ── SVG Icon System ── */
.icon { display: inline-block; width: 1em; height: 1em; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.icon-sm { width: 16px; height: 16px; }
.icon-md { width: 20px; height: 20px; }
.icon-lg { width: 24px; height: 24px; }
.icon-xl { width: 28px; height: 28px; }
.icon-fill { fill: currentColor; stroke: none; }

/* ── Header ── */
.hdr {
  background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); color: white;
  height: var(--header-h); padding: 0 14px;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 2px 8px rgba(37,99,235,.3); z-index: 100; flex-shrink: 0;
}
.hdr-back {
  display: none; background: none; border: none; color: white;
  font-size: 22px; cursor: pointer; padding: 0 6px;
  min-width: 44px; min-height: 44px; align-items: center; justify-content: center;
}
.hdr-title { font-size: 17px; font-weight: 700; white-space: nowrap; flex: 1; }
.hdr-title-center { display: none; }
.hdr-search { flex: 1; max-width: 380px; position: relative; }
.hdr-search input {
  width: 100%; padding: 7px 10px 7px 32px;
  border: none; border-radius: 18px; background: rgba(255,255,255,.2);
  color: white; font-size: 16px; outline: none;
}
.hdr-search input::placeholder { color: rgba(255,255,255,.65); }
.hdr-search input:focus { background: rgba(255,255,255,.3); }
.hdr-search-ico { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 14px; }
.hdr-btn {
  background: white; color: var(--primary); border: none;
  padding: 6px 14px; border-radius: 18px;
  font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  min-height: 44px; display: flex; align-items: center;
}
.hdr-btn:hover { background: #eee; }
.hdr-btn-icon {
  background: rgba(255,255,255,.18); color: white; border: none;
  width: 44px; height: 44px; border-radius: 50%;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.hdr-add-btn { display: block; }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar); background: var(--card);
  border-right: 1px solid var(--border); display: flex;
  flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.sb-count { padding: 6px 12px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
.sb-list { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.sb-filter-bar { padding: 8px 10px 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
.sb-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.sb-chips .mf-chip { padding: 3px 10px; min-height: 26px; font-size: 11px; }
.sb-sort-row { display: flex; gap: 6px; }
.sb-sel { flex: 1; padding: 4px 6px; font-size: 11px; border: 1px solid var(--border); border-radius: 6px; background: white; color: var(--text); font-family: inherit; cursor: pointer; }
.sb-item {
  padding: 11px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
}
.sb-item:hover { background: #f8f9fa; }
.sb-item.active { background: #ebf3ff; border-left: 3px solid var(--primary); }
.sb-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.sb-company { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.sb-badges { display: flex; gap: 3px; flex-wrap: wrap; }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge-fu { background: #fff3cd; color: #664d03; }
.badge-tag { background: #ebf3ff; color: var(--primary); }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; padding: 18px; -webkit-overflow-scrolling: touch; }
.empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; color: var(--muted); gap: 10px;
}
.empty-ico { font-size: 44px; }
.empty-title { font-size: 17px; font-weight: 600; }

/* ── Card ── */
.card {
  background: var(--card); border-radius: var(--radius-md);
  border: 1px solid rgba(0,0,0,.04); margin-bottom: 14px; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.card-hdr {
  padding: 13px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 700; color: var(--primary); }
.card-body { padding: 14px 18px; }

/* ── Profile ── */
.profile {
  background: var(--card); border-radius: 10px;
  border: 1px solid var(--border); padding: 18px;
  margin-bottom: 14px; display: flex; align-items: flex-start; gap: 14px;
}
.avatar {
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--primary); color: white; font-size: 20px;
  font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
.profile-company { font-size: 13px; color: var(--muted); margin-bottom: 7px; }
.profile-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.profile-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Tabs ── */
.tabs {
  display: flex; background: var(--card); border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px;
}
.tab {
  flex: 1; padding: 10px 8px; text-align: center;
  font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--muted); border-bottom: 3px solid transparent; transition: all .15s;
  min-height: 44px; display: flex; align-items: center; justify-content: center;
}
.tab.active { color: var(--primary); background: #ebf3ff; border-bottom-color: var(--primary); }
.tab:hover:not(.active) { background: #f8f9fa; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Info grid ── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item label { display: block; font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
.info-item span { font-size: 13px; }

/* ── Activity ── */
.act-list { display: flex; flex-direction: column; gap: 10px; }
.act-item { padding: 14px; background: var(--bg); border-radius: 10px; border-left: 3px solid var(--primary); transition: background .15s; }
.act-item.fu-pending { border-left-color: var(--warning); background: #fffdf5; }
.act-item.fu-done { border-left-color: var(--success); }
.act-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; }
.act-type { font-size: 10px; font-weight: 700; background: var(--primary); color: white; padding: 2px 7px; border-radius: 10px; }
.act-date { font-size: 11px; color: var(--muted); }
.act-content { font-size: 13px; margin-bottom: 4px; }
.act-next { font-size: 12px; color: var(--primary); background: rgba(45,90,142,.08); padding: 5px 9px; border-radius: 5px; margin-top: 5px; }
.act-next::before { content: "→ "; }
.act-actions { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.add-btn {
  width: 100%; padding: 9px; border: 2px dashed var(--border);
  border-radius: 8px; background: none; color: var(--muted);
  font-size: 13px; cursor: pointer; text-align: center; transition: all .15s;
  min-height: 44px;
}
.add-btn:hover { border-color: var(--primary); color: var(--primary); background: #ebf3ff; }

/* ── Sales ── */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.stat { padding: 12px; background: var(--bg); border-radius: 8px; text-align: center; }
.stat-val { font-size: 26px; font-weight: 700; color: var(--primary); }
.stat-unit { font-size: 13px; font-weight: 400; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
.prog-wrap { margin-bottom: 14px; }
.prog-lbl { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.prog-bar { height: 9px; background: var(--border); border-radius: 5px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 5px; background: var(--success); transition: width .4s ease; }
.prog-fill.warn { background: var(--warning); }
.prog-fill.bad { background: var(--danger); }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { background: #f8f9fa; padding: 8px 10px; text-align: left; font-weight: 600; color: var(--muted); border-bottom: 2px solid var(--border); }
.tbl td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: #f8f9fa; }
.ach { font-weight: 700; }
.ach.good { color: var(--success); }
.ach.ok { color: #e65c00; }
.ach.bad { color: var(--danger); }

/* ── Buttons ── */
.btn {
  padding: 7px 14px; border-radius: 6px; font-size: 12px;
  font-weight: 600; cursor: pointer; border: none; transition: all .12s;
  min-height: 44px; display: inline-flex; align-items: center; justify-content: center;
}
.btn-primary { background: var(--primary); color: white; box-shadow: 0 1px 3px rgba(37,99,235,.3); }
.btn-primary:hover { background: var(--primary-light); box-shadow: 0 2px 6px rgba(37,99,235,.3); }
.btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: #ebf3ff; }
.btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger:hover { background: #fff0f0; }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #218838; }
.btn-sm { padding: 4px 9px; font-size: 11px; min-height: 32px; }

/* ── Modal ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 1000;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: white; border-radius: var(--radius-lg);
  width: 90%; max-width: 560px; max-height: 90vh;
  overflow-y: auto; box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,.04);
}
.modal-hdr {
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: white; z-index: 1; gap: 8px;
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close {
  background: none; border: none; font-size: 18px; cursor: pointer;
  color: var(--muted); padding: 2px 6px;
  min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 18px; }
.modal-footer {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 7px;
  position: sticky; bottom: 0; background: white;
}
@media (max-width: 767px) {
  .modal-footer { padding: 12px 16px 20px; }
}

/* ── Form ── */
.fg { margin-bottom: 12px; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.flbl {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px;
}
.finput {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 16px; color: var(--text); outline: none; font-family: inherit;
  min-height: 48px;
}
.finput:focus { border-color: var(--primary); }
textarea.finput { resize: vertical; min-height: 88px; }
select.finput { background: white; }
.fsec {
  font-size: 12px; font-weight: 700; color: var(--primary);
  margin: 14px 0 8px; padding-bottom: 5px; border-bottom: 2px solid var(--border);
}

/* ── Tags ── */
.tags-wrap {
  display: flex; flex-wrap: wrap; gap: 5px; padding: 5px;
  border: 1px solid var(--border); border-radius: 6px;
  min-height: 48px; align-items: center; cursor: text;
}
.tag-chip {
  background: #ebf3ff; color: var(--primary);
  padding: 2px 7px; border-radius: 10px; font-size: 11px;
  display: flex; align-items: center; gap: 3px;
}
.tag-rm { cursor: pointer; color: var(--muted); }
.tag-rm:hover { color: var(--danger); }
.tag-field { border: none; outline: none; font-size: 16px; flex: 1; min-width: 70px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 3px; }

/* ── Search View ── */
body.mode-search .layout { display: none; }
.search-view { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
body:not(.mode-search) .search-view { display: none; }

.sv-toolbar {
  padding: 10px 18px; background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.sv-row1 { display: flex; gap: 8px; align-items: center; }
.sv-row2 { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sv-area-row { overflow-x: auto; white-space: nowrap; padding: 2px 0 2px; scrollbar-width: none; }
.sv-area-row::-webkit-scrollbar { display: none; }
.sv-area-chip { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; margin-right: 6px; background: #fff; color: var(--text); transition: all .15s; user-select: none; }
.sv-area-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 600; }
.sv-area-chip:hover:not(.active) { background: #f0f4ff; border-color: var(--primary); }
.sv-area-chip .chip-cnt { font-size: 10px; opacity: .65; background: rgba(0,0,0,.07); border-radius: 10px; padding: 1px 5px; }
.sv-search { flex: 1; min-width: 200px; position: relative; }
.sv-search input {
  width: 100%; padding: 10px 40px 10px 38px;
  border: 2px solid var(--border); border-radius: var(--radius-md);
  font-size: 16px; outline: none; font-family: inherit;
  min-height: 48px; background: #F8FAFC; transition: all .2s;
}
.sv-search input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.sv-search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.sv-search-ico .icon { width: 18px; height: 18px; }
.sv-search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: var(--border); color: var(--muted); cursor: pointer;
  display: none; align-items: center; justify-content: center; padding: 0;
}
.sv-search-clear .icon { width: 14px; height: 14px; }
.sv-search-clear:active { background: #cbd5e1; }
/* Recent searches dropdown */
.sv-recent {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md); margin-top: 4px; display: none; max-height: 200px; overflow-y: auto;
}
.sv-recent.show { display: block; }
.sv-recent-title { font-size: 11px; font-weight: 600; color: var(--muted); padding: 8px 12px 4px; }
.sv-recent-item {
  padding: 10px 12px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: background .1s;
}
.sv-recent-item:hover, .sv-recent-item:active { background: var(--primary-bg); }
.sv-recent-item .icon { width: 14px; height: 14px; color: var(--muted); }
.sv-quick-row {
  display: flex; gap: 6px; align-items: center;
  overflow-x: auto; scrollbar-width: none; padding: 6px 0 2px; white-space: nowrap;
}
.sv-quick-row::-webkit-scrollbar { display: none; }
.sv-qchip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--muted); transition: all .15s; white-space: nowrap; font-family: inherit;
}
.sv-qchip .icon { flex-shrink: 0; }
.sv-qchip-cnt {
  font-size: 10px; background: rgba(0,0,0,.08); border-radius: 10px;
  padding: 1px 5px; min-width: 16px; text-align: center;
}
.sv-qchip.active .sv-qchip-cnt { background: rgba(255,255,255,.3); }
.sv-qchip.active { background: var(--primary); color: white; border-color: var(--primary); }
.sv-qchip[data-q="overdue"] { border-color: #ffd0d0; color: #c0392b; }
.sv-qchip[data-q="overdue"].active { background: var(--danger); border-color: var(--danger); color: white; }
.sv-qchip[data-q="pending"] { border-color: #ffddb3; color: #e65c00; }
.sv-qchip[data-q="pending"].active { background: var(--warning); border-color: var(--warning); color: white; }
.sv-qchip[data-q="watch"] { border-color: #ccd9f0; color: #4A6FA5; }
.sv-qchip[data-q="watch"].active { background: #4A6FA5; border-color: #4A6FA5; color: white; }
.sv-qchip[data-q="inactive"] { border-color: #ddd; color: var(--muted); }
.sv-qchip[data-q="inactive"].active { background: #6C757D; border-color: #6C757D; color: white; }
.sv-detail-btn {
  padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 20px;
  background: white; cursor: pointer; font-size: 12px; font-weight: 600;
  color: var(--muted); font-family: inherit; transition: all .15s;
  display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; flex-shrink: 0;
}
.sv-detail-btn:hover { border-color: var(--primary); color: var(--primary); }
.sv-detail-btn.on { background: #ebf3ff; border-color: var(--primary); color: var(--primary); }
.sv-detail-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 16px; height: 16px; border-radius: 8px; background: var(--primary);
  color: white; font-size: 10px; font-weight: 700; padding: 0 4px;
}
.sv-detail-panel {
  padding: 8px 0 4px; display: flex; gap: 8px; flex-wrap: wrap;
  border-top: 1px solid var(--border); margin-top: 4px;
}
.sv-sort-right { margin-left: auto; flex-shrink: 0; }
.sv-clear-btn {
  padding: 5px 12px; border: 1.5px solid #ffd0d0; border-radius: 20px;
  background: #fff5f5; cursor: pointer; font-size: 12px; font-weight: 600;
  color: var(--danger); font-family: inherit; transition: all .15s; white-space: nowrap;
}
.sv-clear-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
.sv-filter {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; background: white; cursor: pointer; outline: none;
  font-family: inherit; color: var(--text); min-height: 44px;
}
.sv-filter:focus { border-color: var(--primary); }
.sv-count { font-size: 12px; color: var(--muted); white-space: nowrap; margin-left: 4px; }

.sv-grid {
  flex: 1; overflow-y: auto; padding: 16px 18px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  grid-auto-rows: min-content;
  gap: 14px; align-content: start; -webkit-overflow-scrolling: touch;
}
.sv-card {
  background: var(--card); border: 1px solid rgba(0,0,0,.04);
  border-radius: var(--radius-md); padding: 12px 14px; cursor: pointer; transition: all .15s;
  border-left: 4px solid var(--border); position: relative; overflow: hidden;
  box-shadow: var(--shadow-xs);
}
.sv-card:hover { border-color: var(--primary); border-left-color: var(--primary); box-shadow: var(--shadow-md); }
.sv-card.urgent { border-left-color: var(--danger); background: var(--danger-bg); }
.sv-card.pending { border-left-color: var(--warning); background: var(--warning-bg); }
.sv-card.urgent:hover { border-left-color: var(--danger); }
.sv-card.pending:hover { border-left-color: var(--warning); }
.sv-card.visited { border-left-color: var(--primary-light); }
.sv-card.visited:hover { border-left-color: var(--primary); }
/* Compact header: name + badges inline */
.sv-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.sv-card-name { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sv-card-badges { display: flex; gap: 4px; flex-wrap: nowrap; flex-shrink: 0; }
/* Subtitle line: agent + meta */
.sv-card-sub { font-size: 12px; color: var(--muted); margin-bottom: 2px; display: flex; align-items: center; gap: 6px; overflow: hidden; }
.sv-card-sub span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sv-card-last { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.sv-card-actions { display: flex; gap: 6px; padding-top: 6px; flex-wrap: nowrap; align-items: center; }
.sv-card-actions .sv-act-btn { padding: 4px 10px; min-height: 32px; font-size: 12px; }
.sv-card mark { background: #FEF3C7; color: inherit; padding: 0 2px; border-radius: 2px; }
.sv-card-quick { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
.sv-card-qbtn {
  width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s; padding: 0;
  text-decoration: none;
}
.sv-card-qbtn .icon { width: 15px; height: 15px; }
.sv-card-qbtn:hover, .sv-card-qbtn:active { background: var(--primary-bg); color: var(--primary); border-color: var(--primary); }
.sv-card-qbtn-rec { background: var(--primary-bg); color: var(--primary); border-color: rgba(37,99,235,.2); }
.sv-pinned-hdr { grid-column: 1/-1; font-size: 12px; font-weight: 700; color: var(--danger); padding: 2px 0 4px; display: flex; align-items: center; gap: 6px; }
.sv-pinned-hdr::after { content: ''; flex: 1; height: 1px; background: var(--danger); opacity: .25; }
.sv-section-sep { grid-column: 1/-1; font-size: 12px; font-weight: 700; color: var(--muted); padding: 8px 0 4px; display: flex; align-items: center; gap: 6px; }
.sv-section-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.sv-act-btn { background: #F0F7FF; color: var(--primary); border: 1px solid #C8DEFF; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; min-height: 36px; }
.sv-act-btn:hover { background: #DDF0FF; }

/* ── Agent Picker (代理店選択画面) ── */
.agent-picker { padding: 20px 16px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.agent-picker-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.agent-picker-title .icon { color: var(--primary); }
.agent-picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.agent-pick-card {
  background: var(--card); border: 2px solid var(--border); border-radius: var(--radius-md);
  padding: 14px 12px; cursor: pointer; text-align: center; transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.agent-pick-card:active { transform: scale(.97); }
.agent-pick-card:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
.agent-pick-card.selected { border-color: var(--primary); background: var(--primary-bg); }
.agent-pick-avatar {
  width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff; font-weight: 700; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.agent-pick-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.agent-pick-count { font-size: 11px; color: var(--muted); }
.agent-pick-all {
  background: var(--bg); border: 2px dashed var(--border); border-radius: var(--radius-md);
  padding: 14px 12px; cursor: pointer; text-align: center; transition: all .15s;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.agent-pick-all:hover { border-color: var(--primary); }
.agent-pick-all .icon { width: 28px; height: 28px; color: var(--muted); }
.agent-picker-back {
  display: inline-flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600;
  color: var(--primary); cursor: pointer; padding: 6px 12px; border-radius: var(--radius-sm);
  background: var(--primary-bg); border: none; margin-bottom: 10px;
}
.agent-picker-back:active { opacity: .7; }

/* ── Report View ── */
.report-view {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}
body.mode-report .layout { display: none; }
body.mode-report .search-view { display: none; }
body.mode-report .report-view { display: flex !important; }
body:not(.mode-report) .report-view { display: none !important; }
body.mode-home .layout { display: none; }
body.mode-home .search-view { display: none; }
body.mode-home #dashView { display: block !important; }
body:not(.mode-home) #dashView { display: none !important; }
body.mode-home .fab { display: none; }
body.mode-home .mobile-detail { display: none !important; }
body.mode-home .mobile-list-search { display: none !important; }
body.mode-home .mobile-filter-strip { display: none !important; }
body.mode-home .mobile-add-act-bar { display: none !important; }
body.mode-report .mobile-detail { display: none !important; }
body.mode-search .mobile-detail:not(.open) { visibility: hidden; }

.rp-toolbar {
  display: flex; align-items: center; gap: 0;
  background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%); color: white; padding: 10px 12px;
  flex-shrink: 0;
}
.rp-nav-btn {
  background: rgba(255,255,255,.18); border: none; color: white;
  width: 40px; height: 40px; border-radius: 50%; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.rp-nav-btn:active { opacity: .7; }
.rp-period-wrap { flex: 1; text-align: center; }
.rp-period { font-size: 15px; font-weight: 700; color: white; }
.rp-period-sub { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 1px; }

.rp-format-strip {
  display: flex; background: white; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.rp-fmt {
  flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 700;
  color: var(--muted); cursor: pointer; border: none; background: none;
  border-bottom: 3px solid transparent; transition: all .15s; font-family: inherit;
  min-height: 44px;
}
.rp-fmt.active { color: var(--primary); border-bottom-color: var(--primary); background: #ebf3ff; }

.rp-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 14px; padding-bottom: 0;
}
.rp-empty {
  text-align: center; padding: 60px 20px; color: var(--muted);
}

/* Report blocks */
.rp-section { margin-bottom: 16px; }
.rp-section-title {
  font-size: 13px; font-weight: 700; color: var(--primary);
  padding: 6px 10px; background: #ebf3ff; border-radius: 6px 6px 0 0;
  border-left: 3px solid var(--primary);
}
.rp-section-body {
  background: white; border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 6px 6px; padding: 10px 12px;
}
.rp-summary-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px;
}
.rp-stat {
  background: var(--bg); border-radius: 8px; padding: 10px 8px; text-align: center;
}
.rp-stat-val { font-size: 22px; font-weight: 700; color: var(--primary); }
.rp-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

.rp-day-block { margin-bottom: 12px; }
.rp-day-hdr {
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
.rp-act-row {
  display: flex; gap: 8px; padding: 7px 0;
  border-bottom: 1px solid var(--border); align-items: flex-start;
  font-size: 13px;
}
.rp-act-row:last-child { border-bottom: none; }
.rp-act-type {
  background: var(--primary); color: white; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;
  align-self: flex-start; margin-top: 1px;
}
.rp-act-type.t-電話  { background: #28A745; }
.rp-act-type.t-メール { background: #17a2b8; }
.rp-act-type.t-オンライン { background: #6f42c1; }
.rp-act-type.t-展示会 { background: #e65c00; }
.rp-act-type.t-体験会 { background: #e83e8c; }
.rp-act-name {
  font-weight: 700; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 90px; flex-shrink: 0; color: var(--text);
}
.rp-act-content { flex: 1; color: var(--text); line-height: 1.5; }
.rp-act-next { font-size: 11px; color: var(--primary); margin-top: 2px; }
.rp-follow-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.rp-follow-item:last-child { border-bottom: none; }
.rp-follow-date { font-size: 11px; color: var(--danger); font-weight: 700; flex-shrink: 0; }
.rp-method-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.rp-method-item:last-child { border-bottom: none; }
.rp-method-name { font-weight: 700; font-size: 12px; color: var(--primary); margin-bottom: 4px; }

.rp-memo-wrap {
  padding: 12px 14px 4px; flex-shrink: 0;
}
.rp-memo-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
.rp-memo {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--text);
  resize: none; min-height: 80px; outline: none; background: white;
}
.rp-memo:focus { border-color: var(--primary); }

.rp-action-bar {
  display: flex; gap: 8px; padding: 10px 14px 20px;
  background: white; border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* Desktop: report view also usable */
@media (min-width: 768px) {
  .report-view { display: none; }
  body.mode-report .layout { display: flex !important; }
}

/* ── Act detail toggle ── */
.act-detail-toggle {
  width: 100%; background: none; border: 1px dashed var(--border);
  border-radius: 8px; padding: 9px; color: var(--muted);
  font-size: 12px; cursor: pointer; text-align: center;
  margin-top: 4px; transition: all .15s;
}
.act-detail-toggle:hover { border-color: var(--primary); color: var(--primary); background: #f0f7ff; }
.act-details { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; display: flex; flex-direction: column; gap: 14px; }

/* ── Type Chips (horizontal scroll row) ── */
.type-chips {
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 4px;
}
.type-chips::-webkit-scrollbar { display: none; }
.type-chip {
  padding: 9px 16px; border-radius: 22px; font-size: 14px;
  border: 2px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; min-height: 44px;
  font-family: inherit; line-height: 1; white-space: nowrap; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 4px;
}
.type-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ── Follow Status Chips ── */
.fu-chips {
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 4px;
}
.fu-chips::-webkit-scrollbar { display: none; }
.fu-chip {
  padding: 9px 16px; border-radius: 22px; font-size: 14px;
  border: 2px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; min-height: 44px;
  font-family: inherit; line-height: 1; white-space: nowrap; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 4px;
}
.fu-chip.active[data-val="none"]    { background: #6C757D; color: white; border-color: #6C757D; }
.fu-chip.active[data-val="pending"] { background: #FFC107; color: #856404; border-color: #FFC107; }
.fu-chip.active[data-val="done"]    { background: var(--success); color: white; border-color: var(--success); }

/* ── Activity Log — New Input UI ── */
.act-section { margin-top: 14px; }
.act-section-lbl {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 4px;
}
/* 訪問結果 */
.act-result-row { display: flex; gap: 8px; }
.act-result-chip {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; padding: 11px 6px; border-radius: 12px;
  border: 2px solid var(--border); background: white; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700; min-height: 64px;
  transition: all .15s; color: var(--muted);
}
.act-result-chip .arc-ico { font-size: 22px; line-height: 1; }
.act-result-chip:hover { border-color: var(--primary); }
.act-result-chip[data-val="会えた"].active  { background: #e8f5e9; border-color: #28A745; color: #1a7a32; }
.act-result-chip[data-val="不在"].active    { background: #fff3f0; border-color: var(--danger); color: var(--danger); }
.act-result-chip[data-val="電話のみ"].active { background: #eef2ff; border-color: var(--primary); color: var(--primary); }
/* 話題チップ (multi-select) */
.act-topic-row { display: flex; flex-wrap: wrap; gap: 6px; }
.act-topic-chip {
  padding: 7px 13px; border-radius: 20px; font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; font-family: inherit;
}
.act-topic-chip.active { background: #eef2ff; border-color: var(--primary); color: var(--primary); }
/* 次回FUプリセット */
.act-fu-preset-row { display: flex; gap: 8px; }
.act-fu-preset {
  flex: 1; padding: 10px 4px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700;
  border: 2px solid var(--border); background: white; cursor: pointer;
  color: var(--muted); transition: all .15s; font-family: inherit;
  text-align: center; white-space: nowrap; min-height: 44px;
}
.act-fu-preset:hover { border-color: var(--primary); }
.act-fu-preset[data-d="7"].active { background: var(--success-bg); border-color: var(--success); color: #15803D; }
.act-fu-preset[data-d="14"].active { background: var(--warning-bg); border-color: var(--warning); color: #92400E; }
.act-fu-preset[data-d="30"].active { background: #FFF7ED; border-color: #F97316; color: #C2410C; }
.act-fu-preset[data-d="none"].active { background: #F1F5F9; border-color: #94A3B8; color: #475569; }
.act-fu-date-hint {
  margin-top: 6px; font-size: 11px; color: var(--muted);
  background: #f8f9fa; border-radius: 6px; padding: 5px 10px;
  display: none;
}
.act-fu-date-hint.show { display: block; }
/* Mobile Filter Strip ── */
.mobile-filter-strip {
  display: none; padding: 8px 14px 6px;
  background: var(--card); border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 6px; white-space: nowrap;
  flex-shrink: 0;
}
.mobile-filter-strip::-webkit-scrollbar { display: none; }
.mf-chip {
  display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--muted); transition: all .15s; min-height: 34px;
  font-family: inherit; white-space: nowrap;
}
.mf-chip .icon { flex-shrink: 0; }
.mf-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
.mf-sort {
  display: inline-flex; align-items: center; padding: 6px 14px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; min-height: 34px;
  font-family: inherit; white-space: nowrap; margin-left: 6px;
}
.mf-sort.active { border-color: var(--primary); color: var(--primary); }

/* ── Last Activity Info on cards ── */
.mb-card-last {
  font-size: 11px; color: var(--muted); margin-top: 4px;
  display: inline-flex; align-items: center; gap: 3px;
}
/* ── Long-term unvisited (60+ days) ── */
.mb-card.dormant { opacity: .55; }
.mb-card.dormant .mb-card-avatar { background: #adb5bd !important; }
.sv-card.dormant { opacity: .7; border-left-color: #cbd5e1; }
.dormant-tag { font-size: 10px; background: #e9ecef; color: #6c757d; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }

/* ── Home Dashboard ── */
.dash-wrap { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
.dash-greeting { font-size: 22px; font-weight: 800; margin-bottom: 4px; color: var(--text); }
.dash-date { font-size: 13px; color: var(--muted); margin-bottom: 20px; font-weight: 500; }
.dash-quick-actions { display: flex; gap: 8px; margin-bottom: 20px; }
.dash-quick-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 16px 8px; border-radius: var(--radius-md); border: none; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: 12px; transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.dash-quick-btn:active { transform: scale(.95); }
.dash-quick-btn .icon { width: 24px; height: 24px; }
.dash-quick-btn.qb-primary { background: linear-gradient(135deg, #2563EB, #3B82F6); color: white; box-shadow: 0 4px 12px rgba(37,99,235,.3); }
.dash-quick-btn.qb-secondary { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
.dash-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.dash-stat {
  background: var(--card); border-radius: var(--radius-md); padding: 16px;
  box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,.04);
  cursor: pointer; transition: transform .1s; -webkit-tap-highlight-color: transparent;
  display: flex; align-items: center; gap: 12px;
}
.dash-stat:active { transform: scale(.95); }
.dash-stat-icon {
  width: 40px; height: 40px; border-radius: 10px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.dash-stat-icon .icon { width: 20px; height: 20px; }
.dash-stat-body { flex: 1; min-width: 0; }
.dash-stat-num { font-size: 24px; font-weight: 800; line-height: 1.1; }
.dash-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 600; }
.dash-section { margin-bottom: 20px; }
.dash-section-title {
  font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.dash-section-title .icon { width: 16px; height: 16px; color: var(--muted); }
.dash-fu-item {
  display: flex; align-items: center; gap: 10px; padding: 14px;
  background: var(--card); border-radius: var(--radius-md); box-shadow: var(--shadow-xs);
  border: 1px solid rgba(0,0,0,.04);
  margin-bottom: 8px; cursor: pointer; transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.dash-fu-item:active { background: #f0f4f8; transform: scale(.98); }
.dash-fu-date { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: var(--radius-sm); white-space: nowrap; }
.dash-fu-date.overdue { background: var(--danger-bg); color: #B91C1C; }
.dash-fu-date.today { background: var(--warning-bg); color: #92400E; }
.dash-fu-date.upcoming { background: var(--primary-bg); color: var(--primary); }
.dash-fu-name { font-size: 14px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dash-fu-content { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
.dash-fu-arrow { color: var(--muted); flex-shrink: 0; }
.dash-fu-arrow .icon { width: 16px; height: 16px; }
#dashView {
  padding-top: var(--hdr-h); padding-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 14px);
  overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100vh; box-sizing: border-box;
  background: var(--bg);
}

/* ── Checkbox group (稼働メニューなど) ── */
.check-group {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
}
.check-opt {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px; font-size: 13px;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; user-select: none;
}
.check-opt input[type="checkbox"] { display: none; }
.check-opt.checked { background: var(--primary); color: white; border-color: var(--primary); }
.bool-opt {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 10px; font-size: 14px;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--muted); transition: all .15s; margin-top: 4px; user-select: none;
  width: 100%;
}
.bool-opt input[type="checkbox"] { display: none; }
.bool-opt .bool-icon { font-size: 16px; }
.bool-opt.checked { background: #d4edda; color: #155724; border-color: #28a745; }

/* ── Agent group header in mobile list ── */
.mb-agent-group-hdr {
  padding: 5px 14px 4px; font-size: 11px; font-weight: 700;
  color: var(--primary); background: #EEF4FB;
  border-bottom: 1px solid var(--border); letter-spacing: .04em;
}

/* ── FAB ── */
.fab {
  display: none;
  position: fixed; right: 20px;
  bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 16px);
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, #2563EB, #3B82F6); color: white;
  border: none; cursor: pointer; z-index: 200;
  box-shadow: 0 6px 20px rgba(37,99,235,.4);
  align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
.fab .icon { width: 26px; height: 26px; }
.fab:active { transform: scale(.92); box-shadow: 0 2px 8px rgba(37,99,235,.3); }

/* ── Bottom Navigation ── */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--bottom-nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(255,255,255,.97); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 -1px 12px rgba(0,0,0,.06);
  z-index: 150; flex-direction: row;
}
.bn-tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; color: var(--muted);
  font-size: 10px; font-weight: 600; transition: color .2s;
  border: none; background: none; padding: 6px 0 4px;
  min-height: 52px; -webkit-tap-highlight-color: transparent;
  position: relative;
}
.bn-tab.active { color: var(--primary); }
.bn-tab-ico {
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  border-radius: 12px; transition: all .2s; pointer-events: none;
}
.bn-tab.active .bn-tab-ico {
  background: var(--primary-bg); width: 48px;
  border-radius: 14px; padding: 2px 0;
}
.bn-tab .bn-tab-ico .icon { width: 22px; height: 22px; }
.bn-tab:active { opacity: .6; }
.bn-tab > * { pointer-events: none; }
.bn-tab-label { pointer-events: none; transition: all .2s; }

/* ── Mobile List View ── */
.mobile-list-search {
  display: none; padding: 10px 14px 8px;
  background: var(--card); border-bottom: 1px solid var(--border);
  /* Safe area padding for landscape notch */
  padding-left: max(14px, calc(14px + var(--safe-left)));
  padding-right: max(14px, calc(14px + var(--safe-right)));
}
.mobile-list-search input {
  width: 100%; padding: 10px 14px 10px 38px;
  border: 1px solid var(--border); border-radius: 24px;
  font-size: 16px; outline: none; font-family: inherit;
  background: var(--bg);
}
.mobile-list-search input:focus { border-color: var(--primary); background: white; }
.mobile-search-wrap { position: relative; }
.mobile-search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; }

/* ── Mobile Card ── */
.mb-card {
  padding: 14px 16px; background: var(--card);
  border-bottom: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; gap: 12px;
  min-height: 72px; transition: all .15s;
}
.mb-card:active { background: var(--primary-bg); transform: scale(.98); }
.mb-card-avatar {
  width: 44px; height: 44px; border-radius: var(--radius-md);
  background: linear-gradient(135deg, #2563EB, #60A5FA); color: white; font-size: 15px;
  font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(37,99,235,.2);
}
.mb-card-body { flex: 1; min-width: 0; }
.mb-card-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mb-card-sub { font-size: 12px; color: var(--muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mb-card-badges { display: flex; gap: 4px; flex-wrap: wrap; }
.mb-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.mb-card-arrow { color: var(--muted); }
.mb-card-arrow .icon { width: 16px; height: 16px; }
.mb-card-phone {
  background: var(--primary-bg); border: 1px solid rgba(37,99,235,.2); border-radius: var(--radius-sm);
  width: 36px; height: 36px; color: var(--primary);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  text-decoration: none; transition: all .15s;
}
.mb-card-phone .icon { width: 16px; height: 16px; }
.mb-card-phone:active { background: var(--primary); color: white; }

/* ── Mobile Detail View ── */
.mobile-detail {
  display: none; position: fixed; inset: 0;
  background: var(--bg); z-index: 120;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.mobile-detail.open {
  transform: translateX(0);
}
.mobile-detail-inner {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 14px calc(var(--bottom-nav-h) + var(--safe-bottom) + 14px);
}
/* sticky add-act button in mobile detail */
.mobile-add-act-bar {
  display: none;
  position: sticky; bottom: 0; left: 0; right: 0;
  padding: 10px 16px calc(10px + var(--safe-bottom)) 16px;
  background: var(--card);
  border-top: 1px solid var(--border); z-index: 10;
}
.mobile-add-act-bar .btn { width: 100%; font-size: 15px; min-height: 50px; }

/* ─────────────── MOBILE (≤767px) ─────────────── */
@keyframes modalSlideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

@media (max-width: 767px) {
  body { overflow: hidden; }

  /* ─ Hide desktop elements ─ */
  .mode-bar    { display: none; }
  .hdr-search  { display: none; }
  .hdr-add-btn { display: none; }

  /* ─ Header ─ */
  .hdr { padding: 0 6px 0 calc(6px + var(--safe-left)); gap: 2px; }
  .hdr-back { display: flex; min-width: 44px; min-height: 44px; }
  .hdr-back.hidden { display: none; }
  .hdr-title { display: none; }
  .hdr-title-center {
    display: block; flex: 1;
    font-size: 16px; font-weight: 700;
    text-align: center; color: white;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* ─ Header icon buttons: hide sell master on mobile (field users don't need it) ─ */
  #sellMasterBtn { display: none; }
  .hdr-btn-icon {
    width: 44px; height: 44px; border-radius: 10px;
    flex-shrink: 0;
  }
  .hdr-btn-icon:active { background: rgba(255,255,255,.35); transform: scale(.92); }

  /* ─ Layout: sidebar + main → mobile views ─ */
  .layout { overflow: hidden; position: relative; }
  .sidebar { display: none; }
  .main    { display: none; }

  /* ─ Mobile list ─ */
  .mobile-list-search { display: block; }
  .mobile-filter-strip { display: flex; }
  .mb-list-wrap {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column;
  }

  /* ─ Mobile detail ─ */
  .mobile-detail { display: flex; }

  /* ─ Bottom nav ─ */
  .bottom-nav { display: flex; }

  /* ─ FAB ─ */
  .fab { display: flex; }
  body.mode-search .fab { display: none; }
  body.mode-report .fab { display: none; }

  /* ─ Content area bottom margin ─ */
  .layout, .search-view {
    margin-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom));
  }

  /* ─ Modal → Bottom sheet (near fullscreen) ─ */
  .overlay { align-items: flex-end; padding: 0; }
  .overlay.open { display: flex; }
  .modal {
    width: 100%; max-width: 100%;
    border-radius: 20px 20px 0 0;
    max-height: 95vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .overlay.open .modal { animation: modalSlideUp .26s cubic-bezier(.32,.72,0,1); }
  /* Drag handle */
  .modal::before {
    content: ''; display: block; flex-shrink: 0;
    width: 36px; height: 4px;
    background: #d0d5dd; border-radius: 2px;
    margin: 10px auto 0;
  }
  .modal-hdr { position: static; }
  .modal-body {
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 16px 18px; flex: 1;
    overscroll-behavior: contain;
  }
  .modal-footer {
    padding: 12px 18px calc(16px + var(--safe-bottom));
    box-shadow: 0 -2px 10px rgba(0,0,0,.06);
  }

  /* ─ Search view ─ */
  .sv-toolbar { padding: 10px 12px; gap: 4px; }
  .sv-row1 { flex-wrap: nowrap; gap: 6px; }
  .sv-search input { font-size: 16px; }
  .sv-count { display: none; } /* 件数はチップ内で見せる */
  .sv-filter { flex-shrink: 0; font-size: 14px; }
  .sv-quick-row { padding: 4px 0 2px; gap: 5px; }
  .sv-qchip { padding: 5px 10px; font-size: 11px; }
  .sv-detail-panel { padding: 6px 0 2px; }
  .sv-grid {
    grid-template-columns: 1fr; padding: 8px 10px; gap: 8px;
    padding-bottom: calc(var(--bottom-nav-h) + var(--safe-bottom) + 12px);
  }
  /* Search card compact on mobile */
  .sv-card { padding: 8px 12px; }
  .sv-card-name { font-size: 14px; }
  .sv-card-actions { padding-top: 4px; }
  .sv-card-actions { gap: 6px; }
  .sv-card-actions .btn { min-height: 36px; font-size: 12px; padding: 6px 12px; }
  .sv-act-btn { min-height: 36px; font-size: 12px; padding: 6px 12px; }

  /* ─ Sticky add activity bar ─ */
  .mobile-add-act-bar { display: block; }

  /* ─ Profile ─ */
  .profile { flex-direction: column; align-items: center; text-align: center; }
  .profile-actions { width: 100%; justify-content: center; margin-top: 4px; }
  .profile-name { font-size: 18px; }

  /* ─ Stats 2 cols ─ */
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-grid > .stat:last-child { grid-column: 1 / -1; }

  /* ─ Info grid 1 col ─ */
  .info-grid { grid-template-columns: 1fr; }

  /* ─ Table scroll ─ */
  .card-body { padding: 10px 12px; }
  .card-body table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* ─ Tabs: bigger touch target ─ */
  .tab { font-size: 13px; padding: 13px 6px; }
  .tabs { gap: 2px; }

  /* ─ Form ─ */
  .frow { grid-template-columns: 1fr; }
  .finput   { font-size: 16px; min-height: 44px; }
  .tag-field { font-size: 16px; }
  select.finput { min-height: 44px; }

  /* ─ Activity form chips: bigger tap targets ─ */
  .type-chip  { min-height: 44px; padding: 9px 14px; }
  .fu-chip    { min-height: 44px; padding: 9px 14px; }
  .act-result-chip { min-height: 68px; }
  .act-topic-chip  { min-height: 40px; padding: 9px 14px; }
  .act-fu-preset   { min-height: 48px; font-size: 13px; }

  /* ─ Mobile card touch feedback ─ */
  .mb-card:active { background: #dce8f5; transform: scale(.98); }
  .sv-card { transition: transform .1s; }
  .sv-card:active { background: #f0f5fc; transform: scale(.98); }

  /* ─ Header: hide non-essential buttons on home ─ */
  body.mode-home #sellMasterBtn,
  body.mode-home #loadBtn,
  body.mode-home .hdr-reload-wrap,
  body.mode-home .hdr-search,
  body.mode-home .hdr-add-btn { display: none !important; }

  /* ─ Scroll snap for type-chips on narrow screens ─ */
  .type-chips { scroll-snap-type: x proximity; padding: 0 2px 4px; }
  .type-chip  { scroll-snap-align: start; }
}

/* ─────────────── TABLET (768px – 1023px) ─────────────── */
@media (min-width: 768px) and (max-width: 1023px) {
  :root { --sidebar: 210px; }
  .mode-bar { font-size: 13px; }
  .mode-tab-top { padding: 0 14px; }
  .main { padding: 14px; }
  /* Single-column search on narrow tablet */
  .sv-grid { grid-template-columns: 1fr; }
  /* Tighter sidebar items */
  .sb-item { padding: 9px 10px; }
  .sb-name { font-size: 12px; }
}

/* ─────────────── DESKTOP (≥768px) ─────────────── */
@media (min-width: 768px) {
  .bottom-nav          { display: none; }
  .fab                 { display: none; }
  .mobile-list-search  { display: none; }
  .mb-list-wrap        { display: none; }
  .mobile-detail       { display: none !important; }
  .mobile-add-act-bar  { display: none !important; }
  .sidebar             { display: flex; }
  .main                { display: block; }
  .hdr-back            { display: none !important; }
  .hdr-title           { display: block; }
  .hdr-title-center    { display: none !important; }
  .hdr-search          { display: block; }
  .hdr-add-btn         { display: flex; }
  .hdr-btn-icon        { display: none; }
}

/* ─────────────── LARGE DESKTOP (≥1280px) ─────────────── */
@media (min-width: 1280px) {
  :root { --sidebar: 300px; }
  .sv-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
}

/* ─── Header reload wrap + cache age label ─── */
.hdr-reload-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0;
}
.hdr-cache-age {
  font-size: 9px; color: rgba(255,255,255,.65); line-height: 1;
  white-space: nowrap; display: none; margin-top: -2px;
}
@media (max-width: 767px) {
  .hdr-cache-age { display: block; }
}

/* ─────────────── Toast Notification ─────────────── */
#toastWrap {
  position: fixed; top: calc(var(--header-h) + 8px + var(--safe-top));
  left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 6px;
  pointer-events: none; width: calc(100% - 32px); max-width: 420px;
}
.toast {
  padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
  color: white; box-shadow: 0 4px 16px rgba(0,0,0,.22);
  display: flex; align-items: center; gap: 10px;
  animation: toastIn .22s ease; pointer-events: auto;
  transition: opacity .3s;
}
.toast.info    { background: var(--primary); }
.toast.success { background: var(--success); }
.toast.error   { background: var(--danger); }
.toast.warn    { background: var(--warning); color: #333; }
.toast-msg     { flex: 1; }
.toast-btn {
  background: rgba(255,255,255,.25); border: none; border-radius: 8px;
  padding: 5px 10px; font-size: 12px; font-weight: 700; color: inherit;
  cursor: pointer; white-space: nowrap;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

</style>
</head>
<body class="mode-agent">
<div id="toastWrap"></div>

<!-- ── Header ── -->
<div class="hdr">
  <button class="hdr-back hidden" id="hdrBack" onclick="mobileBack()">‹</button>
  <div class="hdr-title" id="hdrTitle">📋 代理店カルテ</div>
  <div class="hdr-title-center" id="hdrTitleCenter">代理店カルテ</div>
  <div class="hdr-search">
    <span class="hdr-search-ico">🔍</span>
    <input type="text" id="searchInput" placeholder="担当者名・会社名で検索..." oninput="renderSidebar(); renderMobileList()">
  </div>
  <button class="hdr-btn-icon" id="sellMasterBtn" onclick="loadSellMaster()" title="売上マスター取込"><svg class="icon"><use href="#i-bar-chart"/></svg></button>
  <button class="hdr-btn-icon" id="loadBtn" onclick="loadFromSheet()" title="スプレッドシートから追加読込"><svg class="icon"><use href="#i-download"/></svg></button>
  <div class="hdr-reload-wrap">
    <button class="hdr-btn-icon" id="reloadBtn" onclick="reloadFromSheet()" title="データを再読込（ローカルをリセット）"><svg class="icon"><use href="#i-refresh"/></svg></button>
    <span class="hdr-cache-age" id="cacheAgeLabel"></span>
  </div>
  <button class="hdr-btn hdr-add-btn" onclick="openAddModal()">＋ 新規登録</button>
</div>

<!-- ── Mode Bar (Desktop) ── -->
<div class="mode-bar">
  <div class="mode-tab-top active" id="tabAgent" onclick="switchMode('agent')">代理店カルテ</div>
  <div class="mode-tab-top" id="tabSalon" onclick="switchMode('search')">サロンカルテ</div>
  <div class="mode-tab-top" id="tabSearch" onclick="switchMode('search')" style="display:none"></div>
</div>

<!-- ── Desktop Layout ── -->
<div class="layout">
  <div class="sidebar">
    <div class="sb-count" id="sbCount">0名</div>
    <div class="sb-filter-bar" id="sbFilterBar" style="display:none">
      <div class="sb-chips">
        <button class="mf-chip active" onclick="setSbFilter('all',this)">すべて</button>
        <button class="mf-chip" onclick="setSbFilter('follow',this)">⚠ 要フォロー</button>
        <button class="mf-chip" onclick="setSbFilter('watch',this)">👁 要観察</button>
      </div>
      <div class="sb-sort-row">
        <select class="sb-sel" id="sbSort" onchange="renderSidebar()">
          <option value="name">↕ 名前順</option>
          <option value="recent">↕ 最終活動順</option>
          <option value="follow">↕ フォロー優先</option>
        </select>
        <select class="sb-sel" id="sbArea" onchange="renderSidebar()">
          <option value="">エリア: すべて</option>
        </select>
      </div>
    </div>
    <div class="sb-list" id="sbList"></div>
  </div>
  <div class="main" id="main">
    <div class="empty">
      <div class="empty-ico"><svg class="icon" style="width:44px;height:44px"><use href="#i-clipboard"/></svg></div>
      <div class="empty-title">カルテを選択してください</div>
      <div style="font-size:13px">左から担当者を選ぶか、新規登録してください</div>
    </div>
  </div>
</div>

<!-- ── Mobile List View (inside layout via absolute/fixed) ── -->
<div id="mobileListView" style="display:none; flex-direction:column; position:fixed; top:0; left:0; right:0; bottom:0; z-index:50; background:var(--bg); padding-top:calc(var(--header-h)); flex:1;">
  <div class="mobile-list-search">
    <div class="mobile-search-wrap">
      <span class="mobile-search-ico">🔍</span>
      <input type="text" id="mobileSearchInput" placeholder="名前・会社名で検索..." oninput="syncMobileSearch()">
    </div>
  </div>
  <div class="mobile-filter-strip" id="mobileFilterStrip">
    <button class="mf-chip active" data-filter="all"   onclick="setMobileFilter('all',this)">すべて</button>
    <button class="mf-chip"        data-filter="follow" onclick="setMobileFilter('follow',this)"><svg class="icon icon-sm"><use href="#i-alert-tri"/></svg> 要フォロー</button>
    <button class="mf-chip"        data-filter="watch"  onclick="setMobileFilter('watch',this)"><svg class="icon icon-sm"><use href="#i-eye"/></svg> 要観察</button>
    <button class="mf-sort" id="mfSort" onclick="toggleMobileSort()">↕ 名前順</button>
  </div>
  <div class="mb-list-wrap" id="mbListWrap" style="overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; padding-bottom:var(--bottom-nav-h);">
    <!-- populated by renderMobileList() -->
  </div>
</div>

<!-- ── Mobile Detail View ── -->
<div class="mobile-detail" id="mobileDetail">
  <div class="mobile-detail-inner" id="mobileDetailInner">
    <!-- populated by renderMain() mirrored content -->
  </div>
  <!-- Sticky Add Activity Bar -->
  <div class="mobile-add-act-bar" id="mobileAddActBar" style="display:none">
    <button class="btn btn-primary" onclick="openActModal()">＋ 活動ログを追加</button>
  </div>
</div>

<!-- ── Search View ── -->
<div class="search-view">
  <div class="sv-toolbar">
    <div class="sv-row1">
      <div class="sv-search">
        <span class="sv-search-ico"><svg class="icon"><use href="#i-search"/></svg></span>
        <input type="text" id="svSearch" placeholder="サロン名・担当者名・住所で検索..." oninput="debouncedSearch();toggleSearchClear()" onfocus="showRecentSearches()" onblur="setTimeout(()=>hideRecentSearches(),200)">
        <button class="sv-search-clear" id="svSearchClear" onclick="clearSearchInput()"><svg class="icon"><use href="#i-x"/></svg></button>
        <div class="sv-recent" id="svRecent"></div>
      </div>
      <span class="sv-count" id="svCount"></span>

<script>
// ── Google Sheets 同期設定 ──────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz6FB5_j1qoBDdYOq3SdMD_DIZq1Ljyt4SwVS10qlqbDfyqKUoxpvp-ehu0qt1pY1xKfw/exec';
const SELL_MASTER_GAS_URL = 'https://script.google.com/macros/s/AKfycbziWzeWpYwdm7TAL3woS_a0F0lU_JZ8CHx8HaHAuBiUL-QE9TPkJ52bW9HM3l2PxsdW/exec';
// ▼ 営業登録サロン用GAS（新タブ「営業登録サロン」へUPSERT）
const SALES_REG_GAS_URL = 'https://script.google.com/macros/s/AKfycbzooGRW5tsc-TKc59CdNTHlfuEnaKhmbsk0Z736iywR5Ohx1MRGwZkiC2DDnx4Che-JEA/exec';

// ── Toast 通知 ──────────────────────────────────────
function showToast(msg, type = 'info', action = null, duration = 4000) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-msg">${msg}</span>`;
  if (action) {
    const btn = document.createElement('button');
    btn.className = 'toast-btn';
    btn.textContent = action.label;
    btn.onclick = () => { action.fn(); el.remove(); };
    el.appendChild(btn);
  }
  wrap.appendChild(el);
  if (duration > 0) setTimeout(() => { el.style.opacity='0'; setTimeout(() => el.remove(), 300); }, duration);
  return el;
}

// ── Fetch with timeout ──────────────────────────────
async function fetchWithTimeout(url, timeout = 20000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), timeout);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    return res;
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

// ── GASフェッチキャッシュ管理（クォータ節約） ────────
const CACHE_TTL   = 24 * 60 * 60 * 1000; // 24時間（GAS上限節約のため1日1回同期）
const CACHE_TS_KEY = 'karte_gas_fetch_ts';
const QUOTA_HIT_KEY = 'karte_gas_quota_hit';

function isCacheFresh() {
  const ts = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
  return ts > 0 && (Date.now() - ts) < CACHE_TTL;
}
function isQuotaBlocked() {
  const ts = parseInt(localStorage.getItem(QUOTA_HIT_KEY) || '0');
  if (!ts) return false;
  // GAS quotaは太平洋時間の午前0時(JST 16-17時)にリセット。4時間ブロック後に自動解除
  return (Date.now() - ts) < 4 * 60 * 60 * 1000;
}
function markQuotaHit() {
  localStorage.setItem(QUOTA_HIT_KEY, String(Date.now()));
  markCacheFresh(); // キャッシュも有効化して自動読込も抑止
}
function clearQuotaBlock() {
  localStorage.removeItem(QUOTA_HIT_KEY);
}
function markCacheFresh() {
  localStorage.setItem(CACHE_TS_KEY, String(Date.now()));
  updateCacheAgeLabel();
}
function cacheAgeText() {
  const ts = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
  if (!ts) return null;
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1)  return 'たった今';
  if (mins < 60) return `${mins}分前`;
  return `${Math.floor(mins / 60)}時間前`;
}
function updateCacheAgeLabel() {
  const el = document.getElementById('cacheAgeLabel');
  if (!el) return;
  const age = cacheAgeText();
  el.textContent = age ? age : '';
}
// 1分ごとにラベルを更新
setInterval(updateCacheAgeLabel, 60000);

// ── エラーメッセージを日本語に変換 ──────────────────
function friendlyError(e) {
  const msg = (e && e.message) || '';
  if (/quota/i.test(msg))      return 'GASの1日利用上限に達しました。時間をおいてから再試行してください。';
  if (/abort|timeout/i.test(msg)) return 'サーバーへの接続がタイムアウトしました。ネットワークを確認してください。';
  if (/failed to fetch|network/i.test(msg)) return 'ネットワークエラー。通信状況を確認してください。';
  if (/HTTP 4/i.test(msg))     return 'サーバーエラー（アクセス不可）。しばらくしてから再試行してください。';
  if (/HTTP 5/i.test(msg))     return 'サーバーエラー。しばらくしてから再試行してください。';
  return msg || '不明なエラーが発生しました。';
}

// ── confirm の代わりに使えるシンプルなモーダル ──────
function confirmAction(msg, onOk) {
  // iOSではconfirmが問題なく動くので引き続き使用
  if (window.confirm(msg)) onOk();
}

// サロンIDマッピング行 → オブジェクト変換
// 文字化け(U+FFFD)除去ユーティリティ
const cleanStr = s => typeof s === 'string' ? s.replace(/\uFFFD/g, '') : s;

function parseSalonRow(row) {
  // サロンIDマッピングシートのカラム構造に対応
  // ["代理店名","代理店サロンコード","代理店サロン名","サロンID（自社）","サロン名（自社）","確認ステータス","備考"]
  const _companyRaw = cleanStr(String(row['サロン名（自社）'] || row['サロン名'] || ''));
  // 数字のみ・空白のみのサロン名は無効データとして除外
  const company = /^\d+$/.test(_companyRaw.trim()) ? '' : _companyRaw;
  const kamidoraId = String(row['サロンID（自社）'] || row['髪ドラID'] || '');
  const salonId = String(row['サロンID'] || '');
  // 代理店名も郵便番号（数字・ハイフンのみ）は除外
  const _agentRaw = String(row['代理店名'] || row['担当代理店'] || row['担当代理店'] || '');
  const agentNameVal = /^[\d\-]+$/.test(_agentRaw.trim()) ? '' : _agentRaw;
  return {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    salonId,
    kamidoraId,
    company,
    companyKana:  cleanStr(String(row['サロン名ふりがな'] || row['サロン名フリガナ'] || row['ふりがな'] || '')),
    legalName:    cleanStr(String(row['法人名']             || '')),
    name:         cleanStr(String(row['代表者/担当者']       || '')),
    phone:        cleanStr(String(row['電話番号']             || '')),
    address:      cleanStr(String(row['所在地']               || '')),
    hpbUrl:       String(row['HPBリンク']            || ''),
    agentName:    normalizeAgentName(agentNameVal),
    agentBranch:  String(row['代理店支店']           || ''),
    agentContact: String(row['代理店担当者']         || ''),
    salesRep:     String(row['担当営業']             || ''),
    salonType:    String(row['サロンタイプ']         || ''),
    target:       String(row['ターゲット層']         || ''),
    staffCount:   parseInt(row['スタッフ数'])       || 0,
    groupStores:  parseInt(row['グループ店舗数'])   || 0,
    annualTarget: String(row['年間取引額目安']       || ''),
    memo:         String(row['備考'] || row['メモ'] || ''),
    activities: [], sales: [], tags: [],
    status: 'active', title: '', email: '', area: '',
    targetSistri: 0, targetSales: 0,
  };
}

// 代理店行 → オブジェクト変換
function parseAgentRow(row) {
  return {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),

    memo:     String(row['メモ']      || row['memo']     || ''),

    status: 'active', targetSistri: 0, targetSales: 0,

// マージ共通処理（key=company で重複排除）- 代理店用
function mergeByCompanyName(existing, loaded) {
  const names = new Set(existing.map(p => p.company));
  const merged = [...existing];
  let added = 0;
  for (const p of loaded) {
    if (p.company && !names.has(p.company)) { merged.push(p); names.add(p.company); added++; }
  }
  return { merged, added };
}

// サロン用マージ（salonId優先 → サロン名フォールバック）
function mergeSalons(existing, loaded) {
  const bySalonId  = {};
  const byCompany  = {};
  existing.forEach(p => {
    if (p.salonId)  bySalonId[p.salonId]   = p;
    if (p.company)  byCompany[p.company]   = p;
  });
  const merged = [...existing];
  let added = 0;
  for (const p of loaded) {
    if (p.salonId && bySalonId[p.salonId]) {
      // 既存レコードに不足情報を補完
      const ex = bySalonId[p.salonId];
      if (!ex.company    && p.company)    ex.company    = p.company;
      if (!ex.agentName  && p.agentName)  ex.agentName  = p.agentName;
      if (!ex.kamidoraId && p.kamidoraId) ex.kamidoraId = p.kamidoraId;
    } else if (p.company && byCompany[p.company]) {
      // 会社名一致 → salonId を付与
      const ex = byCompany[p.company];
      if (!ex.salonId && p.salonId) { ex.salonId = p.salonId; bySalonId[p.salonId] = ex; }
    } else if (p.company) {
      merged.push(p);
      if (p.salonId) bySalonId[p.salonId] = p;
      byCompany[p.company] = p;
      added++;
    }
  }
  return { merged, added };
}

// 起動時サイレント自動ロード（alert なし・リトライあり・キャッシュ対応）
async function autoLoadFromSheet(isRetry = false) {
  // キャッシュが新鮮かつローカルデータあり → GAS呼び出しをスキップ
  const hasSalon = (JSON.parse(localStorage.getItem('karte_salon_v1') || '[]')).length > 0;
  const hasAgent = (JSON.parse(localStorage.getItem('karte_agent_v1') || '[]')).length > 0;
  if ((isCacheFresh() || isQuotaBlocked()) && hasSalon) {
    console.log(`[Cache] GASスキップ（最終取得: ${cacheAgeText()}${isQuotaBlocked() ? ' / quota制限中' : ''}）`);
    return; // レンダリングは起動時に既に実行済み
  }
  // ローディング表示
  const loadingToast = !hasSalon ? showToast('📡 データを取得しています…', 'info', null, 0) : null;
  try {
    // サロンは「営業登録サロン」タブのみを参照（旧サロンIDマッピング/サロンマスターは廃止）
    const hasSalesReg = SALES_REG_GAS_URL && !/PASTE_YOUR/.test(SALES_REG_GAS_URL);
    const fetches = [
      fetchWithTimeout(GAS_URL + '?action=getAll&type=agent'),
    ];
    if (hasSalesReg) fetches.push(fetchWithTimeout(SALES_REG_GAS_URL + '?action=getAll'));
    const responses = await Promise.all(fetches);
    const jsons = await Promise.all(responses.map(r => r.json()));
    const [aJson, srJson] = jsons;

    // サロン: 既存ローカル（活動ログ等の保持）+ 営業登録サロンの最新を反映
    let existing = JSON.parse(localStorage.getItem('karte_salon_v1') || '[]');
    if (srJson && srJson.ok && srJson.data && srJson.data.length > 0) {
      const loaded = srJson.data.map(parseSalonRow).filter(p => p.company || p.salonId);
      const idMap = new Map(existing.map(p => [p.salonId, p]));
      loaded.forEach(p => {
        if (p.salonId && idMap.has(p.salonId)) {
          // 既存の活動ログ等は保持しつつ、シート側の値で上書き
          Object.assign(idMap.get(p.salonId), p);
        } else {
          existing.push({ ...p, _salesRegistered: true });
        }
      });
    }
    localStorage.setItem('karte_salon_v1', JSON.stringify(existing));
    salonPeople = existing;

    if (aJson.ok && aJson.data && aJson.data.length > 0) {
      const loaded = aJson.data.map(parseAgentRow).filter(p => p.company);
      const existingA = JSON.parse(localStorage.getItem('karte_agent_v1') || '[]');
      const { merged } = mergeByCompanyName(existingA, loaded);
      localStorage.setItem('karte_agent_v1', JSON.stringify(merged));
      agentPeople = merged;
    }
    markCacheFresh();
    if (loadingToast) loadingToast.remove();
    renderSidebar(); renderMobileList(); renderMain();
    refreshAgentList();
  } catch(e) {
    if (loadingToast) loadingToast.remove();
    console.warn('自動読込スキップ:', e.message);
    const isQuota = /quota/i.test(e.message || '');

    // どのエラーでもキャッシュを有効化して連続呼び出しを防止
    markCacheFresh();
    if (isQuota) markQuotaHit();

    // ローカルデータがあれば静かにそれを使う
    const cachedSalon = JSON.parse(localStorage.getItem('karte_salon_v1') || '[]');
    if (cachedSalon.length > 0) {
      salonPeople = cachedSalon;
      agentPeople = JSON.parse(localStorage.getItem('karte_agent_v1') || '[]');
      renderSidebar(); renderMobileList(); renderMain();
      refreshAgentList();
      // 小さな通知のみ（赤バナーは出さない）
      console.log('GASエラーのためローカルデータを使用:', e.message);
    } else {
      // データなし → エラートースト
      showToast(friendlyError(e), 'error', { label: '再試行', fn: () => { clearQuotaBlock(); localStorage.removeItem(CACHE_TS_KEY); autoLoadFromSheet(false); } }, 0);
    }
  }
}

function mergeSellMaster(salons, sales) {
  let salonAdded = 0, salesUpdated = 0;

  // ① サロン一覧をマージ（kamidoraId で照合）
  salons.forEach(s => {
    const exists = salonPeople.find(p => p.kamidoraId === s.salonId);
    if (!exists) {
      salonPeople.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2),
        kamidoraId:   s.salonId,
        company:      s.salonName,
        agentName:    s.agentName,
        legalName: '', name: '', phone: '', address: '', hpbUrl: '',
        agentBranch: '', agentContact: '', salesRep: '', salonType: '',
        target: '', staffCount: 0, groupStores: 0, annualTarget: '',
        memo: '', activities: [], sales: [], tags: [],
        status: 'active', title: '', email: '', area: '',
        targetSistri: 0, targetSales: 0,
      });
      salonAdded++;
    } else {
      if (!exists.agentName && s.agentName) exists.agentName = s.agentName;
      if (!exists.company && s.salonName)   exists.company   = s.salonName;
    }
  });

  // ② 月別販売実績を上書き（スプシを正とする）
  sales.forEach(s => {
    const salon = salonPeople.find(p => p.kamidoraId === s.salonId);
    if (!salon) return;
    salon.sales = salon.sales || [];
    const idx = salon.sales.findIndex(x => x.ym === s.ym);
    const entry = {
      ym:     s.ym,
      sistri: s.qty,
      sales:  Math.round(s.amount / 10000 * 10) / 10, // 円 → 万円
      memo:   idx >= 0 ? (salon.sales[idx].memo || '') : '',
    };
    if (idx >= 0) salon.sales[idx] = entry;
    else          salon.sales.push(entry);
    salesUpdated++;
  });

  // localStorage に反映
  localStorage.setItem('karte_salon_v1', JSON.stringify(salonPeople));
  return { salonAdded, salesUpdated };
}

// 活動ログを MAPPING_SS の「活動ログ」シートに同期（リトライ付き）
const _syncQueue = JSON.parse(localStorage.getItem('karte_sync_queue') || '[]');

function syncActivityToSheet(person, activity, retryCount = 0) {
  const payload = {
    type: 'activity',
    record: {
      date:         activity.date       || '',
      salonId:      person.salonId      || person.kamidoraId || '',
      salonName:    person.company      || '',
      personName:   activity.repName    || activity.lecturer || '',
      activityType: activity.type       || '',
      activityKind: activity.kind       || '',
      result:       activity.result     || '',
      topics:       activity.topics     || '',
      content:      activity.content    || '',
      next:         activity.next       || '',
      nextDate:     activity.fuDate     || '',
      fuStatus:     activity.fuStatus   || '',
      salesRep:     person.salesRep     || '',
      agentName:    person.agentName    || '',
    },
  };
  showSyncStatus('syncing');
  fetch(SELL_MASTER_GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload),
  }).then(() => {
    // no-cors returns opaque response; treat as success
    showSyncStatus('ok');
    // Remove from queue if it was a retry
    const idx = _syncQueue.findIndex(q => q.record.date === payload.record.date && q.record.salonId === payload.record.salonId && q.record.content === payload.record.content);
    if (idx >= 0) { _syncQueue.splice(idx, 1); localStorage.setItem('karte_sync_queue', JSON.stringify(_syncQueue)); }
  }).catch(err => {
    console.warn('活動ログ同期失敗:', err);
    if (retryCount < 2) {
      setTimeout(() => syncActivityToSheet(person, activity, retryCount + 1), 3000 * (retryCount + 1));
      showSyncStatus('retrying');
    } else {
      // Save to queue for later retry
      _syncQueue.push(payload);
      localStorage.setItem('karte_sync_queue', JSON.stringify(_syncQueue));
      showSyncStatus('error');
    }
  });
}

function showSyncStatus(state) {
  let el = document.getElementById('syncStatusToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'syncStatusToast';
    el.style.cssText = 'position:fixed;bottom:calc(var(--bottom-nav-h,62px) + env(safe-area-inset-bottom,0px) + 12px);left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius-md,12px);font-size:13px;font-weight:600;z-index:9999;transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);';
    document.body.appendChild(el);
  }
  const svgIcon = (id, size='14') => `<svg style="width:${size}px;height:${size}px;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#i-${id}"/></svg>`;
  if (state === 'syncing') {
    el.innerHTML = svgIcon('refresh') + ' 同期中…';
    el.style.background = '#FFFBEB'; el.style.color = '#92400E'; el.style.opacity = '1';
  } else if (state === 'retrying') {
    el.innerHTML = svgIcon('refresh') + ' 再送中…';
    el.style.background = '#FFFBEB'; el.style.color = '#92400E'; el.style.opacity = '1';
  } else if (state === 'ok') {
    el.innerHTML = svgIcon('check-circle') + ' 同期完了';
    el.style.background = '#F0FDF4'; el.style.color = '#166534'; el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 2000);
  } else if (state === 'error') {
    el.innerHTML = svgIcon('alert-tri') + ' 同期失敗（後で再送します）';
    el.style.background = '#FEF2F2'; el.style.color = '#991B1B'; el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 4000);
  }
}

// Auto-retry sync queue when coming back online
if (typeof window !== 'undefined') {
  window.addEventListener('online', () => {
    if (_syncQueue.length) {
      showSyncStatus('retrying');
      retrySyncQueue();
    }
  });
}

function retrySyncQueue() {
  if (!_syncQueue.length) return;
  const items = [..._syncQueue];
  items.forEach(payload => {
    const fakePerson = { salonId: payload.record.salonId, kamidoraId: '', company: payload.record.salonName };
    const fakeAct = { date: payload.record.date, repName: payload.record.personName, lecturer: '', type: payload.record.activityType, kind: payload.record.activityKind, content: payload.record.content, next: payload.record.next, fuDate: payload.record.nextDate, fuStatus: payload.record.fuStatus };
    syncActivityToSheet(fakePerson, fakeAct);
  });
}
