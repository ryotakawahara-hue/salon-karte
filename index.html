<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代理店営業カルテ</title>
<style>
:root {
  --primary: #2D5A8E;
  --primary-light: #3A71B0;
  --success: #28A745;
  --warning: #FFC107;
  --danger: #DC3545;
  --bg: #F0F2F5;
  --card: #FFFFFF;
  --border: #E0E4E8;
  --text: #2C3E50;
  --muted: #7F8C8D;
  --sidebar: 270px;
  --bottom-nav-h: 56px;
  --header-h: 54px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  font-size: 15px;
}

/* ── Active feedback ── */
button:active, a:active, [onclick]:active { opacity: .75; transform: scale(.98); }

/* ── Mode bar (desktop only) ── */
.mode-bar {
  display: flex; background: #1E3F63; flex-shrink: 0;
  padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,.12);
}
.mode-tab-top {
  padding: 8px 20px; font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,.55); cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .15s;
}
.mode-tab-top.active { color: white; border-bottom-color: #7BAFD4; }
.mode-tab-top:hover:not(.active) { color: rgba(255,255,255,.85); }

/* ── Mode-specific visibility ── */
body.mode-agent .salon-only { display: none !important; }
body.mode-salon .agent-only { display: none !important; }

/* ── Header ── */
.hdr {
  background: var(--primary); color: white;
  height: var(--header-h); padding: 0 12px;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,.25); z-index: 100; flex-shrink: 0;
}
.hdr-back {
  display: none; background: none; border: none; color: white;
  font-size: 22px; cursor: pointer; padding: 0 6px;
  min-width: 44px; min-height: 44px; align-items: center; justify-content: center;
}
.hdr-title { font-size: 17px; font-weight: 700; white-space: nowrap; flex: 1; }
.hdr-title-center { display: none; }
.hdr-search { flex: 1; max-width: 380px; position: relative; }
.hdr-search input {
  width: 100%; padding: 7px 10px 7px 32px;
  border: none; border-radius: 18px; background: rgba(255,255,255,.2);
  color: white; font-size: 13px; outline: none;
}
.hdr-search input::placeholder { color: rgba(255,255,255,.65); }
.hdr-search input:focus { background: rgba(255,255,255,.3); }
.hdr-search-ico { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 14px; }
.hdr-btn {
  background: white; color: var(--primary); border: none;
  padding: 6px 14px; border-radius: 18px;
  font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
  min-height: 44px; display: flex; align-items: center;
}
.hdr-btn:hover { background: #eee; }
.hdr-btn-icon {
  background: rgba(255,255,255,.18); color: white; border: none;
  width: 44px; height: 44px; border-radius: 50%;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.hdr-add-btn { display: block; }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar); background: var(--card);
  border-right: 1px solid var(--border); display: flex;
  flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.sb-count { padding: 6px 12px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
.sb-list { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.sb-item {
  padding: 11px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
}
.sb-item:hover { background: #f8f9fa; }
.sb-item.active { background: #ebf3ff; border-left: 3px solid var(--primary); }
.sb-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.sb-company { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.sb-badges { display: flex; gap: 3px; flex-wrap: wrap; }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge-fu { background: #fff3cd; color: #856404; }
.badge-tag { background: #ebf3ff; color: var(--primary); }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; padding: 18px; -webkit-overflow-scrolling: touch; }
.empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; color: var(--muted); gap: 10px;
}
.empty-ico { font-size: 44px; }
.empty-title { font-size: 17px; font-weight: 600; }

/* ── Card ── */
.card {
  background: var(--card); border-radius: 10px;
  border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden;
}
.card-hdr {
  padding: 13px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 700; color: var(--primary); }
.card-body { padding: 14px 18px; }

/* ── Profile ── */
.profile {
  background: var(--card); border-radius: 10px;
  border: 1px solid var(--border); padding: 18px;
  margin-bottom: 14px; display: flex; align-items: flex-start; gap: 14px;
}
.avatar {
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--primary); color: white; font-size: 20px;
  font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
.profile-company { font-size: 13px; color: var(--muted); margin-bottom: 7px; }
.profile-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.profile-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Tabs ── */
.tabs {
  display: flex; background: var(--card); border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px;
}
.tab {
  flex: 1; padding: 10px 8px; text-align: center;
  font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--muted); border-bottom: 3px solid transparent; transition: all .15s;
  min-height: 44px; display: flex; align-items: center; justify-content: center;
}
.tab.active { color: var(--primary); background: #ebf3ff; border-bottom-color: var(--primary); }
.tab:hover:not(.active) { background: #f8f9fa; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Info grid ── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item label { display: block; font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
.info-item span { font-size: 13px; }

/* ── Activity ── */
.act-list { display: flex; flex-direction: column; gap: 10px; }
.act-item { padding: 12px; background: var(--bg); border-radius: 8px; border-left: 3px solid var(--primary); }
.act-item.fu-pending { border-left-color: var(--warning); }
.act-item.fu-done { border-left-color: var(--success); }
.act-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; }
.act-type { font-size: 10px; font-weight: 700; background: var(--primary); color: white; padding: 2px 7px; border-radius: 10px; }
.act-date { font-size: 11px; color: var(--muted); }
.act-content { font-size: 13px; margin-bottom: 4px; }
.act-next { font-size: 12px; color: var(--primary); background: rgba(45,90,142,.08); padding: 5px 9px; border-radius: 5px; margin-top: 5px; }
.act-next::before { content: "→ "; }
.act-actions { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.add-btn {
  width: 100%; padding: 9px; border: 2px dashed var(--border);
  border-radius: 8px; background: none; color: var(--muted);
  font-size: 13px; cursor: pointer; text-align: center; transition: all .15s;
  min-height: 44px;
}
.add-btn:hover { border-color: var(--primary); color: var(--primary); background: #ebf3ff; }

/* ── Sales ── */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.stat { padding: 12px; background: var(--bg); border-radius: 8px; text-align: center; }
.stat-val { font-size: 26px; font-weight: 700; color: var(--primary); }
.stat-unit { font-size: 13px; font-weight: 400; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
.prog-wrap { margin-bottom: 14px; }
.prog-lbl { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.prog-bar { height: 9px; background: var(--border); border-radius: 5px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 5px; background: var(--success); transition: width .4s ease; }
.prog-fill.warn { background: var(--warning); }
.prog-fill.bad { background: var(--danger); }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { background: #f8f9fa; padding: 8px 10px; text-align: left; font-weight: 600; color: var(--muted); border-bottom: 2px solid var(--border); }
.tbl td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: #f8f9fa; }
.ach { font-weight: 700; }
.ach.good { color: var(--success); }
.ach.ok { color: #e65c00; }
.ach.bad { color: var(--danger); }

/* ── Buttons ── */
.btn {
  padding: 7px 14px; border-radius: 6px; font-size: 12px;
  font-weight: 600; cursor: pointer; border: none; transition: all .12s;
  min-height: 44px; display: inline-flex; align-items: center; justify-content: center;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: #ebf3ff; }
.btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger:hover { background: #fff0f0; }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #218838; }
.btn-sm { padding: 4px 9px; font-size: 11px; min-height: 32px; }

/* ── Modal ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 1000;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: white; border-radius: 12px;
  width: 90%; max-width: 560px; max-height: 90vh;
  overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.modal-hdr {
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: white; z-index: 1;
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close {
  background: none; border: none; font-size: 18px; cursor: pointer;
  color: var(--muted); padding: 2px 6px;
  min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 18px; }
.modal-footer {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 7px;
  position: sticky; bottom: 0; background: white;
}
@media (max-width: 767px) {
  .modal-footer { padding: 12px 16px 20px; }
}

/* ── Form ── */
.fg { margin-bottom: 12px; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.flbl {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px;
}
.finput {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 16px; color: var(--text); outline: none; font-family: inherit;
  min-height: 48px;
}
.finput:focus { border-color: var(--primary); }
textarea.finput { resize: vertical; min-height: 88px; }
select.finput { background: white; }
.fsec {
  font-size: 12px; font-weight: 700; color: var(--primary);
  margin: 14px 0 8px; padding-bottom: 5px; border-bottom: 2px solid var(--border);
}

/* ── Tags ── */
.tags-wrap {
  display: flex; flex-wrap: wrap; gap: 5px; padding: 5px;
  border: 1px solid var(--border); border-radius: 6px;
  min-height: 48px; align-items: center; cursor: text;
}
.tag-chip {
  background: #ebf3ff; color: var(--primary);
  padding: 2px 7px; border-radius: 10px; font-size: 11px;
  display: flex; align-items: center; gap: 3px;
}
.tag-rm { cursor: pointer; color: var(--muted); }
.tag-rm:hover { color: var(--danger); }
.tag-field { border: none; outline: none; font-size: 16px; flex: 1; min-width: 70px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 3px; }

/* ── Search View ── */
body.mode-search .layout { display: none; }
.search-view { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
body:not(.mode-search) .search-view { display: none; }

.sv-toolbar {
  padding: 12px 18px; background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.sv-search { flex: 1; min-width: 200px; position: relative; }
.sv-search input {
  width: 100%; padding: 8px 10px 8px 34px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 16px; outline: none; font-family: inherit;
  min-height: 48px;
}
.sv-search input:focus { border-color: var(--primary); }
.sv-search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; }
.sv-filter {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; background: white; cursor: pointer; outline: none;
  font-family: inherit; color: var(--text); min-height: 44px;
}
.sv-filter:focus { border-color: var(--primary); }
.sv-count { font-size: 12px; color: var(--muted); white-space: nowrap; margin-left: 4px; }

.sv-grid {
  flex: 1; overflow-y: auto; padding: 16px 18px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px; align-content: start; -webkit-overflow-scrolling: touch;
}
.sv-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; cursor: pointer; transition: all .15s;
}
.sv-card:hover { border-color: var(--primary); box-shadow: 0 4px 14px rgba(45,90,142,.12); transform: translateY(-1px); }
.sv-card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.sv-card-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.sv-card-rows { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.sv-card-row { display: flex; align-items: baseline; gap: 6px; font-size: 12px; }
.sv-card-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; min-width: 52px; flex-shrink: 0; }
.sv-card-val { color: var(--text); line-height: 1.4; }
.sv-card-last { font-size: 11px; color: var(--muted); background: var(--bg); border-radius: 6px; padding: 6px 8px; margin-bottom: 10px; }
.sv-card-actions { display: flex; gap: 6px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }

/* ── Report View ── */
.report-view {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}
body.mode-report .layout { display: none; }
body.mode-report .search-view { display: none; }
body.mode-report .report-view { display: flex !important; }
body:not(.mode-report) .report-view { display: none !important; }

.rp-toolbar {
  display: flex; align-items: center; gap: 0;
  background: var(--primary); color: white; padding: 10px 12px;
  flex-shrink: 0;
}
.rp-nav-btn {
  background: rgba(255,255,255,.18); border: none; color: white;
  width: 40px; height: 40px; border-radius: 50%; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.rp-nav-btn:active { opacity: .7; }
.rp-period-wrap { flex: 1; text-align: center; }
.rp-period { font-size: 15px; font-weight: 700; color: white; }
.rp-period-sub { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 1px; }

.rp-format-strip {
  display: flex; background: white; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.rp-fmt {
  flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 700;
  color: var(--muted); cursor: pointer; border: none; background: none;
  border-bottom: 3px solid transparent; transition: all .15s; font-family: inherit;
  min-height: 44px;
}
.rp-fmt.active { color: var(--primary); border-bottom-color: var(--primary); background: #ebf3ff; }

.rp-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 14px; padding-bottom: 0;
}
.rp-empty {
  text-align: center; padding: 60px 20px; color: var(--muted);
}

/* Report blocks */
.rp-section { margin-bottom: 16px; }
.rp-section-title {
  font-size: 13px; font-weight: 700; color: var(--primary);
  padding: 6px 10px; background: #ebf3ff; border-radius: 6px 6px 0 0;
  border-left: 3px solid var(--primary);
}
.rp-section-body {
  background: white; border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 6px 6px; padding: 10px 12px;
}
.rp-summary-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px;
}
.rp-stat {
  background: var(--bg); border-radius: 8px; padding: 10px 8px; text-align: center;
}
.rp-stat-val { font-size: 22px; font-weight: 700; color: var(--primary); }
.rp-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

.rp-day-block { margin-bottom: 12px; }
.rp-day-hdr {
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
.rp-act-row {
  display: flex; gap: 8px; padding: 7px 0;
  border-bottom: 1px solid var(--border); align-items: flex-start;
  font-size: 13px;
}
.rp-act-row:last-child { border-bottom: none; }
.rp-act-type {
  background: var(--primary); color: white; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;
  align-self: flex-start; margin-top: 1px;
}
.rp-act-type.t-電話  { background: #28A745; }
.rp-act-type.t-メール { background: #17a2b8; }
.rp-act-type.t-オンライン { background: #6f42c1; }
.rp-act-type.t-展示会 { background: #e65c00; }
.rp-act-type.t-体験会 { background: #e83e8c; }
.rp-act-name {
  font-weight: 700; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 90px; flex-shrink: 0; color: var(--text);
}
.rp-act-content { flex: 1; color: var(--text); line-height: 1.5; }
.rp-act-next { font-size: 11px; color: var(--primary); margin-top: 2px; }
.rp-follow-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.rp-follow-item:last-child { border-bottom: none; }
.rp-follow-date { font-size: 11px; color: var(--danger); font-weight: 700; flex-shrink: 0; }
.rp-method-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.rp-method-item:last-child { border-bottom: none; }
.rp-method-name { font-weight: 700; font-size: 12px; color: var(--primary); margin-bottom: 4px; }

.rp-memo-wrap {
  padding: 12px 14px 4px; flex-shrink: 0;
}
.rp-memo-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
.rp-memo {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--text);
  resize: none; min-height: 80px; outline: none; background: white;
}
.rp-memo:focus { border-color: var(--primary); }

.rp-action-bar {
  display: flex; gap: 8px; padding: 10px 14px 20px;
  background: white; border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* Desktop: report view also usable */
@media (min-width: 768px) {
  .report-view { display: none; }
  body.mode-report .layout { display: flex !important; }
}

/* ── Type Chips (horizontal scroll row) ── */
.type-chips {
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 4px;
}
.type-chips::-webkit-scrollbar { display: none; }
.type-chip {
  padding: 9px 16px; border-radius: 22px; font-size: 14px;
  border: 2px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; min-height: 44px;
  font-family: inherit; line-height: 1; white-space: nowrap; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 4px;
}
.type-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ── Follow Status Chips ── */
.fu-chips {
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding-bottom: 4px;
}
.fu-chips::-webkit-scrollbar { display: none; }
.fu-chip {
  padding: 9px 16px; border-radius: 22px; font-size: 14px;
  border: 2px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; min-height: 44px;
  font-family: inherit; line-height: 1; white-space: nowrap; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 4px;
}
.fu-chip.active[data-val="none"]    { background: #6C757D; color: white; border-color: #6C757D; }
.fu-chip.active[data-val="pending"] { background: #FFC107; color: #856404; border-color: #FFC107; }
.fu-chip.active[data-val="done"]    { background: var(--success); color: white; border-color: var(--success); }

/* ── Mobile Filter Strip ── */
.mobile-filter-strip {
  display: none; padding: 8px 14px 6px;
  background: var(--card); border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 6px; white-space: nowrap;
  flex-shrink: 0;
}
.mobile-filter-strip::-webkit-scrollbar { display: none; }
.mf-chip {
  display: inline-flex; align-items: center; padding: 6px 14px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--muted); transition: all .15s; min-height: 34px;
  font-family: inherit; white-space: nowrap;
}
.mf-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
.mf-sort {
  display: inline-flex; align-items: center; padding: 6px 14px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; min-height: 34px;
  font-family: inherit; white-space: nowrap; margin-left: 6px;
}
.mf-sort.active { border-color: var(--primary); color: var(--primary); }

/* ── Last Activity Info on cards ── */
.mb-card-last { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ── Checkbox group (稼働メニューなど) ── */
.check-group {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
}
.check-opt {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px; font-size: 13px;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--text); transition: all .15s; user-select: none;
}
.check-opt input[type="checkbox"] { display: none; }
.check-opt.checked { background: var(--primary); color: white; border-color: var(--primary); }
.bool-opt {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 10px; font-size: 14px;
  border: 1.5px solid var(--border); background: white; cursor: pointer;
  color: var(--muted); transition: all .15s; margin-top: 4px; user-select: none;
  width: 100%;
}
.bool-opt input[type="checkbox"] { display: none; }
.bool-opt .bool-icon { font-size: 16px; }
.bool-opt.checked { background: #d4edda; color: #155724; border-color: #28a745; }

/* ── Agent group header in mobile list ── */
.mb-agent-group-hdr {
  padding: 5px 14px 4px; font-size: 11px; font-weight: 700;
  color: var(--primary); background: #EEF4FB;
  border-bottom: 1px solid var(--border); letter-spacing: .04em;
}

/* ── FAB ── */
.fab {
  display: none;
  position: fixed; right: 20px; bottom: calc(var(--bottom-nav-h) + 16px);
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--primary); color: white; font-size: 26px;
  border: none; cursor: pointer; z-index: 200;
  box-shadow: 0 4px 14px rgba(45,90,142,.45);
  align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
.fab:active { transform: scale(.92); box-shadow: 0 2px 6px rgba(45,90,142,.3); }

/* ── Bottom Navigation ── */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bottom-nav-h);
  background: white; border-top: 1px solid var(--border);
  z-index: 150; flex-direction: row;
}
.bn-tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; color: var(--muted);
  font-size: 10px; font-weight: 600; transition: color .15s;
  border: none; background: none; padding: 0;
  min-height: 44px;
}
.bn-tab.active { color: var(--primary); }
.bn-tab-ico { font-size: 20px; line-height: 1; }

/* ── Mobile List View ── */
.mobile-list-search {
  display: none; padding: 10px 14px 8px;
  background: var(--card); border-bottom: 1px solid var(--border);
}
.mobile-list-search input {
  width: 100%; padding: 10px 14px 10px 38px;
  border: 1px solid var(--border); border-radius: 24px;
  font-size: 16px; outline: none; font-family: inherit;
  background: var(--bg);
}
.mobile-list-search input:focus { border-color: var(--primary); background: white; }
.mobile-search-wrap { position: relative; }
.mobile-search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; }

/* ── Mobile Card ── */
.mb-card {
  padding: 14px 16px; background: var(--card);
  border-bottom: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; gap: 12px;
  min-height: 72px; transition: background .1s;
}
.mb-card:active { background: #f0f4f8; }
.mb-card-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--primary); color: white; font-size: 15px;
  font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.mb-card-body { flex: 1; min-width: 0; }
.mb-card-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mb-card-sub { font-size: 12px; color: var(--muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mb-card-badges { display: flex; gap: 4px; flex-wrap: wrap; }
.mb-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.mb-card-arrow { color: var(--muted); font-size: 16px; }
.mb-card-phone {
  background: none; border: 1px solid var(--primary); border-radius: 50%;
  width: 34px; height: 34px; color: var(--primary); font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  text-decoration: none;
}

/* ── Mobile Detail View ── */
.mobile-detail {
  display: none; position: fixed; inset: 0;
  background: var(--bg); z-index: 120;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.mobile-detail.open {
  transform: translateX(0);
}
.mobile-detail-inner {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 14px calc(var(--bottom-nav-h) + 14px);
}
/* sticky add-act button in mobile detail */
.mobile-add-act-bar {
  display: none;
  position: sticky; bottom: 0; left: 0; right: 0;
  padding: 10px 16px; background: var(--card);
  border-top: 1px solid var(--border); z-index: 10;
}
.mobile-add-act-bar .btn { width: 100%; font-size: 15px; min-height: 50px; }

/* ─────────────── MOBILE STYLES (≤767px) ─────────────── */
@media (max-width: 767px) {
  body { overflow: hidden; }

  /* Hide desktop elements */
  .mode-bar { display: none; }
  .hdr-search { display: none; }
  .hdr-add-btn { display: none; }

  /* Mobile header */
  .hdr { padding: 0 8px; gap: 4px; }
  .hdr-back { display: flex; }
  .hdr-back.hidden { display: none; }
  .hdr-title { display: none; }
  .hdr-title-center {
    display: block; flex: 1;
    font-size: 16px; font-weight: 700;
    text-align: center; color: white;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Layout: sidebar + main hidden; mobile list/detail shown */
  .layout { overflow: hidden; position: relative; }
  .sidebar { display: none; }
  .main { display: none; }

  /* Mobile list */
  .mobile-list-search { display: block; }
  .mobile-filter-strip { display: flex; }
  .mb-list-wrap {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column;
  }

  /* Mobile detail */
  .mobile-detail { display: flex; }

  /* Search view mobile */
  .sv-toolbar { flex-direction: column; align-items: stretch; gap: 6px; padding: 10px 12px; }
  .sv-search input { font-size: 16px; }
  .sv-filter { width: 100%; font-size: 16px; }
  .sv-grid { grid-template-columns: 1fr; padding: 12px; gap: 10px; padding-bottom: calc(var(--bottom-nav-h) + 12px); }

  /* Bottom nav */
  .bottom-nav { display: flex; }

  /* FAB */
  .fab { display: flex; }
  body.mode-search .fab { display: none; }
  body.mode-report .fab { display: none; }

  /* Mobile content area: fill between header and bottom nav */
  .layout, .search-view {
    margin-bottom: var(--bottom-nav-h);
  }

  /* Modal → bottom sheet on mobile */
  .overlay { align-items: flex-end; padding: 0; }
  .overlay.open { display: flex; }
  .modal {
    width: 100%; max-width: 100%;
    border-radius: 18px 18px 0 0;
    max-height: 92vh;
  }

  /* Sticky add activity bar */
  .mobile-add-act-bar { display: block; }

  /* Profile on mobile */
  .profile { flex-direction: column; align-items: center; text-align: center; }
  .profile-actions { width: 100%; justify-content: center; margin-top: 4px; }
  .profile-name { font-size: 18px; }

  /* Stats grid 2 cols on narrow */
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-grid > .stat:last-child { grid-column: 1 / -1; }

  /* Info grid 1 col on narrow */
  .info-grid { grid-template-columns: 1fr; }

  /* Activity tab default active handled in JS */

  /* Table horizontal scroll */
  .card-body { padding: 10px 12px; }
  .card-body table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Tabs bigger touch area */
  .tab { font-size: 12px; padding: 12px 4px; }

  /* Form rows: single col on mobile */
  .frow { grid-template-columns: 1fr; }

  /* Wider form labels */
  .finput { font-size: 16px; }
  .tag-field { font-size: 16px; }
}

/* ─────────────── DESKTOP (≥768px) ─────────────── */
@media (min-width: 768px) {
  .bottom-nav { display: none; }
  .fab { display: none; }
  .mobile-list-search { display: none; }
  .mb-list-wrap { display: none; }
  .mobile-detail { display: none !important; }
  .mobile-add-act-bar { display: none !important; }
  .sidebar { display: flex; }
  .main { display: block; }
  .hdr-back { display: none !important; }
  .hdr-title { display: block; }
  .hdr-title-center { display: none !important; }
  .hdr-search { display: block; }
  .hdr-add-btn { display: flex; }
  .hdr-btn-icon { display: none; }
}
</style>

<script>
// ── Google Sheets 同期設定 ──────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz6FB5_j1qoBDdYOq3SdMD_DIZq1Ljyt4SwVS10qlqbDfyqKUoxpvp-ehu0qt1pY1xKfw/exec';

// サロン行 → オブジェクト変換
function parseSalonRow(row) {
  return {
    id:           Date.now().toString(36) + Math.random().toString(36).slice(2),
    salonId:      String(row['サロンID']         || ''),
    company:      String(row['サロン名']          || ''),
    legalName:    String(row['法人名']            || ''),
    name:         String(row['代表者/担当者']     || ''),
    phone:        String(row['電話番号']           || ''),
    address:      String(row['所在地']             || ''),
    hpbUrl:       String(row['HPBリンク']          || ''),
    agentName:    String(row['担当代理店']         || ''),
    agentBranch:  String(row['代理店支店']         || ''),
    agentContact: String(row['代理店担当者']       || ''),
    salesRep:     String(row['担当営業']           || ''),
    salonType:    String(row['サロンタイプ']       || ''),
    target:       String(row['ターゲット層']       || ''),
    staffCount:   parseInt(row['スタッフ数'])     || 0,
    groupStores:  parseInt(row['グループ店舗数']) || 0,
    annualTarget: String(row['年間取引額目安']    || ''),
    memo:         String(row['メモ']               || ''),
    activities: [], sales: [], tags: [],
    status: 'active', title: '', email: '', area: '',
    targetSistri: 0, targetSales: 0,
  };
}

// 代理店行 → オブジェクト変換
function parseAgentRow(row) {
  return {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    company:  String(row['代理店名']  || row['company']  || ''),
    name:     String(row['担当者名']  || row['name']     || ''),
    title:    String(row['役職']      || row['title']    || ''),
    phone:    String(row['電話']      || row['tel']      || ''),
    email:    String(row['メール']    || row['email']    || ''),
    area:     String(row['エリア']    || row['area']     || ''),
    address:  String(row['住所']      || row['address']  || ''),
    memo:     String(row['メモ']      || row['memo']     || ''),
    activities: [], sales: [], tags: [],
    status: 'active', targetSistri: 0, targetSales: 0,
  };
}

// マージ共通処理（key=company で重複排除）
function mergeByCompanyName(existing, loaded) {
  const names = new Set(existing.map(p => p.company));
  const merged = [...existing];
  let added = 0;
  for (const p of loaded) {
    if (p.company && !names.has(p.company)) { merged.push(p); names.add(p.company); added++; }
  }
  return { merged, added };
}

// 起動時サイレント自動ロード（alert なし）
async function autoLoadFromSheet() {
  try {
    const [sRes, aRes] = await Promise.all([
      fetch(GAS_URL + '?action=getAll&type=salon'),
      fetch(GAS_URL + '?action=getAll&type=agent'),
    ]);
    const [sJson, aJson] = await Promise.all([sRes.json(), aRes.json()]);

    if (sJson.ok && sJson.data.length > 0) {
      const loaded = sJson.data.map(parseSalonRow).filter(p => p.company);
      const existing = JSON.parse(localStorage.getItem('karte_salon_v1') || '[]');
      const { merged } = mergeByCompanyName(existing, loaded);
      localStorage.setItem('karte_salon_v1', JSON.stringify(merged));
      salonPeople = merged;
    }
    if (aJson.ok && aJson.data.length > 0) {
      const loaded = aJson.data.map(parseAgentRow).filter(p => p.company);
      const existing = JSON.parse(localStorage.getItem('karte_agent_v1') || '[]');
      const { merged } = mergeByCompanyName(existing, loaded);
      localStorage.setItem('karte_agent_v1', JSON.stringify(merged));
      agentPeople = merged;
    }
    renderSidebar(); renderMobileList(); renderMain();
  } catch(e) {
    console.warn('自動読込スキップ:', e.message);
  }
}

// 手動ロードボタン（両方読込 + 結果を通知）
async function loadFromSheet() {
  const btn = document.getElementById('loadBtn');
  btn.textContent = '⏳';
  btn.disabled = true;
  try {
    const [sRes, aRes] = await Promise.all([
      fetch(GAS_URL + '?action=getAll&type=salon'),
      fetch(GAS_URL + '?action=getAll&type=agent'),
    ]);
    const [sJson, aJson] = await Promise.all([sRes.json(), aRes.json()]);

    let sAdded = 0, aAdded = 0;

    if (sJson.ok && sJson.data.length > 0) {
      const loaded = sJson.data.map(parseSalonRow).filter(p => p.company);
      const existing = JSON.parse(localStorage.getItem('karte_salon_v1') || '[]');
      const { merged, added } = mergeByCompanyName(existing, loaded);
      sAdded = added;
      localStorage.setItem('karte_salon_v1', JSON.stringify(merged));
      salonPeople = merged;
    }
    if (aJson.ok && aJson.data.length > 0) {
      const loaded = aJson.data.map(parseAgentRow).filter(p => p.company);
      const existing = JSON.parse(localStorage.getItem('karte_agent_v1') || '[]');
      const { merged, added } = mergeByCompanyName(existing, loaded);
      aAdded = added;
      localStorage.setItem('karte_agent_v1', JSON.stringify(merged));
      agentPeople = merged;
    }
    renderSidebar(); renderMobileList(); renderMain();
    alert(`読込完了\nサロン: ${sAdded}件追加\n代理店: ${aAdded}件追加`);
  } catch(e) {
    alert('読込に失敗しました: ' + e.message);
  } finally {
    btn.textContent = '📥';
    btn.disabled = false;
  }
}

function syncToSheet(type, data) {
  const record = type === 'salon' ? {
    サロンID:      data.salonId      || '',
    createdAt:    new Date().toISOString().slice(0, 10),
    name:         data.company,
    legalName:    data.legalName    || '',
    owner:        data.name         || '',
    tel:          data.phone        || '',
    address:      data.address      || '',
    hpbUrl:       data.hpbUrl       || '',
    agentName:    data.agentName    || '',
    agentBranch:  data.agentBranch  || '',
    agentContact: data.agentContact || '',
    salesRep:     data.salesRep     || '',
    salonType:    data.salonType    || '',
    target:       data.target       || '',
    seats:        '',
    staffCount:   data.staffCount   || '',
    groupStores:  data.groupStores  || '',
    annualTarget: data.annualTarget || '',
    memo:         data.memo         || '',
  } : {
    createdAt: new Date().toISOString().slice(0, 10),
    company:  data.company || '',
    name:     data.name    || '',
    title:    data.title   || '',
    tel:      data.phone   || '',
    email:    data.email   || '',
    area:     data.area    || '',
    address:  data.address || '',
    memo:     data.memo    || '',
  };
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ type, record }),
  }).catch(err => console.warn('スプレッドシート同期失敗:', err));
}

// 活動ログを Spreadsheet A に同期（no-cors: レスポンス不要）
function syncActivityToSheet(person, activity) {

// ── Data ──────────────────────────────────────────
// ── 固定代理店リスト ───────────────────────────────
const AGENT_NAMES = ['ミツイ','フジシン','キクヤ','カトレア','アイビックス','かすが','ピュア商会','菊地','GOROI','リリー','FIT','ガモウ広島'];

let agentPeople = JSON.parse(localStorage.getItem('karte_agent_v1') || localStorage.getItem('karte_v1') || '[]');
let salonPeople = JSON.parse(localStorage.getItem('karte_salon_v1') || '[]');
let currentId = null;
let currentTags = [];
let editingId = null;

// サロンID 自動採番（SAL-XXXXX形式、既存最大値+1）
function generateSalonId() {
  const nums = salonPeople.map(p => parseInt((p.salonId || '').replace('SAL-', '')) || 0);
  return 'SAL-' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(4, '0');
}

// 髪ドラ売上タブ: 売上マスターシート（Spreadsheet A）からサロンIDで購買履歴を取得して表示
async function loadHDRASales(personId) {
  const wrap = document.getElementById('hdra-sales-wrap');
  if (!wrap) return;
  const p = getPerson(personId);
  if (!p) return;

  if (!p.salonId) {
    wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">
      サロンIDが未設定です<br><small>サロン登録時に自動付与されます</small></div>`;
    return;
  }

  wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted)">⏳ 読み込み中...</div>`;
  try {
    const resp = await fetch(`${GAS_URL}?action=getSalonSales&salonId=${encodeURIComponent(p.salonId)}`);
    const result = await resp.json();
    if (!result.ok) throw new Error(result.error || '取得失敗');

    const rows = result.data || [];
    if (rows.length === 0) {
      wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">
        売上データがありません<br><small>サロンID: ${esc(p.salonId)}</small></div>`;
      return;
    }

    // 月別集計（売上マスターの列名に合わせる）
    const byYm = {};
    rows.forEach(r => {
      const ym = String(r['年月'] || '');
      if (!byYm[ym]) byYm[ym] = { amt: 0, qty: 0, prods: {} };
      byYm[ym].amt += Number(r['売上金額_税抜']) || 0;
      byYm[ym].qty += Number(r['売上数量'])      || 0;
      const prod = r['商品名'] || 'その他';
      byYm[ym].prods[prod] = (byYm[ym].prods[prod] || 0) + (Number(r['売上金額_税抜']) || 0);
    });
    const totalAmt = rows.reduce((s, r) => s + (Number(r['売上金額_税抜']) || 0), 0);
    const totalQty = rows.reduce((s, r) => s + (Number(r['売上数量'])      || 0), 0);
    const ymList = Object.keys(byYm).sort().reverse();

    let html = `
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">💰 髪ドラ購買履歴</div>
          <span style="font-size:11px;color:var(--muted)">サロンID: ${esc(p.salonId)}</span>
        </div>
        <div class="card-body" style="display:flex;gap:24px;flex-wrap:wrap">
          <div>
            <div style="font-size:24px;font-weight:700;color:var(--primary)">¥${Math.round(totalAmt).toLocaleString()}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">累計購買金額（税抜）</div>
          </div>
          <div>
            <div style="font-size:24px;font-weight:700;color:var(--primary)">${totalQty}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">累計数量 / ${rows.length}明細</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><div class="card-title">月別推移</div></div>
        <div class="card-body" style="padding:0;overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:#f8f9fa;border-bottom:2px solid #e9ecef">
              <th style="text-align:left;padding:8px 12px;font-weight:600">年月</th>
              <th style="text-align:right;padding:8px 12px;font-weight:600">金額（税抜）</th>
              <th style="text-align:right;padding:8px 12px;font-weight:600">数量</th>
              <th style="text-align:left;padding:8px 12px;font-weight:600">主な商品</th>
            </tr></thead>
            <tbody>`;
    ymList.forEach(ym => {
      const d = byYm[ym];
      const prodHtml = Object.entries(d.prods).sort((a,b)=>b[1]-a[1]).slice(0, 3)
        .map(([name])=>`<span style="display:inline-block;padding:1px 7px;margin:1px;border-radius:10px;background:#e8f0fe;color:#1a73e8;font-size:11px">${esc(name)}</span>`).join('');
      html += `<tr style="border-bottom:1px solid #f1f3f4">
        <td style="padding:8px 12px;font-weight:600">${esc(ym)}</td>
        <td style="padding:8px 12px;text-align:right">¥${Math.round(d.amt).toLocaleString()}</td>
        <td style="padding:8px 12px;text-align:right">${d.qty}</td>
        <td style="padding:8px 12px">${prodHtml}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
    wrap.innerHTML = html;
  } catch(e) {
    wrap.innerHTML = `<div style="padding:24px;text-align:center;color:#dc3545;font-size:13px">取得エラー: ${esc(e.message)}</div>`;
  }
}
const toMonth = () => new Date().toISOString().slice(0, 7);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const isMobile = () => window.innerWidth <= 767;

// ── Mobile detection helpers ──────────────────────
function syncMobileSearch() {
  const v = document.getElementById('mobileSearchInput').value;
  document.getElementById('searchInput').value = v;
  renderSidebar();
  renderMobileList();
}

// ── Mobile Back ───────────────────────────────────
function mobileBack() {
  const detail = document.getElementById('mobileDetail');
  detail.classList.remove('open');
  document.getElementById('mobileAddActBar').style.display = 'none';
  document.getElementById('hdrBack').classList.add('hidden');
  // restore title
  const titles = { agent:'代理店カルテ', salon:'サロンカルテ', search:'サロン検索' };
  document.getElementById('hdrTitleCenter').textContent = titles[currentMode] || '';
  currentId = null;
}

// ── Mobile Filter / Sort helpers ─────────────────
function setMobileFilter(val, el) {
  mobileFilter = val;
  document.querySelectorAll('#mobileFilterStrip .mf-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  renderMobileList();
}

function toggleMobileSort() {
  const isAgent = currentMode === 'agent';
  const order  = isAgent ? ['name','recent','follow','agent'] : ['name','recent','follow'];
  const labels = { name:'名前順', recent:'最終活動順', follow:'フォロー優先', agent:'代理店順' };
  const idx = (order.indexOf(mobileSort) + 1) % order.length;
  mobileSort = order[idx];
  const btn = document.getElementById('mfSort');
  if (btn) btn.textContent = '↕ ' + labels[mobileSort];
  renderMobileList();
}

// ── Mobile List ───────────────────────────────────
function renderMobileList() {
  if (!isMobile()) return;
  const q = (document.getElementById('mobileSearchInput').value || document.getElementById('searchInput').value || '').toLowerCase();

  let filtered = getPeople().filter(p => {
    // text search
    if (q && !p.name.toLowerCase().includes(q) && !p.company.toLowerCase().includes(q)) return false;
    // filter chip
    if (mobileFilter === 'follow') {
      const hasPending = (p.activities||[]).some(a => a.fuStatus === 'pending');
      if (!hasPending) return false;
    } else if (mobileFilter === 'watch') {
      if (p.status !== 'watch') return false;
    }
    return true;
  });

  // sort
  if (mobileSort === 'name') {
    filtered.sort((a, b) => (a.company||a.name).localeCompare(b.company||b.name, 'ja'));
  } else if (mobileSort === 'recent') {
    filtered.sort((a, b) => {
      const aLast = (a.activities||[]).reduce((m,x) => x.date > m ? x.date : m, '');
      const bLast = (b.activities||[]).reduce((m,x) => x.date > m ? x.date : m, '');
      return bLast.localeCompare(aLast);
    });
  } else if (mobileSort === 'follow') {
    filtered.sort((a, b) => {
      const aOv = (a.activities||[]).some(x => x.fuStatus==='pending' && x.fuDate && x.fuDate < toDay()) ? 0 : (a.activities||[]).some(x=>x.fuStatus==='pending') ? 1 : 2;
      const bOv = (b.activities||[]).some(x => x.fuStatus==='pending' && x.fuDate && x.fuDate < toDay()) ? 0 : (b.activities||[]).some(x=>x.fuStatus==='pending') ? 1 : 2;
      return aOv - bOv;
    });
  } else if (mobileSort === 'agent') {
    filtered.sort((a, b) => {
      const cmp = (a.company||'').localeCompare(b.company||'', 'ja');
      return cmp !== 0 ? cmp : (a.name||'').localeCompare(b.name||'', 'ja');
    });
  }

  const wrap = document.getElementById('mbListWrap');
  if (!filtered.length) {
    wrap.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">📋</div><div>該当なし</div></div>';
    return;
  }
  const isAgent = currentMode === 'agent';

  // helper: render single card HTML
  const cardHtml = p => {
    const mainLabel = isAgent ? p.name : p.company;
    const subLabel  = isAgent ? p.company : (p.name ? 'オーナー: ' + p.name : '');
    const hasPending = (p.activities || []).some(a => a.fuStatus === 'pending');
    const overdue    = (p.activities || []).some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < toDay());
    const lastAct    = (p.activities||[]).reduce((m,x) => x.date > m ? x.date : m, '');
    const avatarTxt  = esc((mainLabel || '?').slice(0,2));
    const phoneBtn   = (currentMode === 'salon' && p.phone)
      ? `<a class="mb-card-phone" href="tel:${esc(p.phone)}" onclick="event.stopPropagation()">📞</a>` : '';
    const badges = [
      overdue ? '<span class="badge badge-fu" style="background:#f8d7da;color:#721c24">⚠ 期限超過</span>'
              : hasPending ? '<span class="badge badge-fu">要フォロー</span>' : '',
      ...(p.tags || []).map(t => `<span class="badge badge-tag">${esc(t)}</span>`)
    ].filter(Boolean).join('');
    const lastActHtml = lastAct ? `<div class="mb-card-last">最終活動: ${lastAct}</div>` : '';
    return `<div class="mb-card" onclick="selectPerson('${p.id}')">
      <div class="mb-card-avatar" style="${overdue?'background:#DC3545':hasPending?'background:#e65c00':''}">${avatarTxt}</div>
      <div class="mb-card-body">
        <div class="mb-card-name">${esc(mainLabel)}</div>
        <div class="mb-card-sub">${esc(subLabel)}</div>
        ${badges ? `<div class="mb-card-badges">${badges}</div>` : ''}
        ${lastActHtml}
      </div>
      <div class="mb-card-right">
        ${phoneBtn}
        <span class="mb-card-arrow">›</span>
      </div>
    </div>`;
  };

  // 代理店順: group by company with section headers
  if (mobileSort === 'agent' && isAgent) {
    let lastCo = null;
    const parts = [];
    for (const p of filtered) {
      if (p.company !== lastCo) {
        lastCo = p.company;
        parts.push(`<div class="mb-agent-group-hdr">🏢 ${esc(p.company||'未設定')}</div>`);
      }
      parts.push(cardHtml(p));
    }
    wrap.innerHTML = parts.join('');
  } else {
    wrap.innerHTML = filtered.map(cardHtml).join('');
  }
}

// ── Sidebar ───────────────────────────────────────
function renderSidebar() {
  const q = document.getElementById('searchInput').value.toLowerCase();

  let filtered = getPeople().filter(p =>
    !q || p.name.toLowerCase().includes(q) || p.company.toLowerCase().includes(q)
  ).sort((a, b) => a.company.localeCompare(b.company, 'ja'));

  document.getElementById('sbCount').textContent = `${filtered.length}名`;

  if (!filtered.length) {
    document.getElementById('sbList').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">該当なし</div>';
    return;
  }

  document.getElementById('sbList').innerHTML = filtered.map(p => {
    const hasPending = (p.activities || []).some(a => a.fuStatus === 'pending');
    const overdue = (p.activities || []).some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < toDay());
    const isAgent = currentMode === 'agent';
    const mainLabel = isAgent ? p.name : p.company;
    const subLabel = isAgent ? p.company : (p.name ? 'オーナー: ' + p.name : '');
    return `<div class="sb-item ${p.id === currentId ? 'active' : ''}" onclick="selectPerson('${p.id}')">
      <div class="sb-name">${esc(mainLabel)}</div>
      <div class="sb-company">${esc(subLabel)}${isAgent && p.title ? ' · ' + esc(p.title) : ''}</div>
      <div class="sb-badges">
        ${overdue ? '<span class="badge badge-fu">⚠ 期限超過</span>' : hasPending ? '<span class="badge badge-fu">要フォロー</span>' : ''}
        ${(p.tags || []).map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── Select Person ─────────────────────────────────
function selectPerson(id) {
  currentId = id;
  renderSidebar();
  renderMain();

  // Mobile: open detail panel
  if (isMobile()) {
    const p = getPerson(id);
    if (!p) return;
    const isAgent = currentMode === 'agent';
    const title = isAgent ? p.name : p.company;
    document.getElementById('hdrTitleCenter').textContent = title || '';
    document.getElementById('hdrBack').classList.remove('hidden');

    // Render detail content into mobile panel
    document.getElementById('mobileDetailInner').innerHTML = document.getElementById('main').innerHTML;

    // Default to activity tab
    const tabs = document.getElementById('mobileDetailInner').querySelectorAll('.tab');
    const contents = document.getElementById('mobileDetailInner').querySelectorAll('.tab-content');
    let actIdx = -1;
    tabs.forEach((t, i) => { if (t.textContent.includes('活動ログ')) actIdx = i; });
    if (actIdx >= 0) {
      tabs.forEach(t => t.classList.remove('active'));
      contents.forEach(t => t.classList.remove('active'));
      tabs[actIdx].classList.add('active');
      contents[actIdx].classList.add('active');
    }

    // Rewire tab clicks inside mobile detail
    tabs.forEach((tab, i) => {
      tab.onclick = function() {
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        contents[i].classList.add('active');
        // Show/hide sticky add bar based on active tab
        updateMobileAddActBar();
      };
    });

    const detail = document.getElementById('mobileDetail');
    detail.classList.add('open');
    updateMobileAddActBar();
  }
}

function updateMobileAddActBar() {
  if (!isMobile()) return;
  const activeTab = document.querySelector('#mobileDetailInner .tab.active');
  const bar = document.getElementById('mobileAddActBar');
  if (activeTab && activeTab.textContent.includes('活動ログ')) {
    bar.style.display = 'block';
  } else {
    bar.style.display = 'none';
  }
}

function renderSales(p) {
  const sales = [...(p.sales || [])].sort((a, b) => b.ym.localeCompare(a.ym));
  const tgt = p.targetSistri || 0;
  const cm = toMonth();
  const cur = sales.find(s => s.ym === cm);
  const last12 = sales.slice(0, 12);
  const totalSistri = last12.reduce((s, r) => s + (r.sistri || 0), 0);
  const avg = last12.length ? Math.round(totalSistri / last12.length * 10) / 10 : 0;
  const pct = tgt > 0 && cur ? Math.round((cur.sistri || 0) / tgt * 100) : null;
  const pClass = pct === null ? '' : pct >= 100 ? '' : pct >= 70 ? 'warn' : 'bad';
  const achClass = pct === null ? '' : pct >= 100 ? 'good' : pct >= 70 ? 'ok' : 'bad';

  const rows = sales.map(s => {
    const sp = tgt > 0 ? Math.round((s.sistri || 0) / tgt * 100) : null;
    const sc = sp === null ? '' : sp >= 100 ? 'good' : sp >= 70 ? 'ok' : 'bad';
    return `<tr>
      <td>${s.ym}</td>
      <td>${s.sistri || 0}</td>
      <td>${sp !== null ? `<span class="ach ${sc}">${sp}%</span>` : '—'}</td>
      <td>${s.sales != null ? s.sales : '—'}</td>
      <td style="color:var(--muted)">${esc(s.memo) || ''}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteSales('${s.ym}')">削除</button></td>
    </tr>`;
  }).join('');

  return `<div class="card">

// ── CSV Import ────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (inQuote) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuote = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuote = true; }
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\r' && next === '\n') { row.push(field); field = ''; rows.push(row); row = []; i++; }
      else if (ch === '\n' || ch === '\r') { row.push(field); field = ''; rows.push(row); row = []; }
      else { field += ch; }
    }
  }
  if (row.length || field) { row.push(field); rows.push(row); }
  return rows;
}

function importSalonCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    const regions = ['近畿', '関東・北関東', '中部（東海・甲信越）', '中国・四国', '九州・沖縄', '東北・北陸', '北海道'];
    const colStarts = [0, 4, 8, 12, 16, 20, 24];
    const dataRows = rows.slice(4);
    const existingNames = new Set(salonPeople.map(p => p.company));
    const newSalons = [];

    for (const row of dataRows) {
      for (let ri = 0; ri < regions.length; ri++) {
        const base = colStarts[ri];
        const name = (row[base] || '').trim();
        if (!name || existingNames.has(name)) continue;
        const memo = (row[base + 2] || '').trim();
        newSalons.push({
          id: uid(), company: name, name: '', area: regions[ri],
          memo, status: 'active', activities: [], sales: [], tags: [],
          agentName: '', agentBranch: '', agentContact: '', salesRep: '',
          legalName: '', salonType: '', target: '', phone: '', email: '',
          title: '', address: '', hpbUrl: '', staffCount: 0, groupStores: 0, annualTarget: '',
        });
        existingNames.add(name);
      }
    }

    event.target.value = '';
    if (!newSalons.length) { alert('インポートできる新規サロンが見つかりませんでした\n（既存データとの重複を除いた結果）'); return; }
    if (confirm(`${newSalons.length}件のサロンをインポートします。よろしいですか？`)) {
      salonPeople.push(...newSalons);
      save();
      renderSearchView();
      alert(`✅ ${newSalons.length}件のサロンをインポートしました`);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function toggleCheckOpt(label) {

}
function toggleBoolOpt(label, cbId) {
  const cb = document.getElementById(cbId);

  label.classList.toggle('checked', cb.checked);
  const textId = cbId === 'pBihatuOkite' ? 'pBihatuOkiteText' : 'pHandlingListText';

    ? ['未申し込み', '申し込み済み']

  document.getElementById(textId).textContent = cb.checked ? texts[1] : texts[0];

function resetCheckGroup(groupId) {
  document.querySelectorAll(`#${groupId} .check-opt`).forEach(l => {
    l.querySelector('input').checked = false;
    l.classList.remove('checked');
  });
}
function setCheckGroup(groupId, values) {
  document.querySelectorAll(`#${groupId} .check-opt`).forEach(l => {
    const cb = l.querySelector('input');
    const on = (values || []).includes(cb.value);
    cb.checked = on;
    l.classList.toggle('checked', on);
  });
}
function setBoolOpt(cbId, val) {
  const cb = document.getElementById(cbId);
  if (!cb) return;
  cb.checked = !!val;
  const labelId = cbId === 'pBihatuOkite' ? 'pBihatuOkiteLabel' : 'pHandlingLabel';
  document.getElementById(labelId).classList.toggle('checked', !!val);
  const textId = cbId === 'pBihatuOkite' ? 'pBihatuOkiteText' : 'pHandlingListText';
  const texts = cbId === 'pBihatuOkite'
    ? ['未申し込み', '申し込み済み']
    : ['未掲載', '掲載済み'];
  document.getElementById(textId).textContent = val ? texts[1] : texts[0];
}

// ── Search View ───────────────────────────────────
function renderSearchView() {
  const q = (document.getElementById('svSearch').value || '').toLowerCase();
  const filterType = document.getElementById('svType').value;
  const filterStatus = document.getElementById('svStatus').value;
  const filterRep = document.getElementById('svSalesRep').value;

  const repSel = document.getElementById('svSalesRep');
  const currentRep = repSel.value;
  const reps = [...new Set(salonPeople.map(p => p.salesRep).filter(Boolean))].sort();
  repSel.innerHTML = '<option value="">担当営業: すべて</option>' +
    reps.map(r => `<option value="${esc(r)}" ${r === currentRep ? 'selected' : ''}>${esc(r)}</option>`).join('');

  const statusLabel = { active:'アクティブ', watch:'要観察', inactive:'休眠' };
  const statusColor = { active:'#28A745', watch:'#e65c00', inactive:'#6C757D' };

  let results = salonPeople.filter(p => {
    const matchQ = !q ||
      (p.company || '').toLowerCase().includes(q) ||
      (p.name || '').toLowerCase().includes(q) ||
      (p.agentName || '').toLowerCase().includes(q) ||
      (p.agentBranch || '').toLowerCase().includes(q) ||
      (p.salesRep || '').toLowerCase().includes(q) ||
      (p.address || '').toLowerCase().includes(q) ||
      (p.salonType || '').toLowerCase().includes(q);
    const matchType = !filterType || p.salonType === filterType;
    const matchStatus = !filterStatus || (p.status || 'active') === filterStatus;
    const matchRep = !filterRep || p.salesRep === filterRep;
    return matchQ && matchType && matchStatus && matchRep;
  }).sort((a, b) => a.company.localeCompare(b.company, 'ja'));

  document.getElementById('svCount').textContent = `${results.length} 件`;

  if (!results.length) {
    document.getElementById('svGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)"><div style="font-size:36px;margin-bottom:10px">🔍</div><div>該当するサロンが見つかりません</div></div>`;
    return;
  }

  document.getElementById('svGrid').innerHTML = results.map(p => {
    const acts = [...(p.activities || [])].sort((a, b) => b.date.localeCompare(a.date));
    const lastAct = acts[0];
    const hasPending = acts.some(a => a.fuStatus === 'pending');
    const overdue = acts.some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < toDay());
    const sc = p.status || 'active';

    return `<div class="sv-card" onclick="openSalonFromSearch('${p.id}')">
      <div class="sv-card-name">${esc(p.company)}</div>
      <div class="sv-card-badges">
        ${p.salonType ? `<span class="badge" style="background:#eef2ff;color:#4A6FA5">${esc(p.salonType)}</span>` : ''}
        <span class="badge" style="background:${statusColor[sc]}22;color:${statusColor[sc]}">${statusLabel[sc] || sc}</span>
        ${overdue ? '<span class="badge badge-fu">⚠ 期限超過</span>' : hasPending ? '<span class="badge badge-fu">要フォロー</span>' : ''}
      </div>
      <div class="sv-card-rows">
        ${p.agentName ? `<div class="sv-card-row"><span class="sv-card-label">代理店</span><span class="sv-card-val">${esc(p.agentName)}${p.agentBranch ? '　' + esc(p.agentBranch) : ''}</span></div>` : ''}
        ${p.salesRep ? `<div class="sv-card-row"><span class="sv-card-label">担当営業</span><span class="sv-card-val">${esc(p.salesRep)}</span></div>` : ''}
        ${p.name ? `<div class="sv-card-row"><span class="sv-card-label">オーナー</span><span class="sv-card-val">${esc(p.name)}</span></div>` : ''}
        ${p.address ? `<div class="sv-card-row"><span class="sv-card-label">住所</span><span class="sv-card-val">${esc(p.address)}</span></div>` : ''}
        ${p.title || p.staffCount ? `<div class="sv-card-row"><span class="sv-card-label">規模</span><span class="sv-card-val">${p.title ? esc(p.title) + '席' : ''}${p.title && p.staffCount ? ' / ' : ''}${p.staffCount ? esc(String(p.staffCount)) + '名' : ''}</span></div>` : ''}
      </div>
      ${lastAct ? `<div class="sv-card-last">📝 ${lastAct.date}　${esc(lastAct.content.slice(0, 40))}${lastAct.content.length > 40 ? '…' : ''}</div>` : ''}
      <div class="sv-card-actions">
        ${p.phone ? `<a href="tel:${esc(p.phone)}" class="btn btn-outline btn-sm" onclick="event.stopPropagation()">📞 電話</a>` : ''}
        ${p.hpbUrl ? `<a href="${esc(p.hpbUrl)}" target="_blank" class="btn btn-outline btn-sm" onclick="event.stopPropagation()">HPB</a>` : ''}
        <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="event.stopPropagation();openSalonFromSearch('${p.id}')">カルテを開く →</button>
      </div>
    </div>`;
  }).join('');
}

function openSalonFromSearch(id) {
  currentMode = 'salon';
  currentId = id;
  document.body.className = 'mode-salon';
  document.getElementById('tabAgent').classList.remove('active');
  document.getElementById('tabSalon').classList.add('active');
  document.getElementById('tabSearch').classList.remove('active');
  document.getElementById('hdrTitle').textContent = '📋 サロンカルテ';
  // Mobile bottom nav
  document.getElementById('bnAgent').classList.remove('active');
  document.getElementById('bnSalon').classList.add('active');
  document.getElementById('bnSearch').classList.remove('active');
  save();
  renderSidebar();
  renderMobileList();
  renderMain();
  if (isMobile()) selectPerson(id);
}

// ── Mode switch ───────────────────────────────────
function switchMode(mode) {
  // On mobile: close detail panel when switching modes
  if (isMobile()) {
    const detail = document.getElementById('mobileDetail');
    if (detail.classList.contains('open')) {
      detail.classList.remove('open');
      document.getElementById('mobileAddActBar').style.display = 'none';
      document.getElementById('hdrBack').classList.add('hidden');
    }
  }

  const allBnIds = ['bnAgent','bnSalon','bnSearch','bnReport'];

  if (mode === 'search') {
    document.body.className = 'mode-search';
    document.getElementById('tabAgent').classList.remove('active');
    document.getElementById('tabSalon').classList.remove('active');
    document.getElementById('tabSearch').classList.add('active');
    document.getElementById('hdrTitle').textContent = '🔍 サロン検索';
    document.getElementById('hdrTitleCenter').textContent = 'サロン検索';
    allBnIds.forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('bnSearch').classList.add('active');
    document.getElementById('mobileListView').style.display = 'none';
    renderSearchView();
    return;
  }

  if (mode === 'report') {
    document.body.className = 'mode-report';
    document.getElementById('hdrTitle').textContent = '📊 週報';
    document.getElementById('hdrTitleCenter').textContent = '週報';
    allBnIds.forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('bnReport').classList.add('active');
    document.getElementById('mobileListView').style.display = 'none';
    // 週ヘッダーを初期化してレポート生成
    updateReportHeader();
    generateReport();
    return;
  }

  currentMode = mode;
  document.body.className = 'mode-' + mode;
  document.getElementById('tabAgent').classList.toggle('active', mode === 'agent');
  document.getElementById('tabSalon').classList.toggle('active', mode === 'salon');
  document.getElementById('tabSearch').classList.remove('active');
  document.getElementById('hdrTitle').textContent = mode === 'agent' ? '📋 代理店カルテ' : '📋 サロンカルテ';
  const titleCenter = mode === 'agent' ? '代理店カルテ' : 'サロンカルテ';
  document.getElementById('hdrTitleCenter').textContent = titleCenter;
  allBnIds.forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(mode === 'agent' ? 'bnAgent' : 'bnSalon').classList.add('active');

  currentId = null;
  save();
  renderSidebar();
  renderMain();

  if (isMobile()) {
    document.getElementById('mobileListView').style.display = 'flex';
    renderMobileList();
  }
}

// ── 週報 (Report) ──────────────────────────────────
let reportWeekOff = 0;  // 0=今週, -1=先週, +1=翌週
let reportFmt     = 'daily'; // 'daily' | 'salon' | 'method'
let reportGenText = '';      // コピー用プレーンテキスト

// 週の月曜・日曜を返す（offset: 週オフセット、0=今週）
function getWeekRange(offset) {
  // offsetはすでに週数なのでそのまま使う
  const weekOffset = typeof offset === 'number' ? offset : 0;
  const now = new Date();
  const dow = now.getDay(); // 0=Sun
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const mon = new Date(now);
  mon.setDate(now.getDate() + mondayOffset + weekOffset * 7);
  mon.setHours(0,0,0,0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  // 活動ログの日付形式(YYYY-MM-DD)に合わせる
  const fmt  = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const fmtDisp = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  const fmtShort = d => `${d.getMonth()+1}/${d.getDate()}`;
  return {
    start: fmt(mon), end: fmt(sun),
    label: `${fmtDisp(mon)} 〜 ${fmtDisp(sun)}`,
    labelShort: `${fmtShort(mon)}(月)〜${fmtShort(sun)}(日)`,
    weekNum: getISOWeek(mon),
    year: mon.getFullYear(),
  };
}

function getISOWeek(d) {
  const tmp = new Date(d.valueOf());
  tmp.setDate(tmp.getDate() + 3 - (tmp.getDay() + 6) % 7);
  const w1 = new Date(tmp.getFullYear(), 0, 4);
  return 1 + Math.round(((tmp - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
}

// 週内のすべての活動（代理店+サロン）を集める
function collectWeekActivities(start, end) {
  const result = [];
  const allPeople = [
    ...agentPeople.map(p => ({ ...p, _kind: 'agent' })),
    ...salonPeople.map(p => ({ ...p, _kind: 'salon' })),
  ];
  for (const p of allPeople) {
    for (const a of (p.activities || [])) {
      if (a.date >= start && a.date <= end) {
        result.push({ ...a, _person: p, _kind: p._kind });
      }
    }
  }
  return result.sort((a, b) => a.date.localeCompare(b.date));
}

function reportWeekOffset(n) {
  reportWeekOff += n;
  updateReportHeader();
  generateReport();
}

function setReportFmt(fmt, el) {
  reportFmt = fmt;
  document.querySelectorAll('.rp-fmt').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  if (reportGenText) generateReport();
}

function updateReportHeader() {
  const rng = getWeekRange(reportWeekOff);
  document.getElementById('rpPeriod').textContent = rng.label;
  document.getElementById('rpPeriodSub').textContent = `${rng.year}年 第${rng.weekNum}週`;
}

function generateReport() {
  const rng = getWeekRange(reportWeekOff);
  const acts = collectWeekActivities(rng.start, rng.end);

  // Show memo field
  document.getElementById('rpMemoWrap').style.display = acts.length ? 'block' : 'none';

  if (!acts.length) {
    document.getElementById('rpBody').innerHTML =
      `<div class="rp-empty"><div style="font-size:36px;margin-bottom:10px">📭</div><div>この週の活動記録がありません</div><div style="font-size:12px;margin-top:6px;color:var(--muted)">活動ログを追加するか、‹ で前の週を確認してください</div></div>`;
    document.getElementById('rpCopyBtn').disabled = true;
    reportGenText = '';
    return;
  }

  let html = '';
  let text = '';
  const typeLabel = { agent:'代理店', salon:'サロン' };

  // ── サマリー ────────────────────────────
  const typeCounts = {};
  for (const a of acts) { typeCounts[a.type] = (typeCounts[a.type]||0) + 1; }
  const totalActs = acts.length;
  const followPending = acts.filter(a => a.fuStatus === 'pending').length;
  const uniqPersons = new Set(acts.map(a => a._person.id)).size;

  const summaryItems = Object.entries(typeCounts)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `<div class="rp-stat"><div class="rp-stat-val">${v}</div><div class="rp-stat-lbl">${k}</div></div>`)
    .join('');
  const summaryText = Object.entries(typeCounts).map(([k,v])=>`${k}:${v}件`).join(' / ');

  html += `<div class="rp-section">
    <div class="rp-section-title">📊 週次サマリー</div>
    <div class="rp-section-body">
      <div class="rp-summary-grid">
        <div class="rp-stat"><div class="rp-stat-val">${totalActs}</div><div class="rp-stat-lbl">総活動件数</div></div>
        <div class="rp-stat"><div class="rp-stat-val">${uniqPersons}</div><div class="rp-stat-lbl">接触先数</div></div>
        <div class="rp-stat"><div class="rp-stat-val" style="color:${followPending>0?'var(--warning)':'var(--success)'}">${followPending}</div><div class="rp-stat-lbl">要フォロー</div></div>
      </div>
      <div class="rp-summary-grid" style="margin-bottom:0">${summaryItems}</div>
    </div>
  </div>`;
  text += `【週次サマリー】\n総活動${totalActs}件 / 接触先${uniqPersons}社 / 要フォロー${followPending}件\n${summaryText}\n\n`;

  if (reportFmt === 'daily') {
    // ── 日別表示 ───────────────────────────
    html += `<div class="rp-section"><div class="rp-section-title">📅 日別活動ログ</div><div class="rp-section-body">`;
    text += `【日別活動ログ】\n`;
    const byDay = {};
    for (const a of acts) {
      if (!byDay[a.date]) byDay[a.date] = [];
      byDay[a.date].push(a);
    }
    const dayNames = ['日','月','火','水','木','金','土'];
    for (const [date, dayActs] of Object.entries(byDay).sort()) {
      const d = new Date(date.replace(/-/g,'/'));
      const dn = `${date.replace(/\//g,'-').slice(5)} (${dayNames[d.getDay()]})`;
      html += `<div class="rp-day-block"><div class="rp-day-hdr">${dn}</div>`;
      text += `\n■ ${dn}\n`;
      for (const a of dayActs) {
        const name = a._kind === 'agent' ? (a._person.name||a._person.company) : a._person.company;
        html += `<div class="rp-act-row">
          <span class="rp-act-type t-${a.type}">${esc(a.type)}</span>
          <span class="rp-act-name">${esc(name)}</span>
          <div class="rp-act-content">${esc(a.content)}${a.next?`<div class="rp-act-next">→ ${esc(a.next)}</div>`:''}</div>
        </div>`;
        text += `  [${a.type}] ${name}\n  ${a.content}\n`;
        if (a.next) text += `  → ${a.next}\n`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;

  } else if (reportFmt === 'salon') {
    // ── 先方（サロン/代理店）別表示 ──────────
    html += `<div class="rp-section"><div class="rp-section-title">💇 先方別活動ログ</div><div class="rp-section-body">`;
    text += `【先方別活動ログ】\n`;
    const byPerson = {};
    for (const a of acts) {
      const pid = a._person.id;
      if (!byPerson[pid]) byPerson[pid] = { person: a._person, acts: [] };
      byPerson[pid].acts.push(a);
    }
    for (const { person: p, acts: pActs } of Object.values(byPerson)) {
      const displayName = p._kind === 'agent' ? (p.name||p.company) : p.company;
      const kind = typeLabel[p._kind];
      html += `<div class="rp-day-block"><div class="rp-day-hdr">${esc(displayName)} <span style="font-weight:400;font-size:10px">(${kind})</span></div>`;
      text += `\n■ ${displayName} (${kind})\n`;
      for (const a of pActs.sort((x,y)=>x.date.localeCompare(y.date))) {
        html += `<div class="rp-act-row">
          <span class="rp-act-type t-${a.type}">${esc(a.type)}</span>
          <span class="rp-act-name">${a.date.slice(5)}</span>
          <div class="rp-act-content">${esc(a.content)}${a.next?`<div class="rp-act-next">→ ${esc(a.next)}</div>`:''}</div>
        </div>`;
        text += `  ${a.date.slice(5)} [${a.type}] ${a.content}\n`;
        if (a.next) text += `  → ${a.next}\n`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;

  } else if (reportFmt === 'method') {
    // ── 営業手法分析 ───────────────────────
    html += `<div class="rp-section"><div class="rp-section-title">💡 営業手法サマリー</div><div class="rp-section-body">`;
    text += `【営業手法サマリー】\n`;
    // 種別ごとにグルーピング
    const byType = {};
    for (const a of acts) {
      if (!byType[a.type]) byType[a.type] = [];
      byType[a.type].push(a);
    }
    for (const [type, typeActs] of Object.entries(byType).sort((a,b)=>b[1].length-a[1].length)) {
      html += `<div class="rp-method-item"><div class="rp-method-name">${esc(type)} (${typeActs.length}件)</div>`;
      text += `\n■ ${type} (${typeActs.length}件)\n`;
      for (const a of typeActs) {
        const name = a._kind === 'agent' ? (a._person.name||a._person.company) : a._person.company;
        html += `<div style="font-size:12px;color:var(--muted);padding:2px 0">${a.date.slice(5)} ${esc(name)} — ${esc(a.content.slice(0,40))}${a.content.length>40?'…':''}</div>`;
        text += `  ${a.date.slice(5)} ${name} — ${a.content.slice(0,60)}${a.content.length>60?'…':''}\n`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;

    // 担当営業別サマリー
    const byRep = {};
    for (const a of acts) {
      const rep = a.repName || '（未記入）';
      if (!byRep[rep]) byRep[rep] = { total: 0, byType: {} };
      byRep[rep].total++;
      byRep[rep].byType[a.type] = (byRep[rep].byType[a.type] || 0) + 1;
    }
    const repEntries = Object.entries(byRep).sort((a,b) => b[1].total - a[1].total);
    if (repEntries.length) {
      html += `<div class="rp-section"><div class="rp-section-title">👤 担当営業別サマリー</div><div class="rp-section-body">`;
      text += `\n【担当営業別サマリー】\n`;
      for (const [rep, dat] of repEntries) {
        const breakdown = Object.entries(dat.byType).map(([t,n]) => `${t}${n}件`).join(' / ');
        html += `<div class="rp-method-item"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;color:var(--primary)">${esc(rep)}</span><span style="font-size:12px;color:var(--muted)">計 ${dat.total}件</span></div><div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(breakdown)}</div></div>`;
        text += `  ${rep}: ${dat.total}件 (${breakdown})\n`;
      }
      html += `</div></div>`;
    }

    // 次のアクション一覧
    const withNext = acts.filter(a => a.next);
    if (withNext.length) {
      html += `<div class="rp-section"><div class="rp-section-title">📌 次のアクション一覧</div><div class="rp-section-body">`;
      text += `\n【次のアクション一覧】\n`;
      for (const a of withNext) {
        const name = a._kind === 'agent' ? (a._person.name||a._person.company) : a._person.company;
        html += `<div class="rp-method-item" style="display:flex;gap:8px;align-items:baseline"><span style="color:var(--primary);font-weight:700;min-width:80px;font-size:12px">${esc(name)}</span><span>${esc(a.next)}</span></div>`;
        text += `  ${name}: ${a.next}\n`;
      }
      html += `</div></div>`;
    }
  }

  // ── フォローアップ一覧（共通）─────────
  const followActs = acts.filter(a => a.fuStatus === 'pending');
  if (followActs.length) {
    html += `<div class="rp-section"><div class="rp-section-title">⚠️ 要フォローアップ</div><div class="rp-section-body">`;
    text += `\n【要フォローアップ】\n`;
    for (const a of followActs.sort((x,y) => (x.fuDate||'').localeCompare(y.fuDate||''))) {
      const name = a._kind === 'agent' ? (a._person.name||a._person.company) : a._person.company;
      const overdue = a.fuDate && a.fuDate < toDay();
      html += `<div class="rp-follow-item">
        <div>
          <div style="font-weight:700;font-size:13px">${esc(name)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(a.content.slice(0,50))}${a.content.length>50?'…':''}</div>
          ${a.next ? `<div style="font-size:12px;color:var(--primary);margin-top:2px">→ ${esc(a.next)}</div>` : ''}
        </div>
        ${a.fuDate ? `<div class="rp-follow-date" style="color:${overdue?'var(--danger)':'var(--warning)'};margin-left:auto;flex-shrink:0">${a.fuDate.slice(5)}まで</div>` : ''}
      </div>`;
      text += `  ${name}${a.fuDate?' ('+a.fuDate+'まで)':''}: ${a.next||a.content.slice(0,40)}\n`;
    }
    html += `</div></div>`;
  }

  // ── 振り返りメモ ──────────────────────
  const memo = document.getElementById('rpMemo').value.trim();
  if (memo) {
    text += `\n【今週の気づき・改善点】\n${memo}\n`;
  }

  document.getElementById('rpBody').innerHTML = html;
  document.getElementById('rpCopyBtn').disabled = false;

  // プレーンテキストのヘッダーを構築
  reportGenText = `━━━━━━━━━━━━━━━━━━━━━━━\n📊 週次営業レポート\n${rng.label}\n━━━━━━━━━━━━━━━━━━━━━━━\n\n` + text +
    (memo ? '' : '') + // memo is appended above if exists
    `\n生成: ${toDay()}`;
}

function copyReport() {
  const memo = document.getElementById('rpMemo').value.trim();
  let fullText = reportGenText;
  // 振り返りメモを末尾に追加（未生成テキストに追記）
  if (memo && !fullText.includes('【今週の気づき')) {
    fullText += `\n【今週の気づき・改善点】\n${memo}\n`;
  }
  if (!fullText) return;
  navigator.clipboard.writeText(fullText).then(() => {
    const btn = document.getElementById('rpCopyBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ コピーしました！';
    btn.style.background = 'var(--success)';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = fullText;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('rpCopyBtn');
    btn.textContent = '✓ コピーしました！';
    setTimeout(() => { btn.textContent = '📋 テキストをコピー'; }, 2000);
  });
}

// ── Overlay close ─────────────────────────────────
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ── Init ──────────────────────────────────────────
(function init() {
  switchMode(currentMode);
  // Mobile: show list immediately
  if (isMobile()) {
    document.getElementById('mobileListView').style.display = 'flex';
    renderMobileList();
  }
  // 起動時にスプシから自動読込（サイレント）
  autoLoadFromSheet();
})();
</script>
