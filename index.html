let mobileSort   = 'name'; // 'name' | 'recent' | 'follow'
let _mbSelectedAgent = ''; // 代理店タブの代理店選択状態
let sbFilter     = 'all';  // sidebar agent filter

const getPeople = () => currentMode === 'agent' ? agentPeople : salonPeople;
const setPeople = arr => { if (currentMode === 'agent') agentPeople = arr; else salonPeople = arr; };
const save = () => {
  localStorage.setItem('karte_agent_v1', JSON.stringify(agentPeople));
  localStorage.setItem('karte_salon_v1', JSON.stringify(salonPeople));
  localStorage.setItem('karte_mode', currentMode);
};
const getPerson = id => getPeople().find(p => p.id === id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const toDay = () => new Date().toISOString().slice(0, 10);

// サロンID 自動採番（SAL-XXXXX形式、既存最大値+1）
function generateSalonId() {
  const nums = salonPeople.map(p => parseInt((p.salonId || '').replace('SAL-', '')) || 0);
  return 'SAL-' + String((nums.length ? Math.max(...nums) : 0) + 1).padStart(4, '0');
}

// 髪ドラ売上タブ: 売上マスターシート（Spreadsheet A）からサロンIDで購買履歴を取得して表示
async function loadHDRASales(personId) {
  const wrap = document.getElementById('hdra-sales-wrap');
  if (!wrap) return;
  const p = getPerson(personId);
  if (!p) return;

  if (!p.salonId) {
    wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">
      サロンIDが未設定です<br><small>サロン登録時に自動付与されます</small></div>`;
    return;
  }

  wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted)">⏳ 読み込み中...</div>`;
  try {
    const resp = await fetch(`${GAS_URL}?action=getSalonSales&salonId=${encodeURIComponent(p.salonId)}`);
    const result = await resp.json();
    if (!result.ok) throw new Error(result.error || '取得失敗');

    const rows = result.data || [];
    if (rows.length === 0) {
      wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">
        売上データがありません<br><small>サロンID: ${esc(p.salonId)}</small></div>`;
      return;
    }

    // 月別集計（売上マスターの列名に合わせる）
    const byYm = {};
    rows.forEach(r => {
      const ym = String(r['年月'] || '');
      if (!byYm[ym]) byYm[ym] = { amt: 0, qty: 0, prods: {} };
      byYm[ym].amt += Number(r['売上金額_税抜']) || 0;
      byYm[ym].qty += Number(r['売上数量'])      || 0;
      const prod = r['商品名'] || 'その他';
      byYm[ym].prods[prod] = (byYm[ym].prods[prod] || 0) + (Number(r['売上金額_税抜']) || 0);
    });
    const totalAmt = rows.reduce((s, r) => s + (Number(r['売上金額_税抜']) || 0), 0);
    const totalQty = rows.reduce((s, r) => s + (Number(r['売上数量'])      || 0), 0);
    const ymList = Object.keys(byYm).sort().reverse();

    let html = `
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">💰 髪ドラ購買履歴</div>
          <span style="font-size:11px;color:var(--muted)">サロンID: ${esc(p.salonId)}</span>
        </div>
        <div class="card-body" style="display:flex;gap:24px;flex-wrap:wrap">
          <div>
            <div style="font-size:24px;font-weight:700;color:var(--primary)">¥${Math.round(totalAmt).toLocaleString()}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">累計購買金額（税抜）</div>
          </div>
          <div>
            <div style="font-size:24px;font-weight:700;color:var(--primary)">${totalQty}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">累計数量 / ${rows.length}明細</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><div class="card-title">月別推移</div></div>
        <div class="card-body" style="padding:0;overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:#f8f9fa;border-bottom:2px solid #e9ecef">
              <th style="text-align:left;padding:8px 12px;font-weight:600">年月</th>
              <th style="text-align:right;padding:8px 12px;font-weight:600">金額（税抜）</th>
              <th style="text-align:right;padding:8px 12px;font-weight:600">数量</th>
              <th style="text-align:left;padding:8px 12px;font-weight:600">主な商品</th>
            </tr></thead>
            <tbody>`;
    ymList.forEach(ym => {
      const d = byYm[ym];
      const prodHtml = Object.entries(d.prods).sort((a,b)=>b[1]-a[1]).slice(0, 3)
        .map(([name])=>`<span style="display:inline-block;padding:1px 7px;margin:1px;border-radius:10px;background:#e8f0fe;color:#1a73e8;font-size:11px">${esc(name)}</span>`).join('');
      html += `<tr style="border-bottom:1px solid #f1f3f4">
        <td style="padding:8px 12px;font-weight:600">${esc(ym)}</td>
        <td style="padding:8px 12px;text-align:right">¥${Math.round(d.amt).toLocaleString()}</td>
        <td style="padding:8px 12px;text-align:right">${d.qty}</td>
        <td style="padding:8px 12px">${prodHtml}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
    wrap.innerHTML = html;
  } catch(e) {
    wrap.innerHTML = `<div style="padding:24px;text-align:center;color:#dc3545;font-size:13px">取得エラー: ${esc(e.message)}</div>`;
  }
}
const toMonth = () => new Date().toISOString().slice(0, 7);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const isMobile = () => window.innerWidth <= 767;

// ── Mobile detection helpers ──────────────────────
function syncMobileSearch() {
  const v = document.getElementById('mobileSearchInput').value;
  document.getElementById('searchInput').value = v;
  renderSidebar();
  renderMobileList();
}

// ── Mobile Back ───────────────────────────────────
function mobileBack() {
  const detail = document.getElementById('mobileDetail');
  detail.classList.remove('open');
  document.getElementById('mobileAddActBar').style.display = 'none';
  document.getElementById('hdrBack').classList.add('hidden');
  // restore title

// ── Sidebar Filter (agent mode) ───────────────────
function setSbFilter(val, el) {
  sbFilter = val;
  document.querySelectorAll('#sbFilterBar .mf-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  renderSidebar();
}

// ── Mobile Filter / Sort helpers ─────────────────
function setMobileFilter(val, el) {
  mobileFilter = val;
  document.querySelectorAll('#mobileFilterStrip .mf-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');

}

function toggleMobileSort() {
  const isAgent = currentMode === 'agent';
  const order  = isAgent ? ['name','recent','follow','agent'] : ['name','recent','follow'];
  const labels = { name:'名前順', recent:'最終活動順', follow:'フォロー優先', agent:'代理店順' };
  const idx = (order.indexOf(mobileSort) + 1) % order.length;
  mobileSort = order[idx];
  const btn = document.getElementById('mfSort');
  if (btn) btn.textContent = '↕ ' + labels[mobileSort];
  renderMobileList();
}

// ── Mobile List ───────────────────────────────────
function selectMbAgent(name) {
  _mbSelectedAgent = name;
  const title = name ? `${name}` : '代理店カルテ';
  document.getElementById('hdrTitle').textContent = title;
  document.getElementById('hdrTitleCenter').textContent = title;
  renderMobileList();
}

function backToMbAgentPicker() {
  _mbSelectedAgent = '';
  document.getElementById('mobileSearchInput').value = '';
  document.getElementById('hdrTitle').textContent = '代理店カルテ';
  document.getElementById('hdrTitleCenter').textContent = '代理店カルテ';
  renderMobileList();
}

function renderMobileList() {
  if (!isMobile()) return;

  const wrap = document.getElementById('mbListWrap');
  const searchBar = document.querySelector('.mobile-list-search');
  const filterStrip = document.getElementById('mobileFilterStrip');

  // 代理店モードかつ代理店未選択 → 代理店ピッカー表示
  if (currentMode === 'agent' && !_mbSelectedAgent) {
    const q = (document.getElementById('mobileSearchInput').value || '').toLowerCase();
    if (!q) {
      if (searchBar) searchBar.style.display = 'none';
      if (filterStrip) filterStrip.style.display = 'none';

      // 代理店ごとの担当者数を集計
      const agentCounts = {};
      agentPeople.forEach(p => {
        const co = p.company || '';
        if (co && !/^[\d\-]+$/.test(co.trim())) {
          agentCounts[co] = (agentCounts[co] || 0) + 1;
        }
      });
      const isValidAgent = v => v && !/^[\d\-]+$/.test(v.trim());
      const extra = Object.keys(agentCounts).filter(n => !AGENT_NAMES.includes(n)).sort((a,b) => a.localeCompare(b, 'ja'));
      const allAgents = [...AGENT_NAMES.filter(n => agentCounts[n]), ...extra];

      let html = '<div class="agent-picker" style="padding:16px">';
      html += '<div class="agent-picker-title"><svg class="icon icon-lg"><use href="#i-users"/></svg> 代理店を選択してください</div>';
      html += '<div class="agent-picker-grid">';
      allAgents.forEach(name => {
        const cnt = agentCounts[name] || 0;
        const avatar = esc(name.slice(0, 2));
        html += `<div class="agent-pick-card" onclick="selectMbAgent('${esc(name)}')">
          <div class="agent-pick-avatar">${avatar}</div>
          <div class="agent-pick-name">${esc(name)}</div>
          <div class="agent-pick-count">${cnt}名</div>
        </div>`;
      });
      html += '</div></div>';
      wrap.innerHTML = html;
      return;
    }
  }

  // 通常表示: 検索バー・フィルター表示
  if (searchBar) searchBar.style.display = '';
  if (filterStrip) filterStrip.style.display = '';

  const q = (document.getElementById('mobileSearchInput').value || document.getElementById('searchInput').value || '').toLowerCase();

  let filtered = getPeople().filter(p => {
    // 代理店モードで代理店選択中 → その代理店だけ
    if (currentMode === 'agent' && _mbSelectedAgent && p.company !== _mbSelectedAgent) return false;
    // text search
    if (q && !p.name.toLowerCase().includes(q) && !p.company.toLowerCase().includes(q) && !(p.companyKana||'').toLowerCase().includes(q)) return false;
    // filter chip
    if (mobileFilter === 'follow') {
      const hasPending = (p.activities||[]).some(a => a.fuStatus === 'pending');
      if (!hasPending) return false;
    } else if (mobileFilter === 'watch') {
      if (p.status !== 'watch') return false;
    }
    return true;
  });

  // sort
  if (mobileSort === 'name') {
    filtered.sort((a, b) => (a.company||a.name).localeCompare(b.company||b.name, 'ja'));
  } else if (mobileSort === 'recent') {
    filtered.sort((a, b) => {
      const aLast = (a.activities||[]).reduce((m,x) => x.date > m ? x.date : m, '');
      const bLast = (b.activities||[]).reduce((m,x) => x.date > m ? x.date : m, '');
      return bLast.localeCompare(aLast);
    });
  } else if (mobileSort === 'follow') {
    filtered.sort((a, b) => {
      const aOv = (a.activities||[]).some(x => x.fuStatus==='pending' && x.fuDate && x.fuDate < toDay()) ? 0 : (a.activities||[]).some(x=>x.fuStatus==='pending') ? 1 : 2;
      const bOv = (b.activities||[]).some(x => x.fuStatus==='pending' && x.fuDate && x.fuDate < toDay()) ? 0 : (b.activities||[]).some(x=>x.fuStatus==='pending') ? 1 : 2;
      return aOv - bOv;
    });
  } else if (mobileSort === 'agent') {
    filtered.sort((a, b) => {
      const cmp = (a.company||'').localeCompare(b.company||'', 'ja');
      return cmp !== 0 ? cmp : (a.name||'').localeCompare(b.name||'', 'ja');
    });
  }

  if (!filtered.length) {
    wrap.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">📋</div><div>${q ? '「'+q+'」に該当するカルテがありません' : 'カルテがありません'}</div>${!q ? '<button class="btn btn-primary btn-sm" onclick="openAddModal()" style="margin-top:12px;padding:10px 20px;font-size:14px">＋ 新規登録</button>' : ''}</div>`;
    return;
  }
  const isAgent = currentMode === 'agent';

  // helper: render single card HTML
  const cardHtml = p => {
    const mainLabel = isAgent ? p.name : p.company;
    const branchInfo = isAgent && p.agentBranch ? ` / ${p.agentBranch}` : '';
    const subLabel  = isAgent ? (p.company + branchInfo) : (p.name ? 'オーナー: ' + p.name : '');
    const hasPending = (p.activities || []).some(a => a.fuStatus === 'pending');
    const overdue    = (p.activities || []).some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < toDay());
    const lastAct    = (p.activities||[]).reduce((m,x) => x.date > m ? x.date : m, '');
    const avatarTxt  = esc((mainLabel || '?').slice(0,2));
    const phoneBtn   = (currentMode === 'salon' && p.phone)
      ? `<a class="mb-card-phone" href="tel:${esc(p.phone)}" onclick="event.stopPropagation()"><svg class="icon"><use href="#i-phone"/></svg></a>` : '';
    const badges = [
      overdue ? '<span class="badge badge-fu" style="background:#f8d7da;color:#721c24">⚠ 期限超過</span>'
              : hasPending ? '<span class="badge badge-fu">要フォロー</span>' : '',
      ...(p.tags || []).map(t => `<span class="badge badge-tag">${esc(t)}</span>`)
    ].filter(Boolean).join('');
    const daysSince = lastAct ? Math.floor((new Date() - new Date(lastAct)) / 86400000) : 9999;
    const isDormant = daysSince >= 60 && !hasPending;
    const lastActHtml = lastAct ? `<div class="mb-card-last">🕐 ${relativeDate(lastAct)}${isDormant ? ' <span class="dormant-tag">'+daysSince+'日未訪問</span>' : ''}</div>` : '<div class="mb-card-last"><span class="dormant-tag">未訪問</span></div>';
    return `<div class="mb-card${isDormant ? ' dormant' : ''}" onclick="selectPerson('${p.id}')">
      <div class="mb-card-avatar" style="${overdue?'background:#DC3545':hasPending?'background:#e65c00':''}">${avatarTxt}</div>
      <div class="mb-card-body">
        <div class="mb-card-name">${esc(mainLabel)}</div>
        <div class="mb-card-sub">${esc(subLabel)}</div>
        ${badges ? `<div class="mb-card-badges">${badges}</div>` : ''}
        ${lastActHtml}
      </div>
      <div class="mb-card-right">
        ${phoneBtn}
        <span class="mb-card-arrow"><svg class="icon"><use href="#i-chevron-right"/></svg></span>
      </div>
    </div>`;
  };

  // 戻るボタン（代理店選択中）
  const backBtn = (currentMode === 'agent' && _mbSelectedAgent)
    ? `<div style="padding:8px 16px"><button class="agent-picker-back" onclick="backToMbAgentPicker()"><svg class="icon icon-sm"><use href="#i-arrow-left"/></svg> 代理店を選び直す</button></div>` : '';

  // 代理店順: group by company with section headers
  if (mobileSort === 'agent' && isAgent) {
    let lastCo = null;
    const parts = [];
    for (const p of filtered) {
      if (p.company !== lastCo) {
        lastCo = p.company;
        parts.push(`<div class="mb-agent-group-hdr"><svg class="icon icon-sm" style="margin-right:4px"><use href="#i-briefcase"/></svg> ${esc(p.company||'未設定')}</div>`);
      }
      parts.push(cardHtml(p));
    }
    wrap.innerHTML = backBtn + parts.join('');
  } else {
    wrap.innerHTML = backBtn + filtered.map(cardHtml).join('');
  }
}

// ── Sidebar ───────────────────────────────────────
function renderSidebar() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const isAgent = currentMode === 'agent';

  // フィルターバーの表示切替
  const filterBar = document.getElementById('sbFilterBar');
  if (filterBar) filterBar.style.display = isAgent ? '' : 'none';

  let filtered = getPeople().filter(p => {
    if (q && !p.name.toLowerCase().includes(q) && !p.company.toLowerCase().includes(q) && !(p.companyKana||'').toLowerCase().includes(q)) return false;
    if (isAgent) {
      if (sbFilter === 'follow') {
        if (!(p.activities||[]).some(a => a.fuStatus === 'pending')) return false;
      } else if (sbFilter === 'watch') {
        if (p.status !== 'watch') return false;
      }
      const areaFilter = document.getElementById('sbArea') ? document.getElementById('sbArea').value : '';
      if (areaFilter && p.area !== areaFilter) return false;
    }
    return true;
  });

  // ソート
  const sortVal = isAgent && document.getElementById('sbSort') ? document.getElementById('sbSort').value : 'name';
  if (sortVal === 'recent') {
    filtered.sort((a, b) => {
      const aL = (a.activities||[]).reduce((m,x) => x.date > m ? x.date : m, '');
      const bL = (b.activities||[]).reduce((m,x) => x.date > m ? x.date : m, '');
      return bL.localeCompare(aL);
    });
  } else if (sortVal === 'follow') {
    filtered.sort((a, b) => {
      const rank = p => {
        if ((p.activities||[]).some(x => x.fuStatus==='pending' && x.fuDate && x.fuDate < toDay())) return 0;
        if ((p.activities||[]).some(x => x.fuStatus==='pending')) return 1;
        return 2;
      };
      return rank(a) - rank(b) || a.company.localeCompare(b.company, 'ja');
    });
  } else {
    filtered.sort((a, b) => a.company.localeCompare(b.company, 'ja'));
  }

  // エリア選択肢を更新（代理店モード時のみ）
  if (isAgent) {
    const areaSel = document.getElementById('sbArea');
    if (areaSel) {
      const curArea = areaSel.value;
      const areas = [...new Set(agentPeople.map(p => p.area).filter(v => v))].sort();
      areaSel.innerHTML = '<option value="">エリア: すべて</option>' +
        areas.map(a => `<option value="${esc(a)}" ${a===curArea?'selected':''}>${esc(a)}</option>`).join('');
    }
  }

  document.getElementById('sbCount').textContent = `${filtered.length}名`;

  if (!filtered.length) {
    document.getElementById('sbList').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">該当なし</div>';
    return;
  }

  document.getElementById('sbList').innerHTML = filtered.map(p => {
    const hasPending = (p.activities || []).some(a => a.fuStatus === 'pending');
    const overdue = (p.activities || []).some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < toDay());
    const isAgent = currentMode === 'agent';
    const mainLabel = isAgent ? p.name : p.company;
    const subLabel = isAgent ? p.company : (p.name ? 'オーナー: ' + p.name : '');
    return `<div class="sb-item ${p.id === currentId ? 'active' : ''}" onclick="selectPerson('${p.id}')">
      <div class="sb-name">${esc(mainLabel)}</div>
      <div class="sb-company">${esc(subLabel)}${isAgent && p.title ? ' · ' + esc(p.title) : ''}</div>
      <div class="sb-badges">
        ${overdue ? '<span class="badge badge-fu">⚠ 期限超過</span>' : hasPending ? '<span class="badge badge-fu">要フォロー</span>' : ''}
        ${(p.tags || []).map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── Select Person ─────────────────────────────────
function selectPerson(id) {
  currentId = id;
  renderSidebar();
  renderMain();

  // Mobile: open detail panel
  if (isMobile()) {
    const p = getPerson(id);
    if (!p) return;
    const isAgent = currentMode === 'agent';
    const title = isAgent ? p.name : p.company;
    document.getElementById('hdrTitleCenter').textContent = title || '';
    document.getElementById('hdrBack').classList.remove('hidden');

    // Render detail content into mobile panel
    document.getElementById('mobileDetailInner').innerHTML = document.getElementById('main').innerHTML;

    // Default to activity tab
    const tabs = document.getElementById('mobileDetailInner').querySelectorAll('.tab');
    const contents = document.getElementById('mobileDetailInner').querySelectorAll('.tab-content');
    let actIdx = -1;
    tabs.forEach((t, i) => { if (t.textContent.includes('活動ログ')) actIdx = i; });
    if (actIdx >= 0) {
      tabs.forEach(t => t.classList.remove('active'));
      contents.forEach(t => t.classList.remove('active'));
      tabs[actIdx].classList.add('active');
      contents[actIdx].classList.add('active');
    }

    // Rewire tab clicks inside mobile detail
    tabs.forEach((tab, i) => {
      tab.onclick = function() {
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        contents[i].classList.add('active');
        // Show/hide sticky add bar based on active tab
        updateMobileAddActBar();
      };
    });

    const detail = document.getElementById('mobileDetail');
    detail.classList.add('open');
    updateMobileAddActBar();
  }
}

function updateMobileAddActBar() {
  if (!isMobile()) return;
  const activeTab = document.querySelector('#mobileDetailInner .tab.active');
  const bar = document.getElementById('mobileAddActBar');
  if (activeTab && activeTab.textContent.includes('活動ログ')) {
    bar.style.display = 'block';
  } else {
    bar.style.display = 'none';
  }
}

// ── Main Render ───────────────────────────────────
function renderMain() {
  const p = getPerson(currentId);
  if (!p) {
    document.getElementById('main').innerHTML = `<div class="empty"><div class="empty-ico">📋</div><div class="empty-title">カルテを選択してください</div><div style="font-size:13px">左から担当者を選ぶか、新規登録してください</div></div>`;
    return;
  }

  const isAgent = currentMode === 'agent';
  const statusLabel = { active:'アクティブ', watch:'要観察', inactive:'休眠' }[p.status] || '';
  const statusColor = { active:'#28A745', watch:'#e65c00', inactive:'#6C757D' }[p.status] || '#6C757D';
  const profileMain = isAgent ? p.name : p.company;
  const profileSub = isAgent
    ? (p.company + (p.title ? ' · ' + p.title : ''))
    : (p.name ? 'オーナー: ' + p.name : '');

  document.getElementById('main').innerHTML = `
    <div class="profile">
      <div class="avatar" style="background:${statusColor}">${esc(profileMain.slice(0,2))}</div>

function renderSales(p) {
  const sales = [...(p.sales || [])].sort((a, b) => b.ym.localeCompare(a.ym));
  const tgt = p.targetSistri || 0;
  const cm = toMonth();
  const cur = sales.find(s => s.ym === cm);
  const last12 = sales.slice(0, 12);
  const totalSistri = last12.reduce((s, r) => s + (r.sistri || 0), 0);
  const avg = last12.length ? Math.round(totalSistri / last12.length * 10) / 10 : 0;
  const pct = tgt > 0 && cur ? Math.round((cur.sistri || 0) / tgt * 100) : null;
  const pClass = pct === null ? '' : pct >= 100 ? '' : pct >= 70 ? 'warn' : 'bad';
  const achClass = pct === null ? '' : pct >= 100 ? 'good' : pct >= 70 ? 'ok' : 'bad';

  const rows = sales.map(s => {
    const sp = tgt > 0 ? Math.round((s.sistri || 0) / tgt * 100) : null;
    const sc = sp === null ? '' : sp >= 100 ? 'good' : sp >= 70 ? 'ok' : 'bad';
    return `<tr>
      <td>${s.ym}</td>
      <td>${s.sistri || 0}</td>
      <td>${sp !== null ? `<span class="ach ${sc}">${sp}%</span>` : '—'}</td>
      <td>${s.sales != null ? s.sales : '—'}</td>
      <td style="color:var(--muted)">${esc(s.memo) || ''}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteSales('${s.ym}')">削除</button></td>
    </tr>`;
  }).join('');

  return `<div class="card">
    <div class="card-hdr"><div class="card-title">今月の実績</div><button class="btn btn-primary btn-sm" onclick="openSalesModal()">＋ 実績入力</button></div>
    <div class="card-body">
      <div class="stats-grid">
        <div class="stat"><div class="stat-val">${cur ? (cur.sistri || 0) : '—'}<span class="stat-unit"> 本</span></div><div class="stat-lbl">シストリ販売（今月）</div></div>
        <div class="stat"><div class="stat-val">${pct !== null ? `<span class="ach ${achClass}">${pct}%</span>` : '—'}</div><div class="stat-lbl">目標達成率（${tgt}本目標）</div></div>
        <div class="stat"><div class="stat-val">${avg}<span class="stat-unit"> 本</span></div><div class="stat-lbl">月平均（直近12ヶ月）</div></div>
      </div>
      ${pct !== null ? `<div class="prog-wrap"><div class="prog-lbl"><span>目標達成率</span><span>${pct}%</span></div><div class="prog-bar"><div class="prog-fill ${pClass}" style="width:${Math.min(pct,100)}%"></div></div></div>` : ''}
    </div>
  </div>
  <div class="card">
    <div class="card-hdr"><div class="card-title">月別実績</div></div>
    <div class="card-body" style="padding:0">
      ${!sales.length ? `<div style="text-align:center;padding:28px;color:var(--muted)"><div style="font-size:30px;margin-bottom:7px">📊</div><div>実績データがありません</div></div>` :
        `<table class="tbl"><thead><tr><th>対象月</th><th>シストリ（本）</th><th>達成率</th><th>売上（万円）</th><th>メモ</th><th></th></tr></thead><tbody>${rows}</tbody></table>`}
    </div>
  </div>`;
}

function switchTab(el, id) {

  container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  if (target) target.classList.add('active');
  if (isMobile()) updateMobileAddActBar();
}

// ── CSV Import ────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (inQuote) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuote = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuote = true; }
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\r' && next === '\n') { row.push(field); field = ''; rows.push(row); row = []; i++; }
      else if (ch === '\n' || ch === '\r') { row.push(field); field = ''; rows.push(row); row = []; }
      else { field += ch; }
    }
  }
  if (row.length || field) { row.push(field); rows.push(row); }
  return rows;
}

function importSalonCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    const regions = ['近畿', '関東・北関東', '中部（東海・甲信越）', '中国・四国', '九州・沖縄', '東北・北陸', '北海道'];
    const colStarts = [0, 4, 8, 12, 16, 20, 24];
    const dataRows = rows.slice(4);
    const existingNames = new Set(salonPeople.map(p => p.company));
    const newSalons = [];

    for (const row of dataRows) {
      for (let ri = 0; ri < regions.length; ri++) {
        const base = colStarts[ri];
        const name = (row[base] || '').trim();
        if (!name || existingNames.has(name)) continue;
        const memo = (row[base + 2] || '').trim();
        newSalons.push({
          id: uid(), company: name, name: '', area: regions[ri],
          memo, status: 'active', activities: [], sales: [], tags: [],
          agentName: '', agentBranch: '', agentContact: '', salesRep: '',
          legalName: '', salonType: '', target: '', phone: '', email: '',
          title: '', address: '', hpbUrl: '', staffCount: 0, groupStores: 0, annualTarget: '',
        });
        existingNames.add(name);
      }
    }

    event.target.value = '';
    if (!newSalons.length) { alert('インポートできる新規サロンが見つかりませんでした\n（既存データとの重複を除いた結果）'); return; }
    if (confirm(`${newSalons.length}件のサロンをインポートします。よろしいですか？`)) {
      salonPeople.push(...newSalons);
      save();
      renderSearchView();
      alert(`✅ ${newSalons.length}件のサロンをインポートしました`);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

  };

  const pArr = getPeople();
  let isNewSalon = false;
  if (editingId) {
    const idx = pArr.findIndex(p => p.id === editingId);
    if (idx >= 0) pArr[idx] = { ...pArr[idx], ...data };
    currentId = editingId;
    // サロンの編集も新タブへ同期（UPSERT）
    if (currentMode === 'salon' && pArr[idx] && pArr[idx].salonId) {
      syncSalonToSalesRegSheet({ ...pArr[idx] }, false);
    }
  } else {
    // サロン新規登録時: サロンIDを自動付与
    if (currentMode === 'salon') {
      data.salonId = generateSalonId();
      isNewSalon = true;
    }
    const np = { id: uid(), activities: [], sales: [], ...data };
    pArr.push(np);
    currentId = np.id;
    // サロン: 新タブ「営業登録サロン」に書き込み / 代理店: 既存処理のまま
    if (currentMode === 'salon') {
      syncSalonToSalesRegSheet(data, true);
    } else {
      syncToSheet(currentMode, data);
    }
  }

  save(); closePersonModal(); renderSidebar(); renderMobileList(); renderMain();

function saveAct() {
  const date = document.getElementById('aDate').value;

  // 選択チップから content を自動生成
  const result = document.getElementById('aResult').value;
  const topics = [...document.querySelectorAll('#aTopicChips .act-topic-chip.active')]
    .map(c => c.dataset.val);
  const memo = document.getElementById('aContent').value.trim();

  let content = memo;
  if (!content) {
    const parts = [];
    if (result) parts.push(result);
    if (topics.length) parts.push(topics.join('・'));
    content = parts.join(' / ');
  } else if (result || topics.length) {
    // メモがあってもチップ情報を先頭に付加
    const prefix = [result, topics.join('・')].filter(Boolean).join(' / ');
    content = prefix ? `[${prefix}] ${content}` : content;
  }

  if (!date) { alert('日付が設定されていません'); return; }
  if (!content) { alert('訪問結果か話した内容を選択してください'); return; }

  // 詳細パネルの手動フォロー日があれば反映
  const fuDateManual = document.getElementById('aFuDateManual');
  if (fuDateManual && fuDateManual.value &&
      document.getElementById('aFuStatus').value === 'pending' &&
      !document.getElementById('aFuDate').value) {
    document.getElementById('aFuDate').value = fuDateManual.value;
  }

  const targetId = _quickActPersonId || currentId;
  const p = getPerson(targetId);
  if (!p) return;
  p.activities = p.activities || [];
  const repName = document.getElementById('aRepName').value.trim();
  if (repName) localStorage.setItem('karte_last_rep', repName);
  const newAct = {
    id: uid(), date,
    type:   document.getElementById('aType').value,
    kind:   document.getElementById('aKind').value,
    result: result,
    topics: topics,
    content,
    next:       document.getElementById('aNext').value.trim(),
    fuDate:     document.getElementById('aFuDate').value,
    fuStatus:   document.getElementById('aFuStatus').value,
    repName,
    lecturer:   document.getElementById('aLecturer')?.value.trim() || '',
    minutesUrl: document.getElementById('aMinutesUrl').value.trim(),
  };
  p.activities.push(newAct);

  // サロンモードのみ活動ログを Spreadsheet A に同期
  if (currentMode === 'salon') syncActivityToSheet(p, newAct);

  const fromSearch = !!_quickActPersonId;
  save(); closeActModal(); renderMain(); renderSidebar(); renderMobileList();
  // If opened from search view, just refresh search
  if (fromSearch) {
    renderSearchView();
    return;
  }
  // On mobile: refresh detail content and keep act tab active
  if (isMobile() && currentId) {
    selectPerson(currentId);
  } else {
    setTimeout(() => { const t = [...document.querySelectorAll('.tab')].find(t => t.textContent.includes('活動ログ')); if (t) t.click(); }, 50);
  }
}

  if (a) {

function relativeDate(dateStr) {
  if (!dateStr) return '';
  const diff = Math.floor((new Date() - new Date(dateStr)) / 86400000);
  if (diff < 0) {
    const abs = Math.abs(diff);
    if (abs === 1) return '明日';
    if (abs < 7) return `${abs}日後`;
    return `${Math.floor(abs/7)}週間後`;
  }
  if (diff === 0) return '今日';
  if (diff === 1) return '昨日';
  if (diff < 7) return `${diff}日前`;
  if (diff < 30) return `${Math.floor(diff/7)}週間前`;
  return `${Math.floor(diff/30)}ヶ月前`;
}

    grid.style.display = '';
    if (toolbar) toolbar.style.display = '';
    return false; // ピッカー非表示
  }

  // 代理店ピッカーを表示、ツールバー非表示
  picker.style.display = '';
  grid.style.display = 'none';
  if (toolbar) toolbar.style.display = 'none';

  // 代理店ごとのサロン数を集計
  const agentCounts = {};
  salonPeople.forEach(p => {
    const a = p.agentName || '';
    if (a && !/^[\d\-]+$/.test(a.trim())) {
      agentCounts[a] = (agentCounts[a] || 0) + 1;
    }
  });

  // AGENT_NAMES順 + その他
  const isValidAgent = v => v && !/^[\d\-]+$/.test(v.trim());
  const extra = Object.keys(agentCounts).filter(n => !AGENT_NAMES.includes(n)).sort((a,b) => a.localeCompare(b, 'ja'));
  const allAgents = [...AGENT_NAMES.filter(n => agentCounts[n]), ...extra];

  let html = `<div class="agent-picker-title"><svg class="icon icon-lg"><use href="#i-users"/></svg> 代理店を選択してください</div>`;
  html += '<div class="agent-picker-grid">';
  // 全サロン表示カード
  html += `<div class="agent-pick-all" onclick="selectSvAgent('')">
    <svg class="icon"><use href="#i-scissors"/></svg>
    <div class="agent-pick-name">すべてのサロン</div>
    <div class="agent-pick-count">${salonPeople.length}件</div>
  </div>`;
  allAgents.forEach(name => {
    const cnt = agentCounts[name] || 0;
    const avatar = esc(name.slice(0, 2));
    html += `<div class="agent-pick-card" onclick="selectSvAgent('${esc(name)}')">
      <div class="agent-pick-avatar">${avatar}</div>
      <div class="agent-pick-name">${esc(name)}</div>
      <div class="agent-pick-count">${cnt}件</div>
    </div>`;
  });
  html += '</div>';
  picker.innerHTML = html;
  return true; // ピッカー表示中
}

function selectSvAgent(name) {
  _svSelectedAgent = name;
  // 代理店フィルターのselectにも反映
  const sel = document.getElementById('svAgent');
  if (sel) {
    if (name && ![...sel.options].some(o => o.value === name)) {
      sel.add(new Option(name, name));
    }
    sel.value = name;
  }
  // ヘッダータイトルを更新
  const title = name ? `${name} のサロン` : 'サロンカルテ';
  document.getElementById('hdrTitle').textContent = title;
  document.getElementById('hdrTitleCenter').textContent = title;
  renderSearchView();
}

function backToAgentPicker() {
  _svSelectedAgent = '';
  document.getElementById('svSearch').value = '';
  document.getElementById('svAgent').value = '';
  document.getElementById('hdrTitle').textContent = 'サロンカルテ';
  document.getElementById('hdrTitleCenter').textContent = 'サロンカルテ';
  toggleSearchClear();
  renderSearchView();
}

function renderSearchView() {
  // 代理店ピッカー表示判定
  if (renderAgentPicker()) return;

  const q           = (document.getElementById('svSearch').value || '').toLowerCase();
  const filterAgent = _svSelectedAgent || document.getElementById('svAgent').value;
  const filterType  = document.getElementById('svType').value;
  const filterRep   = document.getElementById('svSalesRep').value;
  const sortBy      = document.getElementById('svSort').value;

  // ── 3段階エリアチップ描画 ──────────────────────────
  // 各サロンの地方・都道府県・市区町村を集計
  const regionCount = {}, prefCount = {}, cityCount = {};
  salonPeople.forEach(p => {
    const pref = extractPref(p.address);
    const city = extractArea(p.address);
    const region = PREF_TO_REGION[pref] || '';
    if (region) regionCount[region] = (regionCount[region] || 0) + 1;
    if (pref)   prefCount[pref]   = (prefCount[pref]   || 0) + 1;
    if (city)   cityCount[city]   = (cityCount[city]   || 0) + 1;
  });

  // 地方行
  const regionRow = document.getElementById('svRegionRow');
  if (regionRow) {
    const regions = Object.keys(REGION_MAP).filter(r => regionCount[r]);
    regionRow.innerHTML = regions.length ?
      `<span class="sv-area-chip ${!_svRegion ? 'active' : ''}" onclick="setRegion('')">すべて</span>` +
      regions.map(r => `<span class="sv-area-chip ${_svRegion === r ? 'active' : ''}" onclick="setRegion('${esc(r)}')">${esc(r)}<span class="chip-cnt">${regionCount[r]}</span></span>`).join('') : '';
  }

  // 都道府県行（地方選択後のみ）
  const prefRow = document.getElementById('svPrefRow');
  if (prefRow) {
    if (_svRegion) {
      const prefs = (REGION_MAP[_svRegion] || []).filter(p => prefCount[p]);
      prefRow.style.display = prefs.length ? '' : 'none';
      prefRow.innerHTML = prefs.length ?
        `<span class="sv-area-chip ${!_svPref ? 'active' : ''}" onclick="setPref('')">すべて</span>` +
        prefs.map(p => `<span class="sv-area-chip ${_svPref === p ? 'active' : ''}" onclick="setPref('${esc(p)}')">${esc(p)}<span class="chip-cnt">${prefCount[p]}</span></span>`).join('') : '';
    } else {
      prefRow.style.display = 'none';
      prefRow.innerHTML = '';
    }
  }

  // 市区町村行（都道府県選択後のみ）
  const cityRow = document.getElementById('svCityRow');
  if (cityRow) {
    if (_svPref) {
      const cities = Object.entries(cityCount)
        .filter(([c]) => {
          // この市区町村が選択中の都道府県に属するか確認
          return salonPeople.some(p => extractPref(p.address) === _svPref && extractArea(p.address) === c);
        })
        .sort((a, b) => b[1] - a[1]);
      cityRow.style.display = cities.length ? '' : 'none';
      cityRow.innerHTML = cities.length ?
        `<span class="sv-area-chip ${!_svCity ? 'active' : ''}" onclick="setAreaFilter('')">すべて</span>` +
        cities.map(([c, cnt]) => `<span class="sv-area-chip ${_svCity === c ? 'active' : ''}" onclick="setAreaFilter('${esc(c)}')">${esc(c)}<span class="chip-cnt">${cnt}</span></span>`).join('') : '';
    } else {
      cityRow.style.display = 'none';
      cityRow.innerHTML = '';
    }
  }

  // 代理店ドロップダウン更新（郵便番号・数字のみの値を除外）
  const agentSel = document.getElementById('svAgent');
  const curAgent = agentSel.value;
  const isValidAgent = v => v && !/^[\d\-]+$/.test(v.trim());
  const agents = [...new Set(salonPeople.map(p => p.agentName).filter(isValidAgent))].sort();
  agentSel.innerHTML = '<option value="">代理店: すべて</option>' +
    agents.map(a => `<option value="${esc(a)}" ${a === curAgent ? 'selected' : ''}>${esc(a)}</option>`).join('');

  // 担当営業ドロップダウン更新
  const repSel = document.getElementById('svSalesRep');
  const curRep = repSel.value;
  const reps = [...new Set(salonPeople.map(p => p.salesRep).filter(Boolean))].sort();
  repSel.innerHTML = '<option value="">担当営業: すべて</option>' +
    reps.map(r => `<option value="${esc(r)}" ${r === curRep ? 'selected' : ''}>${esc(r)}</option>`).join('');

  const today = toDay();
  const statusLabel = { active:'アクティブ', watch:'要観察', inactive:'休眠' };
  const statusColor = { active:'#28A745', watch:'#e65c00', inactive:'#6C757D' };

  // ベースフィルター（クイックチップ以外の条件）
  const baseFilter = p => {
    const matchQ = !q ||
      (p.company    || '').toLowerCase().includes(q) ||
      (p.companyKana|| '').toLowerCase().includes(q) ||
      (p.kamidoraId || '').toLowerCase().includes(q) ||
      (p.name       || '').toLowerCase().includes(q) ||
      (p.agentName  || '').toLowerCase().includes(q) ||
      (p.agentBranch|| '').toLowerCase().includes(q) ||
      (p.salesRep   || '').toLowerCase().includes(q) ||
      (p.address    || '').toLowerCase().includes(q) ||
      (p.salonType  || '').toLowerCase().includes(q) ||
      (p.memo       || '').toLowerCase().includes(q);
    const matchAgent = !filterAgent || p.agentName === filterAgent;
    const matchType  = !filterType  || p.salonType === filterType;
    const matchRep   = !filterRep   || p.salesRep  === filterRep;
    const pref   = extractPref(p.address);
    const city   = extractArea(p.address);
    const region = PREF_TO_REGION[pref] || '';
    const matchArea = (!_svRegion || region === _svRegion) &&
                      (!_svPref   || pref   === _svPref)   &&
                      (!_svCity   || city   === _svCity);
    return matchQ && matchAgent && matchType && matchRep && matchArea;
  };

  const baseResults = salonPeople.filter(baseFilter);

  // クイックチップ件数を更新
  const qCntOverdue  = baseResults.filter(p => (p.activities||[]).some(a => a.fuStatus==='pending' && a.fuDate && a.fuDate < today)).length;
  const qCntPending  = baseResults.filter(p => { const acts=p.activities||[]; const ov=acts.some(a=>a.fuStatus==='pending'&&a.fuDate&&a.fuDate<today); return acts.some(a=>a.fuStatus==='pending')&&!ov; }).length;
  const qCntWatch    = baseResults.filter(p => (p.status||'active')==='watch').length;
  const qCntInactive = baseResults.filter(p => (p.status||'active')==='inactive').length;
  const setQcnt = (id, n) => { const el=document.getElementById(id); if(el) el.textContent = n>0 ? n : ''; };
  const qCntDormant  = baseResults.filter(p => { const ld = (p.activities||[]).reduce((m,a) => a.date>m?a.date:m,''); return (ld ? Math.floor((new Date()-new Date(ld))/86400000) : 9999) >= 60; }).length;
  setQcnt('sqcAll',      baseResults.length);
  setQcnt('sqcOverdue',  qCntOverdue);
  setQcnt('sqcPending',  qCntPending);
  setQcnt('sqcWatch',    qCntWatch);
  setQcnt('sqcInactive', qCntInactive);
  setQcnt('sqcDormant',  qCntDormant);

  // 詳細絞込ボタンのバッジ更新
  const detailActiveCnt = [filterAgent, filterType, filterRep].filter(Boolean).length;
  const detailBtn = document.getElementById('svDetailBtn');
  if (detailBtn) {
    detailBtn.innerHTML = detailActiveCnt
      ? `絞込 <span class="sv-detail-badge">${detailActiveCnt}</span>`
      : '絞込 ▾';
    detailBtn.classList.toggle('on', detailActiveCnt > 0 || svDetailOpen);
  }

  // クリアボタン表示切替
  const hasFilter = svQuickFilter !== 'all' || _svRegion || filterAgent || filterType || filterRep || q;
  const clearBtn = document.getElementById('svClearBtn');
  if (clearBtn) clearBtn.style.display = hasFilter ? '' : 'none';

  // クイックチップでフィルター
  let results = baseResults.filter(p => {
    if (svQuickFilter === 'all') return true;
    const acts = p.activities || [];
    const isOverdue = acts.some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < today);
    const isPending = acts.some(a => a.fuStatus === 'pending');
    if (svQuickFilter === 'overdue')  return isOverdue;
    if (svQuickFilter === 'pending')  return isPending && !isOverdue;
    if (svQuickFilter === 'watch')    return (p.status || 'active') === 'watch';
    if (svQuickFilter === 'inactive') return (p.status || 'active') === 'inactive';
    if (svQuickFilter === 'dormant') { const ld = acts.reduce((m,a) => a.date>m?a.date:m,''); return (ld ? Math.floor((new Date()-new Date(ld))/86400000) : 9999) >= 60; }
    return true;
  });

  // ソート
  if (sortBy === 'follow') {
    results.sort((a, b) => {
      const score = p => {
        const acts = p.activities || [];
        if (acts.some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < today)) return 0;
        if (acts.some(a => a.fuStatus === 'pending')) return 1;
        if (acts.length === 0) return 2;
        return 3;
      };
      return score(a) - score(b) || a.company.localeCompare(b.company, 'ja');
    });
  } else if (sortBy === 'activity') {
    results.sort((a, b) => {
      const lastDate = p => (p.activities || []).reduce((d, a) => a.date > d ? a.date : d, '');
      return lastDate(b).localeCompare(lastDate(a)) || a.company.localeCompare(b.company, 'ja');
    });
  } else {
    results.sort((a, b) => a.company.localeCompare(b.company, 'ja'));
  }

  document.getElementById('svCount').textContent = `${results.length} 件`;

  if (!results.length) {
    document.getElementById('svGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)"><svg class="icon" style="width:48px;height:48px;opacity:.3;margin-bottom:12px"><use href="#i-search"/></svg><div>該当するサロンが見つかりません</div></div>`;
    return;
  }

  const searchQ = (document.getElementById('svSearch').value || '').trim();
  const highlightMatch = (text) => {
    if (!searchQ || !text) return esc(text);
    const escaped = esc(text);
    const re = new RegExp('(' + searchQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return escaped.replace(re, '<mark>$1</mark>');
  };

  const makeCard = (p, pinned) => {
    const acts = [...(p.activities || [])].sort((a, b) => b.date.localeCompare(a.date));
    const lastAct = acts[0];
    const hasPending = acts.some(a => a.fuStatus === 'pending');
    const overdue = acts.some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < today);
    const sc = p.status || 'active';
    const lastActDate = acts[0]?.date || '';
    const daysSinceLast = lastActDate ? Math.floor((new Date() - new Date(lastActDate)) / 86400000) : 9999;
    const isDormant = daysSinceLast >= 60 && !hasPending && !overdue;
    const hasActivity = acts.length > 0;
    const urgentClass = overdue ? 'urgent' : hasPending ? 'pending' : isDormant ? 'dormant' : hasActivity ? 'visited' : '';
    const nextFu = acts.filter(a => a.fuStatus === 'pending' && a.fuDate).sort((a, b) => a.fuDate.localeCompare(b.fuDate))[0];
    // Subtitle: show agent/rep/address but skip if same as search query
    const subParts = [];
    if (p.agentName && p.agentName.toLowerCase() !== searchQ.toLowerCase()) subParts.push({text: p.agentName});
    if (p.salesRep && p.salesRep.toLowerCase() !== searchQ.toLowerCase()) subParts.push({text: p.salesRep});
    if (p.address) subParts.push({text: p.address.slice(0,20), icon: 'i-map-pin'});
    const badgeHtml = [
      overdue ? '<span class="badge badge-fu"><svg class="icon icon-sm" style="width:10px;height:10px"><use href="#i-alert-tri"/></svg> 超過</span>' : hasPending ? '<span class="badge badge-fu">FU</span>' : '',
      sc !== 'active' ? `<span class="badge" style="background:${statusColor[sc]}15;color:${statusColor[sc]}">${statusLabel[sc]}</span>` : '',
    ].filter(Boolean).join('');
    const lastLine = lastAct
      ? `${relativeDate(lastAct.date)}${isDormant ? ' <span class="dormant-tag">'+daysSinceLast+'日</span>' : ''} — ${esc(lastAct.content.slice(0, 35))}${lastAct.content.length > 35 ? '…' : ''}`
      : '<span class="dormant-tag">未訪問</span>';
    const fuLine = nextFu ? ` <span style="color:${nextFu.fuDate < today ? 'var(--danger)' : '#e65c00'};font-weight:600"><svg class="icon" style="width:11px;height:11px;vertical-align:-1px"><use href="#i-calendar"/></svg>${relativeDate(nextFu.fuDate)}</span>` : '';
    // Quick action buttons
    const quickActions = `<div class="sv-card-quick">
      ${p.phone ? `<a href="tel:${esc(p.phone)}" class="sv-card-qbtn" onclick="event.stopPropagation()" title="${esc(p.phone)}"><svg class="icon"><use href="#i-phone"/></svg></a>` : ''}
      <button class="sv-card-qbtn sv-card-qbtn-rec" onclick="event.stopPropagation();openActModalForPerson('${p.id}')" title="活動記録"><svg class="icon"><use href="#i-edit"/></svg></button>
    </div>`;
    return `<div class="sv-card ${urgentClass}" onclick="openSalonFromSearch('${p.id}')">
      <div class="sv-card-top">
        <div class="sv-card-name">${highlightMatch(p.company)}</div>
        ${badgeHtml ? `<div class="sv-card-badges">${badgeHtml}</div>` : ''}
        ${quickActions}
      </div>
      ${subParts.length ? `<div class="sv-card-sub">${subParts.map(s => `<span>${s.icon ? `<svg class="icon" style="width:11px;height:11px;vertical-align:-1px;opacity:.5"><use href="#${s.icon}"/></svg>` : ''}${highlightMatch(s.text)}</span>`).join('<span style="color:var(--border)">·</span>')}</div>` : ''}
      <div class="sv-card-last">${lastLine}${fuLine}</div>
    </div>`;
  };

  const overdueItems = results.filter(p => (p.activities || []).some(a => a.fuStatus === 'pending' && a.fuDate && a.fuDate < today));
  const otherItems   = results.filter(p => !overdueItems.includes(p));

  // Combine into ordered list for incremental rendering
  const allOrdered = [...overdueItems, ...otherItems];
  const BATCH = 50;
  let rendered = 0;

  let html = '';
  // 代理店選択中なら「戻る」ボタン表示
  if (_svSelectedAgent) {
    html += `<div style="grid-column:1/-1"><button class="agent-picker-back" onclick="backToAgentPicker()"><svg class="icon icon-sm"><use href="#i-arrow-left"/></svg> 代理店を選び直す</button></div>`;
  }
  if (overdueItems.length) {
    html += `<div class="sv-pinned-hdr"><svg class="icon icon-sm" style="width:14px;height:14px"><use href="#i-alert-tri"/></svg> 期限超過 — 要対応 (${overdueItems.length}件)</div>`;
  }
  // Render first batch immediately
  const firstBatch = allOrdered.slice(0, BATCH);
  firstBatch.forEach((p, i) => {
    if (i === overdueItems.length && overdueItems.length > 0) {
      html += `<div class="sv-section-sep">その他 (${otherItems.length}件)</div>`;
    }
    html += makeCard(p, i < overdueItems.length);
  });
  rendered = firstBatch.length;

  const grid = document.getElementById('svGrid');
  grid.innerHTML = html;

  // Lazy load remaining cards on scroll
  if (allOrdered.length > BATCH) {
    const loadMore = () => {
      if (rendered >= allOrdered.length) { grid.removeEventListener('scroll', onScroll); return; }
      if (grid.scrollTop + grid.clientHeight < grid.scrollHeight - 200) return;
      const next = allOrdered.slice(rendered, rendered + BATCH);
      let chunk = '';
      next.forEach((p, i) => {
        const idx = rendered + i;
        if (idx === overdueItems.length && overdueItems.length > 0) {
          chunk += `<div class="sv-section-sep">その他 (${otherItems.length}件)</div>`;
        }
        chunk += makeCard(p, idx < overdueItems.length);
      });
      grid.insertAdjacentHTML('beforeend', chunk);
      rendered += next.length;
    };
    const onScroll = () => requestAnimationFrame(loadMore);
    grid.addEventListener('scroll', onScroll, { passive: true });
  }
}

function openSalonFromSearch(id) {
  currentMode = 'salon';
  currentId = id;
  document.body.className = 'mode-salon';
  document.getElementById('tabAgent').classList.remove('active');
  document.getElementById('tabSalon').classList.add('active');

  document.getElementById('hdrTitle').textContent = 'サロンカルテ';
  // Mobile bottom nav
  document.getElementById('bnAgent').classList.remove('active');
  document.getElementById('bnSalon').classList.add('active');
  document.getElementById('bnSearch').classList.remove('active');
  save();
  renderSidebar();

}

// ── Mode switch ───────────────────────────────────
function switchMode(mode) {
  // サロンカルテはエリア検索ビューに統合
  if (mode === 'salon') mode = 'search';

  // On mobile: close detail panel when switching modes
  if (isMobile()) {
    const detail = document.getElementById('mobileDetail');
    if (detail.classList.contains('open')) {
      detail.classList.remove('open');
      document.getElementById('mobileAddActBar').style.display = 'none';
      document.getElementById('hdrBack').classList.add('hidden');
    }
  }

  // Hide dashboard view when leaving home
  document.getElementById('dashView').style.display = 'none';

  const allBnIds = ['bnHome','bnAgent','bnSalon','bnSearch','bnReport'];

  if (mode === 'home') {
    document.body.className = 'mode-home';
    document.getElementById('hdrTitle').textContent = 'ホーム';
    document.getElementById('hdrTitleCenter').textContent = 'ホーム';
    allBnIds.forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('bnHome').classList.add('active');
    document.getElementById('mobileListView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
    renderDashboard();
    return;
  }

  if (mode === 'search') {
    document.body.className = 'mode-search';
    document.getElementById('tabAgent').classList.remove('active');
    document.getElementById('tabSalon').classList.add('active');
    document.getElementById('tabSearch').classList.remove('active');
    document.getElementById('hdrTitle').textContent = 'サロンカルテ';
    document.getElementById('hdrTitleCenter').textContent = 'サロンカルテ';
    allBnIds.forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('bnSalon').classList.add('active');
    document.getElementById('mobileListView').style.display = 'none';
    _svSelectedAgent = ''; // 代理店ピッカーに戻す
    document.getElementById('svSearch').value = '';
    document.getElementById('svAgent').value = '';
    renderSearchView();
    return;
  }

  if (mode === 'report') {
    document.body.className = 'mode-report';
    document.getElementById('hdrTitle').textContent = '週報';
    document.getElementById('hdrTitleCenter').textContent = '週報';
    allBnIds.forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById('bnReport').classList.add('active');
    document.getElementById('mobileListView').style.display = 'none';
    // 週ヘッダーを初期化してレポート生成
    updateReportHeader();
    generateReport();
    return;
  }

  currentMode = mode;
  _mbSelectedAgent = ''; // 代理店ピッカーに戻す
  document.body.className = 'mode-' + mode;
  document.getElementById('tabAgent').classList.toggle('active', mode === 'agent');
  document.getElementById('tabSalon').classList.toggle('active', mode === 'salon');
  document.getElementById('tabSearch').classList.remove('active');
  document.getElementById('hdrTitle').textContent = mode === 'agent' ? '代理店カルテ' : 'サロンカルテ';
  const titleCenter = mode === 'agent' ? '代理店カルテ' : 'サロンカルテ';
  document.getElementById('hdrTitleCenter').textContent = titleCenter;
  allBnIds.forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(mode === 'agent' ? 'bnAgent' : 'bnSalon').classList.add('active');

  currentId = null;
  save();
  renderSidebar();
  renderMain();

  if (isMobile()) {
    document.getElementById('mobileListView').style.display = 'flex';
    renderMobileList();
  }
}

// ── 週報 (Report) ──────────────────────────────────
let reportWeekOff = 0;  // 0=今週, -1=先週, +1=翌週
let reportFmt     = 'daily'; // 'daily' | 'salon' | 'method'
let reportGenText = '';      // コピー用プレーンテキスト

// 週の月曜・日曜を返す（offset: 週オフセット、0=今週）
function getWeekRange(offset) {
  // offsetはすでに週数なのでそのまま使う
  const weekOffset = typeof offset === 'number' ? offset : 0;
  const now = new Date();
  const dow = now.getDay(); // 0=Sun
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const mon = new Date(now);
  mon.setDate(now.getDate() + mondayOffset + weekOffset * 7);
  mon.setHours(0,0,0,0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  // 活動ログの日付形式(YYYY-MM-DD)に合わせる
  const fmt  = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const fmtDisp = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  const fmtShort = d => `${d.getMonth()+1}/${d.getDate()}`;
  return {
    start: fmt(mon), end: fmt(sun),
    label: `${fmtDisp(mon)} 〜 ${fmtDisp(sun)}`,
    labelShort: `${fmtShort(mon)}(月)〜${fmtShort(sun)}(日)`,
    weekNum: getISOWeek(mon),
    year: mon.getFullYear(),
  };
}

function getISOWeek(d) {
  const tmp = new Date(d.valueOf());
  tmp.setDate(tmp.getDate() + 3 - (tmp.getDay() + 6) % 7);
  const w1 = new Date(tmp.getFullYear(), 0, 4);
  return 1 + Math.round(((tmp - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
}

// 週内のすべての活動（代理店+サロン）を集める
function collectWeekActivities(start, end) {
  const result = [];
  const allPeople = [
    ...agentPeople.map(p => ({ ...p, _kind: 'agent' })),
    ...salonPeople.map(p => ({ ...p, _kind: 'salon' })),
  ];
  for (const p of allPeople) {
    for (const a of (p.activities || [])) {
      if (a.date >= start && a.date <= end) {
        result.push({ ...a, _person: p, _kind: p._kind });
      }
    }
  }
  return result.sort((a, b) => a.date.localeCompare(b.date));
}

function reportWeekOffset(n) {
  reportWeekOff += n;
  updateReportHeader();
  generateReport();
}

function setReportFmt(fmt, el) {
  reportFmt = fmt;
  document.querySelectorAll('.rp-fmt').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  if (reportGenText) generateReport();
}

function updateReportHeader() {
  const rng = getWeekRange(reportWeekOff);
  document.getElementById('rpPeriod').textContent = rng.label;
  document.getElementById('rpPeriodSub').textContent = `${rng.year}年 第${rng.weekNum}週`;
}

function generateReport() {
  const rng = getWeekRange(reportWeekOff);
  const acts = collectWeekActivities(rng.start, rng.end);

  // Show memo field
  document.getElementById('rpMemoWrap').style.display = acts.length ? 'block' : 'none';

  if (!acts.length) {
    document.getElementById('rpBody').innerHTML =
      `<div class="rp-empty"><div style="font-size:36px;margin-bottom:10px">📭</div><div>この週の活動記録がありません</div><div style="font-size:12px;margin-top:6px;color:var(--muted)">活動ログを追加するか、‹ で前の週を確認してください</div></div>`;
    document.getElementById('rpCopyBtn').disabled = true;
    reportGenText = '';
    return;
  }

  let html = '';
  let text = '';
  const typeLabel = { agent:'代理店', salon:'サロン' };

  // ── サマリー ────────────────────────────
  const typeCounts = {};
  for (const a of acts) { typeCounts[a.type] = (typeCounts[a.type]||0) + 1; }
  const totalActs = acts.length;
  const followPending = acts.filter(a => a.fuStatus === 'pending').length;
  const uniqPersons = new Set(acts.map(a => a._person.id)).size;

  const summaryItems = Object.entries(typeCounts)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `<div class="rp-stat"><div class="rp-stat-val">${v}</div><div class="rp-stat-lbl">${k}</div></div>`)
    .join('');
  const summaryText = Object.entries(typeCounts).map(([k,v])=>`${k}:${v}件`).join(' / ');

  html += `<div class="rp-section">
    <div class="rp-section-title"><svg class="icon icon-sm" style="vertical-align:-2px;margin-right:4px"><use href="#i-bar-chart"/></svg>週次サマリー</div>
    <div class="rp-section-body">
      <div class="rp-summary-grid">
        <div class="rp-stat"><div class="rp-stat-val">${totalActs}</div><div class="rp-stat-lbl">総活動件数</div></div>
        <div class="rp-stat"><div class="rp-stat-val">${uniqPersons}</div><div class="rp-stat-lbl">接触先数</div></div>
        <div class="rp-stat"><div class="rp-stat-val" style="color:${followPending>0?'var(--warning)':'var(--success)'}">${followPending}</div><div class="rp-stat-lbl">要フォロー</div></div>
      </div>
      <div class="rp-summary-grid" style="margin-bottom:0">${summaryItems}</div>
    </div>
  </div>`;
  text += `【週次サマリー】\n総活動${totalActs}件 / 接触先${uniqPersons}社 / 要フォロー${followPending}件\n${summaryText}\n\n`;

  if (reportFmt === 'daily') {
    // ── 日別表示 ───────────────────────────
    html += `<div class="rp-section"><div class="rp-section-title"><svg class="icon icon-sm" style="vertical-align:-2px;margin-right:4px"><use href="#i-calendar"/></svg>日別活動ログ</div><div class="rp-section-body">`;
    text += `【日別活動ログ】\n`;
    const byDay = {};
    for (const a of acts) {
      if (!byDay[a.date]) byDay[a.date] = [];
      byDay[a.date].push(a);
    }
    const dayNames = ['日','月','火','水','木','金','土'];
    for (const [date, dayActs] of Object.entries(byDay).sort()) {
      const d = new Date(date.replace(/-/g,'/'));
      const dn = `${date.replace(/\//g,'-').slice(5)} (${dayNames[d.getDay()]})`;
      html += `<div class="rp-day-block"><div class="rp-day-hdr">${dn}</div>`;
      text += `\n■ ${dn}\n`;
      for (const a of dayActs) {
        const name = a._kind === 'agent' ? (a._person.name||a._person.company) : a._person.company;
        html += `<div class="rp-act-row">
          <span class="rp-act-type t-${a.type}">${esc(a.type)}</span>
          <span class="rp-act-name">${esc(name)}</span>
          <div class="rp-act-content">${esc(a.content)}${a.next?`<div class="rp-act-next">→ ${esc(a.next)}</div>`:''}</div>
        </div>`;
        text += `  [${a.type}] ${name}\n  ${a.content}\n`;
        if (a.next) text += `  → ${a.next}\n`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;

  } else if (reportFmt === 'salon') {
    // ── 先方（サロン/代理店）別表示 ──────────
    html += `<div class="rp-section"><div class="rp-section-title">💇 先方別活動ログ</div><div class="rp-section-body">`;
    text += `【先方別活動ログ】\n`;
    const byPerson = {};
    for (const a of acts) {
      const pid = a._person.id;
      if (!byPerson[pid]) byPerson[pid] = { person: a._person, acts: [] };
      byPerson[pid].acts.push(a);
    }
    for (const { person: p, acts: pActs } of Object.values(byPerson)) {
      const displayName = p._kind === 'agent' ? (p.name||p.company) : p.company;
      const kind = typeLabel[p._kind];
      html += `<div class="rp-day-block"><div class="rp-day-hdr">${esc(displayName)} <span style="font-weight:400;font-size:10px">(${kind})</span></div>`;
      text += `\n■ ${displayName} (${kind})\n`;
      for (const a of pActs.sort((x,y)=>x.date.localeCompare(y.date))) {
        html += `<div class="rp-act-row">
          <span class="rp-act-type t-${a.type}">${esc(a.type)}</span>
          <span class="rp-act-name">${a.date.slice(5)}</span>
          <div class="rp-act-content">${esc(a.content)}${a.next?`<div class="rp-act-next">→ ${esc(a.next)}</div>`:''}</div>
        </div>`;
        text += `  ${a.date.slice(5)} [${a.type}] ${a.content}\n`;
        if (a.next) text += `  → ${a.next}\n`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;

  } else if (reportFmt === 'method') {
    // ── 営業手法分析 ───────────────────────
    html += `<div class="rp-section"><div class="rp-section-title">💡 営業手法サマリー</div><div class="rp-section-body">`;
    text += `【営業手法サマリー】\n`;
    // 種別ごとにグルーピング
    const byType = {};
    for (const a of acts) {
      if (!byType[a.type]) byType[a.type] = [];
      byType[a.type].push(a);
    }
    for (const [type, typeActs] of Object.entries(byType).sort((a,b)=>b[1].length-a[1].length)) {
      html += `<div class="rp-method-item"><div class="rp-method-name">${esc(type)} (${typeActs.length}件)</div>`;
      text += `\n■ ${type} (${typeActs.length}件)\n`;
      for (const a of typeActs) {
        const name = a._kind === 'agent' ? (a._person.name||a._person.company) : a._person.company;
        html += `<div style="font-size:12px;color:var(--muted);padding:2px 0">${a.date.slice(5)} ${esc(name)} — ${esc(a.content.slice(0,40))}${a.content.length>40?'…':''}</div>`;
        text += `  ${a.date.slice(5)} ${name} — ${a.content.slice(0,60)}${a.content.length>60?'…':''}\n`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;

    // 担当営業別サマリー
    const byRep = {};
    for (const a of acts) {
      const rep = a.repName || '（未記入）';
      if (!byRep[rep]) byRep[rep] = { total: 0, byType: {} };
      byRep[rep].total++;
      byRep[rep].byType[a.type] = (byRep[rep].byType[a.type] || 0) + 1;
    }
    const repEntries = Object.entries(byRep).sort((a,b) => b[1].total - a[1].total);
    if (repEntries.length) {
      html += `<div class="rp-section"><div class="rp-section-title">👤 担当営業別サマリー</div><div class="rp-section-body">`;
      text += `\n【担当営業別サマリー】\n`;
      for (const [rep, dat] of repEntries) {
        const breakdown = Object.entries(dat.byType).map(([t,n]) => `${t}${n}件`).join(' / ');
        html += `<div class="rp-method-item"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;color:var(--primary)">${esc(rep)}</span><span style="font-size:12px;color:var(--muted)">計 ${dat.total}件</span></div><div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(breakdown)}</div></div>`;
        text += `  ${rep}: ${dat.total}件 (${breakdown})\n`;
      }
      html += `</div></div>`;
    }

    // 次のアクション一覧
    const withNext = acts.filter(a => a.next);
    if (withNext.length) {
      html += `<div class="rp-section"><div class="rp-section-title">📌 次のアクション一覧</div><div class="rp-section-body">`;
      text += `\n【次のアクション一覧】\n`;
      for (const a of withNext) {
        const name = a._kind === 'agent' ? (a._person.name||a._person.company) : a._person.company;
        html += `<div class="rp-method-item" style="display:flex;gap:8px;align-items:baseline"><span style="color:var(--primary);font-weight:700;min-width:80px;font-size:12px">${esc(name)}</span><span>${esc(a.next)}</span></div>`;
        text += `  ${name}: ${a.next}\n`;
      }
      html += `</div></div>`;
    }
  }

  // ── フォローアップ一覧（共通）─────────
  const followActs = acts.filter(a => a.fuStatus === 'pending');
  if (followActs.length) {
    html += `<div class="rp-section"><div class="rp-section-title">⚠️ 要フォローアップ</div><div class="rp-section-body">`;
    text += `\n【要フォローアップ】\n`;
    for (const a of followActs.sort((x,y) => (x.fuDate||'').localeCompare(y.fuDate||''))) {
      const name = a._kind === 'agent' ? (a._person.name||a._person.company) : a._person.company;
      const overdue = a.fuDate && a.fuDate < toDay();
      html += `<div class="rp-follow-item">
        <div>
          <div style="font-weight:700;font-size:13px">${esc(name)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(a.content.slice(0,50))}${a.content.length>50?'…':''}</div>
          ${a.next ? `<div style="font-size:12px;color:var(--primary);margin-top:2px">→ ${esc(a.next)}</div>` : ''}
        </div>
        ${a.fuDate ? `<div class="rp-follow-date" style="color:${overdue?'var(--danger)':'var(--warning)'};margin-left:auto;flex-shrink:0">${a.fuDate.slice(5)}まで</div>` : ''}
      </div>`;
      text += `  ${name}${a.fuDate?' ('+a.fuDate+'まで)':''}: ${a.next||a.content.slice(0,40)}\n`;
    }
    html += `</div></div>`;
  }

  // ── 振り返りメモ ──────────────────────
  const memo = document.getElementById('rpMemo').value.trim();
  if (memo) {
    text += `\n【今週の気づき・改善点】\n${memo}\n`;
  }

  document.getElementById('rpBody').innerHTML = html;
  document.getElementById('rpCopyBtn').disabled = false;

  // プレーンテキストのヘッダーを構築
  reportGenText = `━━━━━━━━━━━━━━━━━━━━━━━\n📊 週次営業レポート\n${rng.label}\n━━━━━━━━━━━━━━━━━━━━━━━\n\n` + text +
    (memo ? '' : '') + // memo is appended above if exists
    `\n生成: ${toDay()}`;
}

function copyReport() {
  const memo = document.getElementById('rpMemo').value.trim();
  let fullText = reportGenText;
  // 振り返りメモを末尾に追加（未生成テキストに追記）
  if (memo && !fullText.includes('【今週の気づき')) {
    fullText += `\n【今週の気づき・改善点】\n${memo}\n`;
  }
  if (!fullText) return;
  navigator.clipboard.writeText(fullText).then(() => {
    const btn = document.getElementById('rpCopyBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ コピーしました！';
    btn.style.background = 'var(--success)';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = fullText;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('rpCopyBtn');
    btn.textContent = '✓ コピーしました！';
    setTimeout(() => { btn.textContent = '📋 テキストをコピー'; }, 2000);
  });
}

// ── Home Dashboard ───────────────────────────────
function renderDashboard() {
  const today = toDay();
  const allPeople = [...agentPeople, ...salonPeople];
  const allActs = allPeople.flatMap(p => (p.activities || []).map(a => ({ ...a, _person: p })));

  // 今日の活動件数
  const todayActs = allActs.filter(a => a.date === today);

  // 今週の活動件数（月曜起点）
  const now = new Date();
  const dayOfWeek = now.getDay() || 7;
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - dayOfWeek + 1);
  const weekStartStr = weekStart.toISOString().slice(0, 10);
  const weekActs = allActs.filter(a => a.date >= weekStartStr && a.date <= today);

  // 要フォローアップ
  const pendingFUs = allActs
    .filter(a => a.fuStatus === 'pending')
    .sort((a, b) => (a.fuDate || '9999').localeCompare(b.fuDate || '9999'));
  const overdueFUs = pendingFUs.filter(a => a.fuDate && a.fuDate < today);
  const todayFUs = pendingFUs.filter(a => a.fuDate === today);
  const upcomingFUs = pendingFUs.filter(a => a.fuDate && a.fuDate > today && a.fuDate <= new Date(now.getTime() + 7 * 86400000).toISOString().slice(0, 10));

  // 長期未訪問サロン（60日以上）
  const dormantSalons = salonPeople.filter(p => {
    const lastDate = (p.activities || []).reduce((m, a) => a.date > m ? a.date : m, '');
    const days = lastDate ? Math.floor((new Date() - new Date(lastDate)) / 86400000) : 9999;
    return days >= 60;
  }).slice(0, 5);

  const fuItemHtml = (a) => {
    const dateClass = !a.fuDate ? 'upcoming' : a.fuDate < today ? 'overdue' : a.fuDate === today ? 'today' : 'upcoming';
    const dateLabel = !a.fuDate ? '期限なし' : a.fuDate < today ? `${Math.floor((new Date() - new Date(a.fuDate)) / 86400000)}日超過` : a.fuDate === today ? '今日' : relativeDate(a.fuDate);
    const name = a._person.company || a._person.name || '不明';
    return `<div class="dash-fu-item" onclick="openSalonFromSearch('${a._person.id}')">
      <span class="dash-fu-date ${dateClass}">${dateLabel}</span>
      <span class="dash-fu-name">${esc(name)}</span>
      <span class="dash-fu-content">${esc((a.content || '').slice(0, 25))}</span>
      <span class="dash-fu-arrow"><svg class="icon"><use href="#i-chevron-right"/></svg></span>
    </div>`;
  };

  const dayNames = ['日','月','火','水','木','金','土'];
  const nowDate = new Date();
  const dateStr = `${nowDate.getMonth()+1}月${nowDate.getDate()}日（${dayNames[nowDate.getDay()]}）`;
  const greetIcon = nowDate.getHours() < 11 ? '#i-sun' : nowDate.getHours() < 17 ? '#i-zap' : '#i-moon';
  const greetText = nowDate.getHours() < 11 ? 'おはようございます' : nowDate.getHours() < 17 ? 'おつかれさまです' : 'おつかれさまでした';
  const dormantCount = salonPeople.filter(p => { const ld = (p.activities||[]).reduce((m,a) => a.date>m?a.date:m,''); return (ld ? Math.floor((new Date()-new Date(ld))/86400000) : 9999) >= 60; }).length;

  let html = `
    <div class="dash-greeting"><svg class="icon icon-md" style="vertical-align:-3px;margin-right:4px"><use href="${greetIcon}"/></svg>${greetText}</div>
    <div class="dash-date">${dateStr}</div>
    <div class="dash-quick-actions">
      <button class="dash-quick-btn qb-primary" onclick="switchMode('search')">
        <svg class="icon"><use href="#i-scissors"/></svg>サロンを探す
      </button>
      <button class="dash-quick-btn qb-secondary" onclick="openActModal()">
        <svg class="icon"><use href="#i-edit"/></svg>活動を記録
      </button>
      <button class="dash-quick-btn qb-secondary" onclick="switchMode('report')">
        <svg class="icon"><use href="#i-bar-chart"/></svg>週報
      </button>
    </div>
    <div class="dash-stats">
      <div class="dash-stat" onclick="switchMode('report')">
        <div class="dash-stat-icon" style="background:var(--primary-bg);color:var(--primary)"><svg class="icon"><use href="#i-activity"/></svg></div>
        <div class="dash-stat-body">
          <div class="dash-stat-num" style="color:var(--primary)">${todayActs.length}</div>
          <div class="dash-stat-lbl">今日の活動</div>
        </div>
      </div>
      <div class="dash-stat" onclick="switchMode('report')">
        <div class="dash-stat-icon" style="background:#EFF6FF;color:#2563EB"><svg class="icon"><use href="#i-trending-up"/></svg></div>
        <div class="dash-stat-body">
          <div class="dash-stat-num" style="color:#2563EB">${weekActs.length}</div>
          <div class="dash-stat-lbl">今週の活動</div>
        </div>
      </div>
      <div class="dash-stat" onclick="switchMode('search');setTimeout(()=>{const c=document.querySelector('[data-q=\\'overdue\\']')||document.querySelector('[data-q=\\'pending\\']');if(c)c.click();},100)">
        <div class="dash-stat-icon" style="background:${overdueFUs.length?'var(--danger-bg)':'var(--warning-bg)'};color:${overdueFUs.length?'var(--danger)':'var(--warning)'}"><svg class="icon"><use href="#i-alert-tri"/></svg></div>
        <div class="dash-stat-body">
          <div class="dash-stat-num" style="color:${overdueFUs.length ? 'var(--danger)' : 'var(--warning)'}">${pendingFUs.length}</div>
          <div class="dash-stat-lbl">要フォロー${overdueFUs.length ? ` (${overdueFUs.length}件超過)` : ''}</div>
        </div>
      </div>
      <div class="dash-stat" onclick="switchMode('search');setTimeout(()=>{const c=document.querySelector('[data-q=\\'dormant\\']');if(c)c.click();},100)">
        <div class="dash-stat-icon" style="background:#F1F5F9;color:#64748B"><svg class="icon"><use href="#i-clock"/></svg></div>
        <div class="dash-stat-body">
          <div class="dash-stat-num" style="color:#64748B">${dormantCount}</div>
          <div class="dash-stat-lbl">60日以上未訪問</div>
        </div>
      </div>
    </div>`;

  // 期限超過
  if (overdueFUs.length) {
    html += `<div class="dash-section">
      <div class="dash-section-title" style="color:var(--danger)"><svg class="icon"><use href="#i-alert-tri"/></svg> 期限超過 (${overdueFUs.length}件)</div>
      ${overdueFUs.slice(0, 5).map(fuItemHtml).join('')}
      ${overdueFUs.length > 5 ? `<div style="text-align:center;padding:8px;font-size:12px;color:var(--muted)">他 ${overdueFUs.length - 5} 件</div>` : ''}
    </div>`;
  }

  // 今日のフォロー
  if (todayFUs.length) {
    html += `<div class="dash-section">
      <div class="dash-section-title"><svg class="icon"><use href="#i-calendar"/></svg> 今日のフォロー (${todayFUs.length}件)</div>
      ${todayFUs.map(fuItemHtml).join('')}
    </div>`;
  }

  // 今週のフォロー
  if (upcomingFUs.length) {
    html += `<div class="dash-section">
      <div class="dash-section-title"><svg class="icon"><use href="#i-clipboard"/></svg> 今週の予定 (${upcomingFUs.length}件)</div>
      ${upcomingFUs.slice(0, 5).map(fuItemHtml).join('')}
    </div>`;
  }

  // フォロー予定なし
  if (!overdueFUs.length && !todayFUs.length && !upcomingFUs.length) {
    html += `<div class="dash-section" style="text-align:center;padding:24px;color:var(--muted)">
      <svg class="icon" style="width:32px;height:32px;margin-bottom:8px;color:var(--success)"><use href="#i-check-circle"/></svg>
      <div>直近のフォロー予定はありません</div>
    </div>`;
  }

  // 同期キューに未送信があれば表示
  if (_syncQueue.length) {
    html += `<div class="dash-section">
      <div class="dash-section-title" style="color:var(--warning)"><svg class="icon"><use href="#i-alert-tri"/></svg> 未同期の活動ログ (${_syncQueue.length}件)</div>
      <button class="btn btn-primary" onclick="retrySyncQueue()" style="width:100%;border-radius:var(--radius-md)"><svg class="icon icon-sm" style="margin-right:4px"><use href="#i-refresh"/></svg> 再送する</button>
    </div>`;
  }

  document.getElementById('dashContent').innerHTML = html;
}

// ── Overlay close ─────────────────────────────────
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ── Init ──────────────────────────────────────────
(function init() {
  switchMode(currentMode);
  // Mobile: show list immediately
  if (isMobile()) {
    document.getElementById('mobileListView').style.display = 'flex';
    renderMobileList();
  }
  // キャッシュ経過時間ラベルを初期化
  updateCacheAgeLabel();
  // 起動時にスプシから自動読込（サイレント・キャッシュ有効時はスキップ）
  autoLoadFromSheet();
  // 未同期の活動ログを再送
  if (_syncQueue.length) setTimeout(retrySyncQueue, 5000);
})();
</script>
</body>
</html>
